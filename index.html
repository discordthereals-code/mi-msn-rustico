<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REALS - MSN</title>
    <style>
        body { background: #0d0d0d; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; color: #eee; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { align-self: center; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #ffff00; text-align: center; width: 300px; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-yellow { background: #ffff00; color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* CHAT WINDOW */
        #chat-window { display: none; width: 100%; max-width: 800px; height: 100vh; background: #141414; flex-direction: column; border-left: 1px solid #333; border-right: 1px solid #333; }
        #title-bar { background: #222; color: #ffff00; padding: 15px; border-bottom: 2px solid #ffff00; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #messages-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: #0f0f0f; }
        
        /* MENSAJES */
        #messages { list-style: none; padding: 0; margin: 0; }
        .msg-item { margin-bottom: 12px; padding: 10px; border-radius: 8px; background: #1f1f1f; border-left: 4px solid #ffff00; }
        .msg-time { font-size: 11px; color: #666; margin-right: 10px; }
        .msg-user { color: #ffff00; font-weight: bold; margin-right: 8px; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
        audio { height: 35px; margin-top: 10px; filter: invert(1); width: 100%; max-width: 250px; }

        /* VISTA PREVIA AUDIO */
        #voice-preview { display: none; background: #222; padding: 15px; border-top: 2px solid #ff4444; align-items: center; justify-content: space-between; gap: 10px; }
        
        /* INPUT AREA */
        #input-area { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        .controls { display: flex; gap: 10px; align-items: center; }
        #msg-input { flex-grow: 1; padding: 12px 18px; background: #252525; border: 1px solid #444; color: white; border-radius: 25px; outline: none; }
        
        /* BOTONES REDONDOS (Clip y Mic) */
        .btn-round { background: #333; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-round:active { transform: scale(0.9); }
        .btn-mic.recording { background: #ff4444; animation: pulse 1s infinite; }
        .btn-send { background: #ffff00; color: black; border-radius: 12px; padding: 0 20px; font-weight: bold; height: 45px; border: none; cursor: pointer; }

        @keyframes pulse { 50% { opacity: 0.4; } }
        /* SACUDIDA ORIGINAL QUE TE GUSTÓ */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(8px,8px); } 50% { transform: translate(-8px,-8px); } }
        .shake-effect { animation: shake 0.1s 6; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#ffff00; margin-bottom:20px;">THE REALS</h1>
    <input type="text" id="user" class="login-input" placeholder="Nombre">
    <input type="password" id="pass" class="login-input" placeholder="Contraseña">
    <button class="btn-yellow" onclick="login()">ENTRAR</button>
</div>

<div id="chat-window">
    <div id="title-bar">
        <span id="tema-title">CARGANDO...</span>
        <span style="font-size: 11px; color: #777; cursor: pointer" onclick="location.reload()">Cerrar</span>
    </div>
    <div id="messages-container"><ul id="messages"></ul></div>
    
    <div id="voice-preview">
        <audio id="audio-playback" controls></audio>
        <div style="display:flex; gap:5px;">
            <button onclick="cancelAudio()" style="background:#444; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Borrar</button>
            <button onclick="sendAudio()" style="background:#ffff00; color:black; border:none; padding:8px 12px; border-radius:5px; font-weight:bold; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <div id="input-area">
        <div class="controls">
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendFile(this)">
            <button class="btn-round" onclick="document.getElementById('file-input').click()">📎</button>
            
            <input id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter')sendText()">
            
            <button class="btn-round btn-mic" id="mic-btn" onclick="handleMic()">🎤</button>
            <button class="btn-round" onclick="sendBuzz()" style="background:#ff4444; font-weight:bold; font-size:16px;">Z!</button>
            <button class="btn-send" onclick="sendText()">ENVIAR</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    let miUser = "", recorder, chunks = [], currentAudioBase64 = null;

    function login() {
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value.trim();
        if(user && pass) socket.emit('login', { user, pass });
    }

    socket.on('login_status', (res) => {
        if(res.success) {
            miUser = res.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('tema-title').innerText = res.tema;
            if(res.history) res.history.forEach(m => render(m));
        } else if(res.msg) alert(res.msg);
    });

    // --- MEJORA: ACTUALIZACIÓN DE TEMA EN TIEMPO REAL ---
    socket.on('actualizar_tema', (t) => {
        document.getElementById('tema-title').innerText = t;
    });

    const getH = () => new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    function sendText() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim()) {
            socket.emit('chat message', { user: miUser, text: inp.value, time: getH() });
            inp.value = '';
        }
    }

    function sendBuzz() {
        socket.emit('chat message', { user: miUser, text: "¡HA ENVIADO UN ZUMBIDO!", isBuzz: true, time: getH() });
    }

    function sendFile(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => socket.emit('chat message', { user: miUser, img: e.target.result, time: getH() });
            reader.readAsDataURL(input.files[0]);
            input.value = "";
        }
    }

    // --- AUDIO CON CANCELACIÓN DE RUIDO ---
    async function handleMic() {
        const btn = document.getElementById('mic-btn');
        if (!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        currentAudioBase64 = reader.result;
                        document.getElementById('audio-playback').src = currentAudioBase64;
                        document.getElementById('voice-preview').style.display = 'flex';
                    };
                    stream.getTracks().forEach(t => t.stop());
                };
                recorder.start();
                btn.classList.add('recording');
            } catch(e) { alert("Error de micro"); }
        } else {
            recorder.stop();
            btn.classList.remove('recording');
        }
    }

    function cancelAudio() {
        document.getElementById('voice-preview').style.display = 'none';
        currentAudioBase64 = null;
    }

    function sendAudio() {
        if(currentAudioBase64) {
            socket.emit('chat message', { user: miUser, audio: currentAudioBase64, time: getH() });
            cancelAudio();
        }
    }

    // --- EL ZUMBIDO ELECTRÓNICO QUE TE GUSTÓ (SAWTOOTH 440Hz) ---
    function playBuzzSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); 
        osc.stop(ctx.currentTime + 0.5);
    }

    socket.on('chat message', (m) => {
        render(m);
        if(m.isBuzz) {
            playBuzzSound();
            const win = document.getElementById('chat-window');
            win.classList.add('shake-effect');
            setTimeout(() => win.classList.remove('shake-effect'), 600);
        }
    });

    function render(m) {
        const messagesUl = document.getElementById('messages');
        const li = document.createElement('li');
        li.className = "msg-item";
        
        let header = `<span class="msg-time">${m.time}</span> <span class="msg-user">${m.user}:</span> `;
        let body = "";
        
        if(m.audio) body = `<br><audio controls src="${m.audio}"></audio>`;
        else if(m.img) body = `<br><img src="${m.img}" class="chat-img">`;
        else body = m.text;

        li.innerHTML = header + body;
        messagesUl.appendChild(li);
        document.getElementById('messages-container').scrollTop = 999999;
    }
</script>
</body>
</html>
