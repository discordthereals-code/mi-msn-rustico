<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MSN Rústico</title>
    <style>
        body { background-color: #008080; font-family: "Tahoma", sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #msn-window { width: 400px; background: #d4d0c8; border: 2px solid #fff; border-right-color: #404040; border-bottom-color: #404040; padding: 2px; }
        #title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 5px; font-weight: bold; font-size: 12px; }
        #chat-box { height: 250px; background: white; border: 2px inset #d4d0c8; margin: 10px; overflow-y: scroll; padding: 5px; font-size: 13px; }
        #input-area { margin: 10px; display: flex; gap: 5px; }
        input { border: 2px inset #d4d0c8; padding: 3px; flex-grow: 1; }
        button { background: #d4d0c8; border: 2px outset #fff; cursor: pointer; }
        .msg { margin-bottom: 5px; }
        .user { color: blue; font-weight: bold; }
        .peer { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div id="msn-window">
    <div id="title-bar">Conversación - MSN Messenger</div>
    <div id="chat-box" id="history"></div>
    <div id="input-area">
        <input type="text" id="message" placeholder="Escribe aquí..." onkeypress="checkEnter(event)">
        <button onclick="send()">Enviar</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('message');

    function send() {
        if (input.value.trim() === "") return;
        
        // Agregar tu mensaje
        appendMessage("Tú", input.value, "user");
        
        // Simular respuesta del otro (para que no estés solo)
        setTimeout(() => {
            appendMessage("Amigo", "¡Qué rústico está esto!", "peer");
        }, 1000);

        input.value = "";
    }

    function appendMessage(sender, text, className) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<span class="${className}">${sender} dice:</span> ${text}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function checkEnter(e) { if (e.key === 'Enter') send(); }
</script>

</body>
</html>
