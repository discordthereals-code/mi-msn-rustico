<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MSN Messenger Elite 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           VARIABLES GLOBALES Y PALETA DE COLORES
           ========================================================================== */
        :root {
            --msn-blue: #0055e5;
            --msn-light: #e1eefc;
            --msn-bg: #71ADFF;
            --white: #ffffff;
            --win-bg: #f0f7ff;
            --header-grad: linear-gradient(to bottom, #fcfdfe 0%, #d6e8f7 100%);
            --shadow-heavy: 0 10px 40px rgba(0,0,0,0.4);
            --border-color: #b4c7de;
            --yt-red: #FF0000;
            --nudge-red: #ff3b3b;
            --status-online: #31a24c;
            --text-main: #333333;
            --text-muted: #888888;
        }

        /* ==========================================================================
           RESETEO BASE
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--msn-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
        }

        /* ==========================================================================
           CONTENEDOR PRINCIPAL DE LA APP
           ========================================================================== */
        #app {
            display: none; /* Se muestra tras el login */
            width: 1400px;
            max-width: 100vw;
            height: 920px;
            max-height: 100vh;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-heavy);
            border: 2px solid #1c1c1c;
            position: relative;
        }

        /* ==========================================================================
           CABECERA (HEADER GLOBAL)
           ========================================================================== */
        header {
            height: 160px;
            background: var(--header-grad);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            gap: 25px;
            flex-shrink: 0;
        }

        .my-avatar-container {
            position: relative;
        }

        #my-avatar {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            border: 4px solid var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
            background-color: #eeeeee;
        }

        #my-avatar:hover {
            transform: scale(1.05);
            border-color: var(--msn-blue);
        }
        
        .user-info-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 1;
            min-width: 0;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #my-name-display {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Reproductor YouTube Integrado */
        #media-bar {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid #a0b5d0;
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 500px;
        }

        #yt-input {
            border: none;
            background: transparent;
            flex: 1;
            outline: none;
            font-size: 13px;
            color: #444444;
        }

        .media-actions {
            display: flex;
            gap: 15px;
            color: #555555;
            font-size: 18px;
        }

        .media-actions i {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .media-actions i:hover {
            color: var(--msn-blue);
            transform: scale(1.2);
        }

        /* ==========================================================================
           ÁREA PRINCIPAL (SIDEBARS Y CHAT)
           ========================================================================== */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* --- Panel Izquierdo: Lista de Contactos --- */
        #contacts-panel {
            width: 380px;
            border-right: 1px solid #dcecfc;
            display: flex;
            flex-direction: column;
            background-color: #f8fbff;
            flex-shrink: 0;
        }

        .section-title {
            padding: 12px 25px;
            font-size: 12px;
            font-weight: 900;
            color: #5a708a;
            background-color: #edf4fb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #friends-container {
            flex: 1;
            overflow-y: auto;
        }

        .contact-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 25px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid #f0f4f8;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .contact-card:hover {
            background-color: #e8f2ff;
        }

        .contact-card img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid #dddddd;
            object-fit: cover;
        }

        .contact-text b {
            font-size: 15px;
            color: #222222;
            display: block;
        }

        .contact-text p {
            font-size: 12px;
            color: #777777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }
        
        .unread-indicator {
            position: absolute;
            top: 18px;
            right: 25px;
            width: 12px;
            height: 12px;
            background-color: #ff8c00;
            border-radius: 50%;
            display: none;
            border: 2px solid var(--white);
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .listening {
            color: var(--msn-blue) !important;
            font-weight: bold;
            font-style: italic;
            font-size: 11px;
        }

        /* --- Panel Central: Área de Chat --- */
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--white);
            position: relative;
        }

        /* Encabezado Dinámico del Chat (Fiel a la imagen) */
        #chat-top-header {
            background: linear-gradient(to right, #f4f8fc, #ffffff);
            padding: 15px 25px;
            border-bottom: 1px solid #dcecfc;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        #chat-top-avatar {
            width: 65px;
            height: 65px;
            border-radius: 10px;
            border: 2px solid var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .chat-top-info {
            flex: 1;
            min-width: 0;
        }

        #chat-top-name {
            color: var(--msn-blue);
            font-size: 18px;
            font-weight: bold;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #chat-top-desc {
            font-size: 13px;
            color: #666666;
            font-style: italic;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-top-status-row {
            font-size: 12px;
            color: #888888;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }

        /* Flujo de Mensajes */
        #messages-flow {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        .message-header {
            font-size: 13px;
            font-weight: bold;
            color: var(--msn-blue);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .message-time {
            font-weight: normal;
            color: #bbbbbb;
            font-size: 11px;
            margin-left: 10px;
        }

        .message-body {
            font-size: 15px;
            color: #333333;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message-body a {
            color: var(--msn-blue);
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }

        /* Panel de Entrada de Texto */
        #input-zone {
            padding: 25px;
            background-color: #f4f8fc;
            border-top: 1px solid #e1e8f0;
        }

        #chat-input {
            width: 100%;
            height: 90px;
            padding: 15px;
            border: 1px solid #b4c7de;
            border-radius: 8px;
            resize: none;
            outline: none;
            font-size: 16px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .msn-btn {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--msn-blue);
            color: var(--white);
            flex: 1;
        }

        .btn-secondary {
            background-color: var(--white);
            border: 1px solid #cccccc;
            color: #555555;
        }

        .msn-btn:active {
            transform: scale(0.98);
        }

        /* --- Panel Derecho: TV y Previsualización --- */
        #preview-panel {
            width: 340px;
            border-left: 1px solid #dcecfc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            flex-shrink: 0;
            background-color: #fdfdfd;
        }

        #tv-frame {
            width: 300px;
            height: 170px;
            background-color: #000000;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 30px;
            border: 2px solid #333333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-avatar-big {
            width: 210px;
            height: 210px;
            border-radius: 15px;
            border: 8px solid var(--white);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            object-fit: cover;
            background-color: #eeeeee;
        }

        /* ==========================================================================
           RESPONSIVE DESIGN: SISTEMA CAJA POR CAJA (ANDROID)
           ========================================================================== */
        @media (max-width: 850px) {
            header {
                height: 120px;
                padding: 10px 15px;
            }
            
            #media-bar {
                display: none; /* Se oculta para ahorrar espacio en móvil */
            }
            
            #contacts-panel {
                width: 100%;
                position: absolute;
                inset: 0;
                z-index: 10;
            }
            
            #chat-area {
                width: 100%;
                position: absolute;
                inset: 0;
                z-index: 5;
                transform: translateX(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            
            #chat-area.active {
                transform: translateX(0);
                z-index: 20;
            }
            
            #preview-panel {
                display: none;
            }
            
            .mobile-back {
                display: block !important;
            }
        }

        .mobile-back {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--msn-blue);
            margin-right: 15px;
            cursor: pointer;
        }

        /* ==========================================================================
           MODALES Y PANTALLA DE LOGIN
           ========================================================================== */
        #login-curtain {
            position: fixed;
            inset: 0;
            background-color: var(--msn-bg);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-module {
            background-color: var(--white);
            padding: 60px;
            border-radius: 25px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }

        .l-field {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border: 2px solid #dddddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .l-field:focus {
            border-color: var(--msn-blue);
        }

        /* ==========================================================================
           ANIMACIONES CLÁSICAS
           ========================================================================== */
        .shake-nudge {
            animation: vibe 0.1s 15;
        }

        @keyframes vibe {
            0% { transform: translate(0, 0); }
            25% { transform: translate(8px, 8px); }
            50% { transform: translate(-8px, -8px); }
            75% { transform: translate(8px, -8px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        // Inicialización de variables globales
        const socket = io();
        let miUsuario = localStorage.getItem('msn_user_elite') || "";
        let chatActivo = 'conversando';
        let ytPlayer;
        let timerEscritura;

        // --- 1. SISTEMA MULTIMEDIA YOUTUBE ---
        
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-api', {
                height: '170',
                width: '300',
                playerVars: { 
                    'controls': 0, 
                    'disablekb': 1, 
                    'rel': 0 
                },
                events: { 
                    'onStateChange': sincronizarMusica 
                }
            });
        }

        function cargarMultimedia(url) {
            if(!ytPlayer) return;
            let id = "";
            
            // Detectar si es playlist o video individual
            if(url.includes("list=")) {
                id = url.split("list=")[1].split("&")[0];
                ytPlayer.loadPlaylist({list: id, listType: 'playlist'});
            } else {
                id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1]?.split("?")[0] || url;
                ytPlayer.loadVideoById(id);
            }
            
            // Alternar vista de TV vs Avatar
            document.getElementById('tv-frame').style.display = 'block';
            document.getElementById('target-avatar-big').style.display = 'none';
            document.getElementById('yt-input').style.display = 'none';
        }

        function sincronizarMusica(e) {
            // Cuando la música suena, enviar actualización al servidor
            if(e.data == YT.PlayerState.PLAYING) {
                const titulo = ytPlayer.getVideoData().title;
                socket.emit('update_profile', { desc: "🎵 " + titulo, foto: null });
            }
        }

        function controlarYT(accion) {
            if(!ytPlayer) return;
            if(accion === 'play') ytPlayer.playVideo();
            if(accion === 'pause') ytPlayer.pauseVideo();
            if(accion === 'stop') {
                ytPlayer.stopVideo();
                document.getElementById('tv-frame').style.display = 'none';
                document.getElementById('target-avatar-big').style.display = 'block';
                document.getElementById('yt-input').style.display = 'block';
                document.getElementById('yt-input').value = "";
                socket.emit('update_profile', { desc: "Disponible", foto: null });
            }
        }

        // --- 2. SISTEMA DE AUDIO NATIVO ---
        
        const sndLogin = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const sndMsg = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const sndBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');
        
        function iniciarAudioNavegador() {
            // Desbloquear políticas de autoplay en navegadores modernos
            [sndLogin, sndMsg, sndBuzz].forEach(s => s.play().then(() => s.pause()).catch(() => {}));
        }

        // --- 3. GESTIÓN DE SESIÓN Y LOGIN ---
        
        if(miUsuario) {
            socket.emit('login', { user: miUsuario, pass: localStorage.getItem('msn_pass_elite') });
        }

        function ejecutarLogin() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if(!u || !p) return;
            
            localStorage.setItem('msn_user_elite', u);
            localStorage.setItem('msn_pass_elite', p);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', r => {
            if(r.success) {
                miUsuario = r.user;
                document.getElementById('login-curtain').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                
                actualizarMiPerfil(r.perfil);
                cambiarChat('conversando', 'Sala General', '/logo-conversando.png', 'Chat global de la plataforma');
                sndLogin.play().catch(()=>{});
            } else { 
                alert(r.msg); 
                localStorage.clear(); 
                location.reload(); 
            }
        });

        function actualizarMiPerfil(perfil) {
            const foto = perfil.foto || "/logo-conversando.png";
            document.getElementById('my-avatar').src = foto;
            document.getElementById('my-mini-preview').src = foto;
            document.getElementById('my-name-display').innerText = miUsuario;
        }

        // --- 4. RENDERIZADO DE CONTACTOS E INTERFAZ DINÁMICA ---
        
        socket.on('lista_contactos', lista => {
            const contenedor = document.getElementById('dynamic-friends-list');
            contenedor.innerHTML = "";
            
            lista.forEach(usuario => {
                if(usuario.user === miUsuario) { 
                    actualizarMiPerfil(usuario); 
                    return; 
                }
                
                const isListening = usuario.descripcion && usuario.descripcion.includes('🎵');
                
                // Actualizar el header dinámico si es el usuario con el que estamos chateando
                if(usuario.user === chatActivo) {
                    const statusText = document.getElementById('chat-top-status-text');
                    statusText.innerText = usuario.descripcion || 'Disponible';
                    statusText.style.color = isListening ? 'var(--msn-blue)' : '#333333';
                    document.getElementById('chat-top-avatar').src = usuario.foto || '/logo-conversando.png';
                }

                // Crear tarjeta de contacto en el panel izquierdo
                const btn = document.createElement('button');
                btn.className = "contact-card";
                btn.innerHTML = `
                    <img src="${usuario.foto || '/logo-conversando.png'}">
                    <div class="contact-text">
                        <b>${usuario.user}</b>
                        <p class="${isListening ? 'listening' : ''}">${usuario.descripcion || 'Disponible'}</p>
                    </div>
                    <div id="dot-${usuario.user}" class="unread-indicator"></div>
                `;
                
                btn.onclick = () => cambiarChat(usuario.user, usuario.user, usuario.foto, usuario.descripcion);
                contenedor.appendChild(btn);
            });
        });

        // --- 5. NAVEGACIÓN Y CAMBIO DE SALA ---
        
        function toggleAndroidChat(mostrar) {
            const chatPanel = document.getElementById('chat-area');
            if (mostrar) {
                chatPanel.classList.add('active');
            } else {
                chatPanel.classList.remove('active');
            }
        }

        function cambiarChat(id, nombre, foto, desc) {
            chatActivo = id;
            
            // Apagar notificación (punto naranja)
            const dot = document.getElementById('dot-' + id);
            if(dot) dot.style.display = 'none';

            // Actualizar Panel Derecho (Escritorio)
            document.getElementById('target-name-big').innerText = nombre;
            document.getElementById('target-avatar-big').src = foto || '/logo-conversando.png';

            // Actualizar Header Dinámico Superior (Diseño Elite)
            document.getElementById('chat-top-name').innerText = nombre;
            document.getElementById('chat-top-avatar').src = foto || '/logo-conversando.png';
            document.getElementById('chat-top-desc').innerText = desc || "En línea";
            
            const statusText = document.getElementById('chat-top-status-text');
            statusText.innerText = desc || "Disponible";
            
            // Colorear si el contacto está escuchando música
            if(desc && desc.includes('🎵')) {
                statusText.style.color = 'var(--msn-blue)';
            } else {
                statusText.style.color = '#333333';
            }

            // Limpiar historial de chat y pedir mensajes al servidor
            document.getElementById('messages-flow').innerHTML = "";
            socket.emit('get_private_history', id);

            // Activar vista deslizable en dispositivos móviles (Android/iOS)
            if(window.innerWidth <= 850) {
                toggleAndroidChat(true);
            }
        }

        // --- 6. MOTOR DE MENSAJERÍA, LINKS Y RELOJ ---
        
        function notificarEscritura() { 
            socket.emit('typing', { to: chatActivo, user: miUsuario }); 
        }
        
        socket.on('typing_status', datos => {
            if(datos.user === chatActivo && datos.to === miUsuario) {
                const indicador = document.getElementById('typing-indicator');
                indicador.innerText = datos.user + " está escribiendo un mensaje...";
                
                clearTimeout(timerEscritura);
                timerEscritura = setTimeout(() => { 
                    indicador.innerText = ""; 
                }, 3000);
            }
        });

        function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if(txt) {
                socket.emit('chat message', { to: chatActivo, text: txt });
                input.value = "";
                input.focus();
            }
        }

        function enviarZumbido() { 
            socket.emit('chat message', { to: chatActivo, isBuzz: true }); 
        }

        socket.on('chat message', m => {
            const origen = m.to || 'conversando';
            const esGrupo = ['conversando', 'juegos'].includes(origen);
            
            // Lógica para saber si el mensaje pertenece a la pestaña actual abierta
            const esParaMiPantalla = (esGrupo && origen === chatActivo) || (m.user === chatActivo) || (m.user === miUsuario && m.to === chatActivo);

            if(esParaMiPantalla) {
                pintarGlobo(m);
                if(m.user !== miUsuario) sndMsg.play().catch(()=>{});
                
                if(m.isBuzz) {
                    const appContenedor = document.getElementById('app');
                    appContenedor.classList.add('shake-nudge');
                    sndBuzz.play().catch(()=>{});
                    
                    setTimeout(() => {
                        appContenedor.classList.remove('shake-nudge');
                    }, 1500);
                }
            } else {
                // Notificación silenciosa en la barra lateral
                const idNotificacion = esGrupo ? origen : m.user;
                const punto = document.getElementById('dot-' + idNotificacion);
                if(punto) punto.style.display = 'block';
                sndMsg.play().catch(()=>{});
            }
        });

        function pintarGlobo(m) {
            const flow = document.getElementById('messages-flow');
            
            // Obtener hora exacta
            const ahora = new Date();
            const horaStr = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            
            const div = document.createElement('div');
            div.className = "message-row";

            // Procesar Zumbidos y Links Clickeables (Expresión Regular)
            let htmlTexto = m.isBuzz ? '<b style="color:var(--nudge-red);"><i class="fa-solid fa-bell"></i> TE HA ENVIADO UN ZUMBIDO</b>' : (m.texto || m.text);
            const regexURL = /(https?:\/\/[^\s]+)/g;
            htmlTexto = htmlTexto.replace(regexURL, url => `<a href="${url}" target="_blank">${url}</a>`);

            div.innerHTML = `
                <div class="message-header">
                    <span>${m.user} dice:</span>
                    <span class="message-time">${horaStr}</span>
                </div>
                <div class="message-body">${htmlTexto}</div>
            `;
            
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        // Recuperar historial de la base de datos de Onrender
        socket.on('actualizar_historial', d => { 
            if(d.target === chatActivo) {
                d.history.forEach(m => pintarGlobo(m)); 
            }
        });

        // --- 7. EDICIÓN DE PERFIL ---
        
        function abrirModal() { 
            document.getElementById('modal-perfil').style.display = 'flex'; 
        }
        
        function cerrarModal() { 
            document.getElementById('modal-perfil').style.display = 'none'; 
        }
        
        function guardarPerfil() {
            const archivo = document.getElementById('input-foto').files[0];
            const textoDesc = document.getElementById('input-desc').value;
            
            if(archivo) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('update_profile', { desc: textoDesc, foto: e.target.result });
                    cerrarModal();
                };
                reader.readAsDataURL(archivo);
            } else {
                socket.emit('update_profile', { desc: textoDesc, foto: null });
                cerrarModal();
            }
        }

        // --- 8. FIX DE TECLADO ANDROID Y ENTER ---
        
        // Evita que el teclado virtual rompa el diseño Flexbox
        window.visualViewport.addEventListener('resize', () => {
            const h = window.visualViewport.height;
            document.body.style.height = h + 'px';
            document.getElementById('app').style.height = h + 'px';
            document.getElementById('messages-flow').scrollTop = 999999;
        });

        // Permite enviar mensajes usando la tecla Enter sin usar Shift
        document.getElementById('chat-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                enviarMensaje(); 
            }
        });
    </script>
</body>
</html>
