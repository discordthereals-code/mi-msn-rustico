<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Chat - Messenger Moderno</title>

    <style>
        /* ============================================
           MODERN RESET & VARIABLES
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fc;
            --bg-sidebar: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6c757d;
            --accent: #4361ee;
            --accent-hover: #3a56d4;
            --border: #e9ecef;
            --message-in: #f1f3f5;
            --message-out: #4361ee;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f0f12;
                --bg-secondary: #1a1a1f;
                --bg-sidebar: #131318;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a8;
                --border: #2a2a30;
                --message-in: #2a2a30;
                --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ============================================
           LOGIN SCREEN
        ============================================ */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
        }

        .login-card {
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-card h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ============================================
           MAIN APP
        ============================================ */
        #app {
            display: none;
            height: 100vh;
            width: 100vw;
            background: var(--bg-primary);
        }

        /* Header Moderno */
        .modern-header {
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .user-details h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.online { background: #10b981; }
        .status-dot.busy { background: #ef4444; }
        .status-dot.away { background: #f59e0b; }

        /* Layout Principal */
        .main-layout {
            display: flex;
            height: calc(100vh - 73px);
        }

        /* Sidebar Moderno */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
            position: relative;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
        }

        .contact-item:hover {
            background: var(--bg-secondary);
        }

        .contact-item.active {
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent);
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-info {
            flex: 1;
            text-align: left;
        }

        .contact-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            display: none;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-details h4 {
            font-weight: 600;
            font-size: 16px;
        }

        .chat-header-details p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Messages Container - FIX WHATSAPP STYLE */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.outgoing .message-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.incoming .message-bubble {
            background: var(--message-in);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 8px;
        }

        /* Input Area - FIXED POSITION */
        .input-area {
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
            padding: 16px 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .emoji-picker {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .emoji-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            background: none;
            border: none;
            padding: 4px;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 15px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Typing Indicator */
        .typing-indicator {
            padding: 8px 20px;
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* YouTube Widget Moderno */
        .yt-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: var(--bg-sidebar);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        /* Responsive - WhatsApp Style */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 73px;
                bottom: 0;
                width: 280px;
                z-index: 200;
                transition: left 0.3s;
                background: var(--bg-sidebar);
            }

            .sidebar.open {
                left: 0;
            }

            .chat-area {
                width: 100%;
            }

            .yt-widget {
                display: none;
            }

            .message {
                max-width: 85%;
            }
        }

        /* Animaciones */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* Scrollbar personalizado */
        .messages-container::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track,
        .contact-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .messages-container::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>✨ Nexus Chat</h1>
            <input type="text" id="login-u" class="login-input" placeholder="Nombre de usuario">
            <input type="password" id="login-p" class="login-input" placeholder="Contraseña">
            <button onclick="handleLogin()" class="login-btn">Iniciar Sesión</button>
            <p style="margin-top: 16px; font-size: 12px; color: var(--text-secondary);">
                Crea una cuenta o usa cualquier usuario/contraseña
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <header class="modern-header">
            <div class="user-info" onclick="openProfileModal()">
                <img id="my-avatar" class="user-avatar" src="https://ui-avatars.com/api/?background=4361ee&color=fff&bold=true">
                <div class="user-details">
                    <h3 id="my-name">Usuario</h3>
                    <div class="user-status" onclick="cycleStatus(event)">
                        <span id="my-status-dot" class="status-dot online"></span>
                        <span id="my-status-text">Disponible</span>
                    </div>
                </div>
            </div>
            <button class="send-btn" style="background: transparent; color: var(--text-secondary); width: auto; border-radius: 8px; padding: 0 12px;" onclick="openProfileModal()">⚙️</button>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h4>Conversaciones</h4>
                </div>
                <div class="contact-list" id="contact-list">
                    <button class="contact-item active" data-id="general" onclick="switchChat('general', 'General')">
                        <img class="contact-avatar" src="https://ui-avatars.com/api/?background=4361ee&color=fff&name=G">
                        <div class="contact-info">
                            <div class="contact-name">💬 General</div>
                            <div class="contact-preview">Chat principal</div>
                        </div>
                        <span class="badge" id="badge-general">0</span>
                    </button>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <img id="chat-avatar" class="chat-header-avatar" src="https://ui-avatars.com/api/?background=4361ee&color=fff&name=G">
                        <div class="chat-header-details">
                            <h4 id="chat-name">General</h4>
                            <p id="chat-status">En línea</p>
                        </div>
                    </div>
                </div>

                <div class="messages-container" id="messages-container"></div>
                <div class="typing-indicator" id="typing-indicator"></div>

                <div class="input-area">
                    <div class="emoji-picker">
                        <button class="emoji-btn" onclick="insertEmoji('😊')">😊</button>
                        <button class="emoji-btn" onclick="insertEmoji('😂')">😂</button>
                        <button class="emoji-btn" onclick="insertEmoji('❤️')">❤️</button>
                        <button class="emoji-btn" onclick="insertEmoji('🔥')">🔥</button>
                        <button class="emoji-btn" onclick="insertEmoji('👍')">👍</button>
                        <button class="emoji-btn" onclick="sendNudge()">🔔</button>
                        <button class="emoji-btn" onclick="document.getElementById('file-input').click()">📎</button>
                        <input type="file" id="file-input" style="display: none" onchange="sendFile(this)">
                    </div>
                    <div class="input-wrapper">
                        <textarea id="message-input" class="message-input" rows="1" placeholder="Escribe un mensaje..."></textarea>
                        <button class="send-btn" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- YouTube Widget -->
        <div class="yt-widget" id="yt-widget">
            <div id="yt-player"></div>
            <input type="text" id="yt-url" placeholder="Buscar canción o pegar link..." style="width: 100%; margin-top: 8px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary);">
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: var(--bg-primary); border-radius: var(--radius); padding: 30px; width: 400px; max-width: 90%;">
            <h3 style="margin-bottom: 20px;">Editar Perfil</h3>
            <input type="text" id="profile-status" class="login-input" placeholder="Estado">
            <input type="file" id="profile-avatar" accept="image/*" style="margin-top: 10px;">
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button onclick="closeProfileModal()" class="login-btn" style="background: var(--text-secondary);">Cancelar</button>
                <button onclick="saveProfile()" class="login-btn">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ==================== CONFIGURACIÓN ====================
        const socket = io();
        let currentUser = localStorage.getItem('nexus_user') || '';
        let currentChat = 'general';
        let unreadCounts = {};
        let typingTimeout;
        let currentStatus = 'online';
        let ytPlayer;

        // ==================== NOTIFICACIONES FIX ====================
        function updateBadge(chatId, count) {
            const badge = document.getElementById(`badge-${chatId}`);
            if (badge) {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        }

        // ==================== WHATSAPP STYLE SCROLL ====================
        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // FIX: El input no mueve la pantalla
        const messageInputElement = document.getElementById('message-input');
        if (messageInputElement) {
            messageInputElement.addEventListener('focus', () => {
                setTimeout(scrollToBottom, 100);
            });

            messageInputElement.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
                reportTyping();
            });
        }

        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        if (messageInputElement) {
            messageInputElement.addEventListener('input', function() {
                autoResize(this);
            });
        }

        // ==================== ZUMBIDOS CON SONIDO ====================
        function playBuzzSound() {
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio necesita interacción'));
        }

        function sendNudge() {
            socket.emit('chat message', { 
                to: currentChat, 
                isBuzz: true,
                user: currentUser 
            });
            playBuzzSound();
            
            // Animación visual
            const chatArea = document.querySelector('.chat-area');
            chatArea.classList.add('shake');
            setTimeout(() => chatArea.classList.remove('shake'), 300);
        }

        // ==================== INTERFAZ MODERNA ====================
        function appendMessage(msg, isOwn) {
            const container = document.getElementById('messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'outgoing' : 'incoming'}`;
            
            let content = msg.text || msg.texto || '';
            if (msg.isBuzz) {
                content = '🔔 ¡Te ha enviado un zumbido! 🔔';
            } else if (msg.file) {
                content = `📎 <a href="${msg.file.data}" download="${msg.file.name}" style="color: inherit;">${msg.file.name}</a>`;
            } else {
                // Link detector
                content = content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: inherit; text-decoration: underline;">$1</a>');
            }
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="message-bubble">${content}</div>
                <div class="message-meta">${msg.user || 'Usuario'} • ${time}</div>
            `;
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // ==================== SOCKET EVENTS ====================
        function handleLogin() {
            const user = document.getElementById('login-u').value.trim();
            const pass = document.getElementById('login-p').value.trim();
            
            if (!user || !pass) {
                alert('Completa todos los campos');
                return;
            }
            
            localStorage.setItem('nexus_user', user);
            localStorage.setItem('nexus_pass', pass);
            currentUser = user;
            
            socket.emit('login', { user, pass });
        }

        socket.on('login_status', (res) => {
            if (res.success) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('my-name').textContent = res.user;
                document.getElementById('my-avatar').src = `https://ui-avatars.com/api/?background=4361ee&color=fff&bold=true&name=${encodeURIComponent(res.user)}`;
                currentUser = res.user;
                loadContacts();
            } else {
                alert('Error de autenticación: ' + (res.msg || 'Credenciales inválidas'));
            }
        });

        function loadContacts() {
            socket.emit('get_contacts');
        }

        socket.on('lista_contactos', (contacts) => {
            const container = document.getElementById('contact-list');
            // Mantener el chat general
            container.innerHTML = `
                <button class="contact-item active" data-id="general" onclick="switchChat('general', 'General')">
                    <img class="contact-avatar" src="https://ui-avatars.com/api/?background=4361ee&color=fff&name=G">
                    <div class="contact-info">
                        <div class="contact-name">💬 General</div>
                        <div class="contact-preview">Chat principal</div>
                    </div>
                    <span class="badge" id="badge-general">0</span>
                </button>
            `;
            
            if (contacts && Array.isArray(contacts)) {
                contacts.forEach(contact => {
                    if (contact.user !== currentUser) {
                        const btn = document.createElement('button');
                        btn.className = 'contact-item';
                        btn.setAttribute('data-id', contact.user);
                        btn.onclick = () => switchChat(contact.user, contact.user);
                        btn.innerHTML = `
                            <img class="contact-avatar" src="${contact.foto || `https://ui-avatars.com/api/?background=764ba2&color=fff&name=${encodeURIComponent(contact.user)}`}">
                            <div class="contact-info">
                                <div class="contact-name">${contact.user}</div>
                                <div class="contact-preview">${contact.descripcion || 'Disponible'}</div>
                            </div>
                            <span class="badge" id="badge-${contact.user}">0</span>
                        `;
                        container.appendChild(btn);
                    }
                });
            }
        });

        function switchChat(chatId, chatName) {
            currentChat = chatId;
            document.getElementById('chat-name').textContent = chatName;
            document.getElementById('chat-avatar').src = `https://ui-avatars.com/api/?background=4361ee&color=fff&name=${encodeURIComponent(chatName.substring(0,2))}`;
            
            // Resetear badge
            unreadCounts[chatId] = 0;
            updateBadge(chatId, 0);
            
            // Marcar como activo
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-id') === chatId) {
                    item.classList.add('active');
                }
            });
            
            // Cargar historial
            document.getElementById('messages-container').innerHTML = '';
            socket.emit('get_private_history', chatId);
        }

        socket.on('actualizar_historial', (data) => {
            if (data.target === currentChat) {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                if (data.history && Array.isArray(data.history)) {
                    data.history.forEach(msg => {
                        const isOwn = msg.user === currentUser;
                        appendMessage(msg, isOwn);
                    });
                }
                scrollToBottom();
            }
        });

        socket.on('chat message', (msg) => {
            const isCurrentChat = (msg.to === currentChat && msg.user !== currentUser) || 
                                 (msg.user === currentChat);
            const isOwn = msg.user === currentUser;
            
            if (isCurrentChat && !isOwn) {
                appendMessage(msg, false);
                if (msg.isBuzz) {
                    playBuzzSound();
                    document.querySelector('.chat-area').classList.add('shake');
                    setTimeout(() => document.querySelector('.chat-area').classList.remove('shake'), 300);
                }
            } else if (!isCurrentChat && !isOwn && msg.user !== currentUser) {
                // Notificación en badge
                const chatId = msg.to === currentUser ? msg.user : msg.to;
                if (chatId && chatId !== currentChat) {
                    unreadCounts[chatId] = (unreadCounts[chatId] || 0) + 1;
                    updateBadge(chatId, unreadCounts[chatId]);
                }
            }
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (text) {
                socket.emit('chat message', {
                    to: currentChat,
                    text: text,
                    user: currentUser
                });
                appendMessage({ text: text, user: currentUser }, true);
                input.value = '';
                input.style.height = 'auto';
            }
        }

        function reportTyping() {
            socket.emit('typing', { to: currentChat, user: currentUser });
        }

        socket.on('typing_status', (data) => {
            if (data.to === currentUser && data.user === currentChat) {
                const indicator = document.getElementById('typing-indicator');
                indicator.textContent = `${data.user} está escribiendo...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    indicator.textContent = '';
                }, 2000);
            }
        });

        function insertEmoji(emoji) {
            const input = document.getElementById('message-input');
            input.value += emoji;
            input.focus();
            autoResize(input);
        }

        function sendFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('chat message', {
                    to: currentChat,
                    file: { name: file.name, data: e.target.result },
                    user: currentUser
                });
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function cycleStatus(event) {
            event.stopPropagation();
            const statuses = [
                { text: 'Disponible', class: 'online' },
                { text: 'Ocupado', class: 'busy' },
                { text: 'Ausente', class: 'away' }
            ];
            const currentIndex = statuses.findIndex(s => s.text === document.getElementById('my-status-text').textContent);
            const next = statuses[(currentIndex + 1) % statuses.length];
            document.getElementById('my-status-text').textContent = next.text;
            document.getElementById('my-status-dot').className = `status-dot ${next.class}`;
            socket.emit('update_profile', { desc: next.text });
        }

        function openProfileModal() {
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function saveProfile() {
            const status = document.getElementById('profile-status').value;
            const file = document.getElementById('profile-avatar').files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('update_profile', { desc: status, foto: e.target.result });
                };
                reader.readAsDataURL(file);
            } else if (status) {
                socket.emit('update_profile', { desc: status });
            }
            closeProfileModal();
        }

        // YouTube Player
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '180',
                width: '100%',
                videoId: '',
                playerVars: { controls: 1, modestbranding: 1, rel: 0 }
            });
        }

        const ytUrlInput = document.getElementById('yt-url');
        if (ytUrlInput) {
            ytUrlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const url = e.target.value;
                    if (url.includes('v=')) {
                        const videoId = url.split('v=')[1].split('&')[0];
                        if (ytPlayer) ytPlayer.loadVideoById(videoId);
                    } else if (url.includes('youtu.be/')) {
                        const videoId = url.split('youtu.be/')[1].split('?')[0];
                        if (ytPlayer) ytPlayer.loadVideoById(videoId);
                    } else if (url.trim()) {
                        if (ytPlayer) ytPlayer.loadPlaylist({ list: url, listType: 'search' });
                    }
                }
            });
        }

        // Inicialización
        if (currentUser) {
            setTimeout(() => {
                socket.emit('login', { user: currentUser, pass: localStorage.getItem('nexus_pass') });
            }, 100);
        }

        // Mobile sidebar toggle
        let sidebarOpen = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebar.classList.add('open');
            } else {
                sidebar.classList.remove('open');
            }
        }

        // Click fuera del sidebar en móvil
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                const isClickInside = sidebar.contains(e.target);
                const isHeaderClick = e.target.closest('.user-info');
                if (!isClickInside && !isHeaderClick && sidebarOpen) {
                    sidebar.classList.remove('open');
                    sidebarOpen = false;
                }
            }
        });
    </script>
</body>
</html>
