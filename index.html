<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REALS</title>
    <style>
        body { background: #0d0d0d; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; color: #eee; }
        #login-screen { align-self: center; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #ffff00; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        
        #chat-window { display: none; width: 100%; max-width: 800px; height: 100vh; background: #141414; flex-direction: column; }
        #title-bar { background: #222; color: #ffff00; padding: 15px; border-bottom: 2px solid #ffff00; display: flex; justify-content: space-between; }
        #messages-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        
        .msg-item { margin-bottom: 15px; padding: 10px; border-radius: 10px; background: #1f1f1f; border-left: 4px solid #ffff00; }
        .msg-time { font-size: 10px; color: #666; display: block; margin-bottom: 5px; }
        .msg-user { color: #ffff00; font-weight: bold; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        audio { height: 35px; margin-top: 10px; filter: invert(1); }

        /* AREA DE GRABACIÓN PREVIA */
        #voice-preview { display: none; background: #222; padding: 10px; border-top: 2px solid #ff4444; align-items: center; gap: 10px; }

        /* INPUT AREA */
        #input-area { padding: 15px; background: #1a1a1a; }
        .controls { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        #msg-input { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 20px; }
        
        .btn { border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .btn-clip { background: #333; color: white; }
        .btn-mic { background: #333; color: white; }
        .btn-mic.recording { background: #ff4444; animation: pulse 1s infinite; }
        .btn-buzz { background: #ff4444; border-radius: 10px; color: white; width: 40px; font-weight: bold; }
        .btn-send { background: #ffff00; border-radius: 10px; width: auto; padding: 0 20px; font-weight: bold; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(6px,6px); } 50% { transform: translate(-6px,-6px); } }
        .shake-effect { animation: shake 0.1s 6; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#ffff00">THE REALS</h1>
    <input type="text" id="user" class="login-input" placeholder="Tu Nombre">
    <input type="password" id="pass" class="login-input" placeholder="Tu Clave">
    <button onclick="login()" style="background:#ffff00; width:100%; padding:12px; border:none; font-weight:bold; cursor:pointer">ENTRAR</button>
</div>

<div id="chat-window">
    <div id="title-bar">
        <span id="tema-title">THE REALS</span>
        <button onclick="location.reload()" style="background:none; border:none; color:#666; cursor:pointer">Salir</button>
    </div>
    
    <div id="messages-container"><ul id="messages" style="list-style:none; padding:0"></ul></div>

    <div id="voice-preview">
        <span style="color:#ff4444">🎤</span>
        <audio id="audio-playback" controls></audio>
        <button onclick="cancelAudio()" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer">Borrar</button>
        <button onclick="sendAudio()" style="background:#ffff00; color:black; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer">Enviar</button>
    </div>

    <div id="input-area">
        <div class="controls">
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendFile(this)">
            <button class="btn btn-clip" onclick="document.getElementById('file-input').click()">📎</button>
            
            <input id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter')sendText()">
            
            <button class="btn btn-mic" id="mic-btn" onclick="handleMic()">🎤</button>
            <button class="btn btn-buzz" onclick="sendBuzz()">Z!</button>
            <button class="btn btn-send" onclick="sendText()">ENVIAR</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    let miUser = "", recorder, chunks = [], currentAudioBase64 = null;

    function login() {
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value.trim();
        if(user && pass) socket.emit('login', { user, pass });
    }

    socket.on('login_status', (res) => {
        if(res.success) {
            miUser = res.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('tema-title').innerText = res.tema;
            res.history.forEach(m => render(m));
        } else if(!res.init) alert(res.msg);
    });

    socket.on('cambiar tema', t => document.getElementById('tema-title').innerText = t);

    const getH = () => new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    function sendText() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim()) {
            socket.emit('chat message', { user: miUser, text: inp.value, time: getH() });
            inp.value = '';
        }
    }

    function sendBuzz() {
        socket.emit('chat message', { user: miUser, text: "¡ZUMBIDO!", isBuzz: true, time: getH() });
    }

    // ARCHIVOS REALES
    function sendFile(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => socket.emit('chat message', { user: miUser, img: e.target.result, time: getH() });
            reader.readAsDataURL(input.files[0]);
        }
    }

    // MICROFONO ESTILO WHATSAPP
    async function handleMic() {
        const btn = document.getElementById('mic-btn');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    currentAudioBase64 = reader.result;
                    document.getElementById('audio-playback').src = currentAudioBase64;
                    document.getElementById('voice-preview').style.display = 'flex';
                };
            };
            recorder.start();
            btn.classList.add('recording');
        } else {
            recorder.stop();
            btn.classList.remove('recording');
        }
    }

    function cancelAudio() {
        document.getElementById('voice-preview').style.display = 'none';
        currentAudioBase64 = null;
    }

    function sendAudio() {
        if(currentAudioBase64) {
            socket.emit('chat message', { user: miUser, audio: currentAudioBase64, time: getH() });
            cancelAudio();
        }
    }

    function playBuzzSound() {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    }

    socket.on('chat message', (m) => {
        render(m);
        if(m.isBuzz) {
            playBuzzSound();
            document.getElementById('chat-window').classList.add('shake-effect');
            setTimeout(() => document.getElementById('chat-window').classList.remove('shake-effect'), 500);
        }
    });

    function render(m) {
        const li = document.createElement('li');
        li.className = "msg-item";
        let body = `<span class="msg-time">${m.time}</span><span class="msg-user">${m.user}:</span> `;
        
        if(m.audio) body += `<br><audio controls src="${m.audio}"></audio>`;
        else if(m.img) body += `<br><img src="${m.img}" class="chat-img">`;
        else body += m.text;

        li.innerHTML = body;
        document.getElementById('messages').appendChild(li);
        document.getElementById('messages-container').scrollTop = 999999;
    }
</script>
</body>
</html>
