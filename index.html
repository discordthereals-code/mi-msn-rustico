<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSN Messenger - Full Experience 2024</title>
    
    <style>
        :root {
            --msn-blue: #0055e5;
            --msn-bg: #71ADFF;
            --header-grad: linear-gradient(to bottom, #f9fcff 0%, #dcecfc 100%);
            --border-color: #b4c7de;
            --text-dark: #333333;
            --text-gray: #666666;
            --white: #ffffff;
        }

        /* RESET GENERAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--msn-bg);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* CONTENEDOR DE LA APLICACIÓN */
        #app {
            display: none; /* Se activa tras el login exitoso */
            width: 1050px;
            max-width: 100vw;
            height: 800px;
            max-height: 100vh;
            background: var(--white);
            border: 1px solid #444;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* CABECERA PRINCIPAL */
        header {
            background: var(--header-grad);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .my-profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
            flex: 1;
        }

        #my-avatar {
            width: 55px;
            height: 55px;
            border: 2px solid #fff;
            border-radius: 5px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            background: #eee;
            transition: transform 0.2s;
        }

        #my-avatar:hover { transform: scale(1.05); }

        .my-data-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #display-name {
            color: var(--msn-blue);
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #personal-message {
            color: var(--text-gray);
            font-size: 11px;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ESTRUCTURA MAIN: IZQUIERDA, CENTRO, DERECHA */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #fff;
        }

        /* COLUMNA IZQUIERDA: LISTA DE CONTACTOS Y GRUPOS */
        #sidebar-left {
            width: 280px;
            border-right: 1px solid #d0deee;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            flex-shrink: 0;
        }

        /* COLUMNA CENTRAL: ÁREA DE CHAT */
        #chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
        }

        /* COLUMNA DERECHA: PERFIL DEL CONTACTO ACTUAL */
        #sidebar-right {
            width: 220px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            border-left: 1px solid #d0deee;
            flex-shrink: 0;
        }

        /* RESPONSIVE PARA ANDROID / MÓVILES */
        @media (max-width: 850px) {
            #sidebar-right {
                position: absolute;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 1000;
                width: 240px;
                background: white;
                transform: translateX(100%);
                transition: transform 0.4s ease-in-out;
            }
            #sidebar-right.active {
                transform: translateX(0);
                box-shadow: -10px 0 30px rgba(0,0,0,0.2);
            }
            #sidebar-left { width: 90px; }
            #sidebar-left .contact-text, #sidebar-left .group-label { display: none; }
            #info-toggle-btn { display: block !important; }
        }

        #info-toggle-btn {
            display: none;
            padding: 8px 15px;
            background: var(--msn-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ESTILOS DE LISTA (CONTACTOS Y SALAS) */
        .group-label {
            background: #eff6ff;
            padding: 10px 15px;
            font-size: 11px;
            font-weight: bold;
            color: #4a607a;
            border-bottom: 1px solid #d0deee;
            text-transform: uppercase;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            border-bottom: 1px solid #f2f6fb;
            position: relative;
            transition: background 0.2s;
        }

        .list-item:hover { background-color: #f4f9ff; }

        .badge-unread {
            position: absolute;
            top: 8px;
            right: 12px;
            background: #ff8c00;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            display: none;
        }

        .contact-text {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        .contact-status-msg {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ÁREA DE MENSAJES */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background-color: #fff;
        }

        .message-row {
            display: flex;
            flex-direction: column;
        }

        .message-sender {
            font-size: 12px;
            font-weight: bold;
            color: var(--msn-blue);
            margin-bottom: 4px;
        }

        .message-time {
            font-weight: normal;
            color: #bbb;
            font-size: 10px;
            margin-left: 8px;
        }

        .message-body {
            font-size: 14px;
            color: #222;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* BARRA DE HERRAMIENTAS Y ESCRITURA */
        #chat-toolbar {
            padding: 10px 20px;
            background: #f1f5f9;
            border-top: 1px solid #d0deee;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .emoji-icon {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        #typing-indicator {
            font-size: 11px;
            color: #31a24c;
            padding: 5px 20px;
            background: #f7faff;
            height: 25px;
            font-style: italic;
        }

        #input-container {
            padding: 15px;
            background: #f7faff;
            border-top: 1px solid #eee;
        }

        #message-input {
            width: 100%;
            height: 70px;
            padding: 12px;
            border: 1px solid #a0b5d0;
            border-radius: 5px;
            resize: none;
            font-size: 15px;
            outline: none;
        }

        .send-btn-large {
            width: 100%;
            margin-top: 12px;
            background: var(--msn-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        /* COMPONENTES DE IMAGEN */
        .avatar-small {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #ccc;
            flex-shrink: 0;
        }

        .avatar-large-display {
            width: 150px;
            height: 150px;
            border: 6px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .online-status {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px;
        }
        .is-online { background-color: #31a24c; }
        .is-offline { background-color: #bdc1c6; }

        /* EFECTO ZUMBIDO */
        .buzz-shake { animation: buzz-anim 0.1s 10; }
        @keyframes buzz-anim {
            0% { transform: translate(0,0); }
            20% { transform: translate(8px,8px); }
            40% { transform: translate(-8px,-8px); }
            60% { transform: translate(8px,-8px); }
            80% { transform: translate(-8px,8px); }
            100% { transform: translate(0,0); }
        }

        /* LOGIN Y MODALES */
        #login-view {
            background: white;
            padding: 50px;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        #profile-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center;
            z-index: 5000;
        }

        .modal-content-box {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 400px;
            max-width: 90%;
            text-align: center;
        }
    </style>
</head>
<body onclick="enableAudioAutoPlay()">

    <div id="login-view">
        <h1 style="color:var(--msn-blue); margin-bottom:10px; font-style: italic;">MSN Messenger</h1>
        <p style="font-size:14px; color:#666; margin-bottom:30px;">Inicia sesión con tu cuenta de NET Passport</p>
        
        <input id="login-user" type="text" placeholder="Usuario" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px;">
        <input id="login-pass" type="password" placeholder="Contraseña" style="width:100%; padding:15px; margin-bottom:20px; border:1px solid #ccc; border-radius:8px;">
        
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--msn-blue); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">Iniciar Sesión</button>
    </div>

    <div id="app">
        <header>
            <div class="my-profile-section">
                <img id="my-avatar" onclick="openProfileModal()" src="" title="Click para editar perfil">
                <div class="my-data-text">
                    <b id="display-name">Conectando...</b>
                    <small id="personal-message">Cargando frase de estado...</small>
                </div>
            </div>
            <button onclick="toggleSidebarRight()" id="info-toggle-btn">Ver Perfil</button>
        </header>

        <main>
            <div id="sidebar-left">
                <div class="group-label">Salas de Grupo</div>
                
                <button class="list-item" onclick="switchRoom('conversando', 'Conversando', '/logo-conversando.png', 'Sala General de Chat')">
                    <img src="/logo-conversando.png" class="avatar-small" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <div class="contact-text">
                        <span class="contact-name">Conversando</span>
                        <span class="contact-status-msg">Sala Global</span>
                    </div>
                    <span class="badge-unread" id="badge-conversando">0</span>
                </button>

                <button class="list-item" onclick="switchRoom('juegos', 'Juegos', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala de Juegos Retro')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" class="avatar-small">
                    <div class="contact-text">
                        <span class="contact-name">Juegos</span>
                        <span class="contact-status-msg">Diversión Retro</span>
                    </div>
                    <span class="badge-unread" id="badge-juegos">0</span>
                </button>

                <button class="list-item" onclick="switchRoom('solotodo', 'Solo Todo', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala de Compra y Venta')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" class="avatar-small">
                    <div class="contact-text">
                        <span class="contact-name">Solo Todo</span>
                        <span class="contact-status-msg">Mercado Libre</span>
                    </div>
                    <span class="badge-unread" id="badge-solotodo">0</span>
                </button>

                <div class="group-label">Contactos (Online)</div>
                <div id="contacts-list-container" style="flex:1; overflow-y:auto;">
                    </div>
            </div>

            <div id="chat-window">
                <div id="messages-container"></div>
                
                <div id="typing-indicator"></div>

                <div id="chat-toolbar">
                    <span class="emoji-icon" onclick="addEmojiToInput('😊')">😊</span>
                    <span class="emoji-icon" onclick="addEmojiToInput('😂')">😂</span>
                    <span class="emoji-icon" onclick="addEmojiToInput('😛')">😛</span>
                    <span class="emoji-icon" onclick="addEmojiToInput('😮')">😮</span>
                    <span class="emoji-icon" onclick="addEmojiToInput('❤️')">❤️</span>
                    <button onclick="sendBuzz()" style="margin-left:auto; font-size:11px; padding:6px 12px; cursor:pointer; background:#fff; border:1px solid #ccc; border-radius:4px;">🔔 ZUMBIDO</button>
                </div>

                <div id="input-container">
                    <textarea id="message-input" placeholder="Escribe un mensaje aquí..." oninput="notifyTyping()"></textarea>
                    <button class="send-btn-large" onclick="processSendMessage()">Enviar (Enter)</button>
                </div>
            </div>

            <div id="sidebar-right">
                <div style="text-align:center; width:100%;">
                    <img id="current-target-img" class="avatar-large-display" src="https://via.placeholder.com/150">
                    <div id="current-target-name" style="font-size:18px; font-weight:bold; color:var(--msn-blue); margin-top:20px;">...</div>
                    <div id="current-target-desc" style="font-size:12px; color:#666; margin-top:10px; padding:0 15px; font-style:italic;">...</div>
                </div>

                <div style="margin-top:auto; border-top:1px solid #eee; padding-top:25px; width:100%; text-align:center;">
                    <img id="mini-my-avatar" class="avatar-large-display" style="width:100px; height:100px; border-width:4px;">
                    <div style="font-size:12px; color:#999; margin-top:10px;">Tú mismo</div>
                </div>
            </div>
        </main>
    </div>

    <div id="profile-modal">
        <div class="modal-content-box">
            <h3 style="color:var(--msn-blue); margin-bottom:20px;">Mi Configuración Personal</h3>
            
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:12px; font-weight:bold; color:#555;">Frase de Estado:</label>
                <input id="edit-status-msg" type="text" placeholder="¿Qué tienes en mente?" style="width:100%; padding:12px; margin-top:5px; border:1px solid #ccc; border-radius:6px;">
            </div>
            
            <div style="text-align:left; margin-bottom:25px;">
                <label style="font-size:12px; font-weight:bold; color:#555;">Foto de Perfil:</label>
                <input type="file" id="edit-avatar-file" accept="image/*" style="width:100%; margin-top:5px; font-size:12px;">
            </div>
            
            <div style="display:flex; gap:15px;">
                <button onclick="saveProfileChanges()" style="flex:1; padding:15px; background:var(--msn-blue); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Guardar Cambios</button>
                <button onclick="closeProfileModal()" style="flex:1; padding:15px; background:#eee; border:none; border-radius:6px; cursor:pointer;">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // --- 1. CONFIGURACIÓN INICIAL ---
        const socket = io();
        let myUsername = localStorage.getItem('msn_user') || "";
        let activeRoom = 'conversando';
        let unreadCounts = {};
        let typingTimer;

        // Sonidos
        const audioLogin = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const audioMessage = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const audioBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');

        function enableAudioAutoPlay() {
            [audioLogin, audioMessage, audioBuzz].forEach(a => {
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
            });
        }

        // --- 2. MANEJO DE LOGIN ---
        if (myUsername) {
            socket.emit('login', { user: myUsername, pass: localStorage.getItem('msn_pass') });
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            if (!u || !p) return alert("Completa los datos");
            
            localStorage.setItem('msn_user', u);
            localStorage.setItem('msn_pass', p);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', res => {
            if (res.success) {
                myUsername = res.user;
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateMyIdentity(res.perfil);
                switchRoom('conversando', 'Conversando', '/logo-conversando.png', 'Sala General de Chat');
                audioLogin.play().catch(() => {});
            } else {
                alert("Error al entrar: " + res.msg);
                localStorage.clear();
            }
        });

        function updateMyIdentity(perfil) {
            const img = perfil.foto || "https://via.placeholder.com/150";
            document.getElementById('my-avatar').src = img;
            document.getElementById('mini-my-avatar').src = img;
            document.getElementById('display-name').innerText = myUsername;
            document.getElementById('personal-message').innerText = perfil.descripcion || "Disponible";
        }

        // --- 3. LISTA DE CONTACTOS Y ESTADOS ---
        socket.on('lista_contactos', lista => {
            const container = document.getElementById('contacts-list-container');
            container.innerHTML = "";
            
            lista.forEach(u => {
                if (u.user === myUsername) {
                    updateMyIdentity(u); // Sync propio
                    return;
                }

                const btn = document.createElement('button');
                btn.className = "list-item";
                const dotColor = u.online ? 'is-online' : 'is-offline';
                
                btn.innerHTML = `
                    <img src="${u.foto || 'https://via.placeholder.com/45'}" class="avatar-small">
                    <div class="contact-text">
                        <span class="contact-name"><span class="online-status ${dotColor}"></span>${u.user}</span>
                        <span class="contact-status-msg">${u.descripcion || 'Disponible'}</span>
                    </div>
                    <span class="badge-unread" id="badge-${u.user}">0</span>
                `;

                btn.onclick = () => {
                    switchRoom(u.user, u.user, u.foto, u.descripcion);
                    if (window.innerWidth < 850) toggleSidebarRight(false);
                };

                container.appendChild(btn);
                if (unreadCounts[u.user]) refreshBadge(u.user, unreadCounts[u.user]);
            });
        });

        // --- 4. CONTROL DE SALAS Y CHAT ---
        function switchRoom(id, name, img, desc) {
            activeRoom = id;
            unreadCounts[id] = 0;
            refreshBadge(id, 0);

            document.getElementById('current-target-name').innerText = name;
            document.getElementById('current-target-desc').innerText = desc || "Disponible";
            document.getElementById('current-target-img').src = img || "https://via.placeholder.com/150?text=" + name;
            
            document.getElementById('messages-container').innerHTML = "";
            document.getElementById('typing-indicator').innerText = "";
            
            socket.emit('get_private_history', id);
        }

        function refreshBadge(id, count) {
            const b = document.getElementById('badge-' + id);
            if (b) {
                b.innerText = count;
                b.style.display = count > 0 ? 'block' : 'none';
            }
        }

        function notifyTyping() {
            socket.emit('typing', { to: activeRoom, user: myUsername });
        }

        socket.on('typing_status', data => {
            if (data.to === myUsername && data.user === activeRoom) {
                const fb = document.getElementById('typing-indicator');
                fb.innerText = `${data.user} está escribiendo un mensaje...`;
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => fb.innerText = "", 3000);
            }
        });

        function processSendMessage() {
            const input = document.getElementById('message-input');
            const val = input.value.trim();
            if (val) {
                socket.emit('chat message', { to: activeRoom, text: val });
                input.value = "";
                input.focus();
            }
        }

        function sendBuzz() {
            socket.emit('chat message', { to: activeRoom, isBuzz: true });
        }

        socket.on('chat message', m => {
            const roomOrigin = m.to || 'conversando';
            const isGroup = ['conversando', 'juegos', 'solotodo'].includes(roomOrigin);
            
            const isForCurrentView = (isGroup && roomOrigin === activeRoom) || 
                                     (m.user === activeRoom && m.to === myUsername) || 
                                     (m.user === myUsername && m.to === activeRoom);

            if (isForCurrentView) {
                appendMessage(m);
                if (m.user !== myUsername) audioMessage.play().catch(() => {});
            } else {
                const notifyId = isGroup ? roomOrigin : m.user;
                unreadCounts[notifyId] = (unreadCounts[notifyId] || 0) + 1;
                refreshBadge(notifyId, unreadCounts[notifyId]);
                audioMessage.play().catch(() => {});
            }

            if (m.isBuzz && isForCurrentView) {
                const el = document.getElementById('app');
                el.classList.add('buzz-shake');
                audioBuzz.play().catch(() => {});
                setTimeout(() => el.classList.remove('buzz-shake'), 800);
            }
        });

        socket.on('actualizar_historial', res => {
            if (res.target === activeRoom) {
                const cont = document.getElementById('messages-container');
                cont.innerHTML = "";
                res.history.forEach(m => appendMessage(m));
            }
        });

        function appendMessage(m) {
            const cont = document.getElementById('messages-container');
            const row = document.createElement('div');
            row.className = "message-row";
            
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let content = m.texto || m.text || "";

            if (m.isBuzz) {
                content = `<span style="color:red; font-weight:bold;">¡TE HA ENVIADO UN ZUMBIDO!</span>`;
            } else {
                content = content.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:var(--msn-blue);">${url}</a>`);
                content = content.replace(/:\)/g, '😊').replace(/\(L\)/g, '❤️').replace(/:P/g, '😛');
            }

            row.innerHTML = `
                <div class="message-sender">${m.user} dice: <span class="message-time">[${timeStr}]</span></div>
                <div class="message-body">${content}</div>
            `;
            
            cont.appendChild(row);
            cont.scrollTop = cont.scrollHeight;
        }

        // --- 5. PERFIL Y MODAL ---
        function openProfileModal() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }
        function toggleSidebarRight(val) { 
            const s = document.getElementById('sidebar-right');
            if(val === false) s.classList.remove('active');
            else s.classList.toggle('active');
        }

        function saveProfileChanges() {
            const file = document.getElementById('edit-avatar-file').files[0];
            const desc = document.getElementById('edit-status-msg').value;

            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    socket.emit('update_profile', { desc: desc, foto: reader.result });
                    closeProfileModal();
                };
                reader.readAsDataURL(file);
            } else {
                socket.emit('update_profile', { desc: desc, foto: null });
                closeProfileModal();
            }
        }

        function addEmojiToInput(emo) {
            const i = document.getElementById('message-input');
            i.value += emo;
            i.focus();
        }

        document.getElementById('message-input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                processSendMessage();
            }
        });
    </script>
</body>
</html>
