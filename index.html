<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REALS - MSN</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
        }

        #msn-window { 
            width: 95%; 
            max-width: 700px; 
            height: 90vh; 
            background: #1a1a1a; 
            border: 2px solid #333; 
            border-radius: 15px; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0px 0px 30px rgba(0,0,0,1);
        }

        #title-bar { 
            background: #222; 
            color: #ffff00; 
            padding: 15px; 
            font-weight: 900; 
            font-size: 20px;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 2px solid #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        #topic-bar {
            background: #111;
            padding: 8px 15px;
            font-size: 13px;
            color: #888;
            border-bottom: 1px solid #222;
        }

        #messages-container {
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px;
            background: #141414;
        }

        #messages { list-style: none; padding: 0; margin: 0; }
        #messages li { 
            margin-bottom: 12px; 
            font-size: 15px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 8px;
        }
        #messages li strong { color: #ffff00; margin-right: 8px; }

        /* AREA DE ENTRADA Y BOTONES REORGANIZADOS */
        #input-area { padding: 20px; background: #1a1a1a; border-top: 1px solid #333; }
        
        .controls { 
            display: flex; 
            gap: 12px; /* Espacio entre botones */
            margin-top: 15px; 
        }
        
        input { 
            width: 100%; 
            padding: 18px; /* Más alto para comodidad */
            background: #252525; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 10px; 
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #ffff00; }

        button { 
            padding: 18px 25px; /* Botones mucho más grandes y cómodos */
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 14px;
            transition: transform 0.1s, background 0.2s;
            text-transform: uppercase;
        }

        button:active { transform: scale(0.95); } /* Efecto de click */

        /* ZUMBIDO A LA IZQUIERDA */
        .btn-buzz { 
            background: #ff4444; 
            color: #fff; 
            min-width: 120px;
        }
        .btn-buzz:hover { background: #cc0000; }

        /* ENVIAR A LA DERECHA */
        .btn-send { 
            background: #ffff00; 
            color: #000; 
            flex-grow: 1; /* El botón de enviar ocupa el resto del ancho */
        }
        .btn-send:hover { background: #e6e600; }

        /* ANIMACIÓN SHAKE */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(6px,6px); } 50% { transform: translate(-6px,-6px); } 75% { transform: translate(6px,-6px); } }
        .shake-effect { animation: shake 0.1s 6; }

        /* Scrollbar rústico */
        #messages-container::-webkit-scrollbar { width: 6px; }
        #messages-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="msn-window">
    <div id="title-bar">THE REALS</div>
    <div id="topic-bar">Canal: <span id="current-topic">Cargando...</span></div>
    
    <div id="messages-container">
        <ul id="messages"></ul>
    </div>

    <div id="input-area">
        <input id="input" autocomplete="off" placeholder="Escribe en THE REALS..." onkeypress="if(event.key==='Enter')sendMessage()" />
        <div class="controls">
            <button class="btn-buzz" onclick="sendBuzz()">ZUMBIDO</button>
            <button class="btn-send" onclick="sendMessage()">ENVIAR MENSAJE</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    var socket = io();
    var nick = prompt("Bienvenido a THE REALS. Ingresa tu nombre:") || "Anon";

    function playBuzzSound() {
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function note(freq, start, duration) {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, start);
            osc.start(start); osc.stop(start + duration);
        }
        note(880, audioCtx.currentTime, 0.1);      
        note(1046, audioCtx.currentTime + 0.15, 0.2); 
    }

    socket.on('cargar historia', function(data) {
        document.getElementById('current-topic').innerText = data.tema;
        data.history.forEach(msg => appendMsg(msg));
    });

    socket.on('cambiar tema', (nuevo) => document.getElementById('current-topic').innerText = nuevo);

    function sendMessage() {
        var input = document.getElementById('input');
        if(input.value.trim()) {
            socket.emit('chat message', { user: nick, text: input.value });
            input.value = '';
        }
    }

    function sendBuzz() {
        socket.emit('chat message', { user: nick, text: "¡HA ENVIADO UN ZUMBIDO!", isBuzz: true });
    }

    socket.on('chat message', function(data) {
        appendMsg(data);
        if(data.isBuzz) {
            playBuzzSound();
            document.getElementById('msn-window').classList.add('shake-effect');
            setTimeout(() => document.getElementById('msn-window').classList.remove('shake-effect'), 600);
        }
    });

    function appendMsg(data) {
        var li = document.createElement('li');
        li.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
        document.getElementById('messages').appendChild(li);
        var container = document.getElementById('messages-container');
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
