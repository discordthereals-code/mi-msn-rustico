<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REALS - MSN Messenger</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0055e5; 
            background: radial-gradient(circle, #3b83ff 0%, #0055e5 100%);
            font-family: 'Tahoma', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }

        /* Pantalla de Login */
        #login-screen { background: white; padding: 30px; border-radius: 8px; border: 1px solid #003399; width: 320px; text-align: center; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }
        .login-input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }

        /* Contenedor Principal (Etapa 2) */
        #app-container { 
            display: none; width: 95vw; max-width: 1000px; height: 85vh; 
            background: #f1f1f1; border: 1px solid #003399; border-radius: 5px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* BARRA LATERAL (SIDEBAR) */
        #sidebar { 
            width: 220px; background: linear-gradient(to right, #ffffff, #e5e5e5); 
            border-right: 1px solid #999; display: flex; flex-direction: column; padding: 10px; 
        }
        .sidebar-title { font-size: 11px; font-weight: bold; color: #003399; margin: 15px 0 5px 5px; text-transform: uppercase; }
        
        .room-btn { 
            background: transparent; border: 1px solid transparent; padding: 10px; 
            margin-bottom: 2px; cursor: pointer; border-radius: 4px; text-align: left; 
            font-size: 12px; display: flex; align-items: center; gap: 8px; color: #333;
        }
        .room-btn:hover { background: #e1eefc; border: 1px solid #b5d4ef; }
        .room-btn.active { background: #ffeb3b; border: 1px solid #e6ce00; font-weight: bold; color: #000; }

        /* VENTANA DE CHAT */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; background: white; margin: 4px; border: 1px solid #999; border-radius: 3px; }
        #title-bar { background: #fff; color: #003399; padding: 12px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        #messages-container { flex-grow: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .msg-item { margin-bottom: 10px; font-size: 13px; line-height: 1.4; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .msg-user { font-weight: bold; color: #0055e5; }
        
        /* Imágenes y Audio */
        .chat-img-thumb { max-width: 200px; max-height: 200px; border-radius: 5px; cursor: pointer; border: 1px solid #ddd; margin-top: 5px; }
        audio { height: 30px; margin-top: 5px; width: 220px; }

        /* Controles Inferiores */
        #input-area { padding: 12px; background: #f1f1f1; border-top: 1px solid #ccc; }
        .controls { display: flex; gap: 8px; align-items: center; }
        #msg-input { flex-grow: 1; height: 38px; border: 1px solid #999; padding: 0 12px; outline: none; border-radius: 2px; }
        
        .btn-round { background: #e1e1e1; border: 1px solid #aaa; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-send { background: #0055e5; color: white; border: none; padding: 8px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; height: 38px; }

        /* Efectos */
        #image-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #full-image { max-width: 90%; max-height: 90%; border: 3px solid white; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(6px,6px); } 50% { transform: translate(-6px,-6px); } }
        .shake-effect { animation: shake 0.1s 6; }
    </style>
</head>
<body>

<div id="image-viewer" onclick="this.style.display='none'"><img id="full-image" src=""></div>

<div id="login-screen">
    <h2 style="color:#0055e5; margin-bottom:20px;">THE REALS</h2>
    <input type="text" id="user" class="login-input" placeholder="Nombre de usuario">
    <input type="password" id="pass" class="login-input" placeholder="Contraseña">
    <button onclick="login()" style="background:#0055e5; color:white; width:100%; padding:12px; border:none; font-weight:bold; cursor:pointer; border-radius:4px; margin-top:10px;">Entrar</button>
</div>

<div id="app-container">
    <div id="sidebar">
        <div style="text-align:center; padding: 10px; border-bottom:1px solid #ccc;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/MSN_Messenger_logo.png" width="45">
            <div id="display-user" style="font-weight:bold; font-size:12px; color:#003399; margin-top:5px;">...</div>
        </div>

        <div class="sidebar-title">Salas Disponibles</div>
        <button class="room-btn active" onclick="cambiarSala('Conversando', this)">👤 Conversando</button>
        <button class="room-btn" onclick="cambiarSala('Juegos Online', this)">🎮 Juegos Online</button>
        <button class="room-btn" onclick="cambiarSala('SoloTodo', this)">🛍️ SoloTodo</button>

        <div class="sidebar-title" style="margin-top:20px;">Opciones</div>
        <button class="room-btn" onclick="sendBuzz()" style="color:red; font-weight:bold;">🔔 Enviar Zumbido</button>
        <button class="room-btn" onclick="location.reload()" style="margin-top:auto; color:#666;">Cerrar Sesión</button>
    </div>

    <div id="chat-window">
        <div id="title-bar">
            <span id="tema-title">Conversando</span>
        </div>
        <div id="messages-container"><div id="messages"></div></div>
        
        <div id="input-area">
            <div class="controls">
                <input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendFile(this)">
                <button class="btn-round" onclick="document.getElementById('file-input').click()">📎</button>
                <input id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter')sendText()">
                <button class="btn-round" id="mic-btn" onclick="handleMic()">🎤</button>
                <button class="btn-send" onclick="sendText()">Enviar</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let miUser = "", recorder, chunks = [];

    function login() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(u && p) socket.emit('login', { user: u, pass: p });
    }

    socket.on('login_status', (res) => {
        if(res.success) {
            miUser = res.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('display-user').innerText = miUser;
            document.getElementById('tema-title').innerText = res.tema;
            if(res.history) res.history.forEach(m => render(m));
        } else alert(res.msg);
    });

    // --- LÓGICA DE SALAS ---
    function cambiarSala(nombre, btn) {
        document.getElementById('messages').innerHTML = ""; // Limpiar chat visualmente
        socket.emit('join_room', nombre);
        
        // Estilo de botón activo
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    socket.on('actualizar_historial', (historial) => {
        document.getElementById('messages').innerHTML = "";
        historial.forEach(m => render(m));
    });

    socket.on('actualizar_tema', (t) => {
        document.getElementById('tema-title').innerText = t;
    });

    // --- FUNCIONES DE ENVÍO ---
    function sendText() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim()) {
            socket.emit('chat message', { user: miUser, text: inp.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            inp.value = '';
        }
    }

    function sendBuzz() {
        socket.emit('chat message', { user: miUser, text: "¡HA ENVIADO UN ZUMBIDO!", isBuzz: true, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    }

    function sendFile(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => socket.emit('chat message', { user: miUser, img: e.target.result, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            reader.readAsDataURL(input.files[0]);
            input.value = "";
        }
    }

    async function handleMic() {
        const btn = document.getElementById('mic-btn');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => socket.emit('chat message', { user: miUser, audio: reader.result, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            btn.style.background = "#ff4444";
        } else {
            recorder.stop();
            btn.style.background = "#e1e1e1";
        }
    }

    // --- RENDER Y EFECTOS ---
    socket.on('chat message', (m) => {
        render(m);
        if(m.isBuzz) {
            new (window.AudioContext || window.webkitAudioContext)().createOscillator().connect(new AudioContext().destination); // Pitido rápido
            const win = document.getElementById('app-container');
            win.classList.add('shake-effect');
            setTimeout(() => win.classList.remove('shake-effect'), 600);
        }
    });

    function render(m) {
        const div = document.createElement('div');
        div.className = "msg-item";
        let body = `<span class="msg-user">${m.user}:</span> `;
        if(m.audio) body += `<br><audio controls src="${m.audio}"></audio>`;
        else if(m.img) body += `<br><img src="${m.img}" class="chat-img-thumb" onclick="openBig('${m.img}')">`;
        else body += m.text;
        div.innerHTML = body;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages-container').scrollTop = 999999;
    }

    function openBig(src) {
        document.getElementById('full-image').src = src;
        document.getElementById('image-viewer').style.display = 'flex';
    }
</script>
</body>
</html>
