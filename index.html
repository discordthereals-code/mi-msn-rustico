<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MSN Messenger - ELITE MULTIMEDIA 2026</title>
    <style>
        :root {
            --msn-blue: #0055e5;
            --msn-bg: #71ADFF;
            --header-grad: linear-gradient(to bottom, #f9fcff 0%, #dcecfc 100%);
            --border-color: #b4c7de;
            --white: #ffffff;
            --shadow: 0 15px 50px rgba(0,0,0,0.5);
            --yt-red: #FF0000;
            --nudge-red: #ff3b3b;
        }

        /* --- BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: var(--msn-bg); display: flex; align-items: center; justify-content: center; position: fixed; }

        #app {
            display: none; width: 1300px; max-width: 100vw; height: 950px; max-height: 100vh;
            background: var(--white); border: 2px solid #1c1c1c; display: flex; flex-direction: column;
            position: relative; box-shadow: var(--shadow); z-index: 10;
        }

        /* --- HEADER & MEDIA --- */
        header {
            background: var(--header-grad); padding: 20px 30px; border-bottom: 2px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; height: 170px;
        }

        .user-profile-box { display: flex; align-items: center; gap: 25px; flex: 1; min-width: 0; }
        #my-avatar-frame { width: 100px; height: 100px; border: 3px solid #fff; border-radius: 6px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s; background: #eee; }
        #my-avatar-frame:hover { transform: scale(1.05); border-color: var(--msn-blue); }

        #media-station { background: #fff; border: 1px solid #a0b5d0; border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; width: 550px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .media-input-wrapper { display: flex; align-items: center; gap: 12px; }
        #yt-link-input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 15px; font-size: 13px; outline: none; }
        #song-title-display { font-size: 12px; color: var(--yt-red); font-weight: bold; display: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }

        .media-controls-bar { display: flex; align-items: center; gap: 25px; }
        .m-icon { font-size: 22px; cursor: pointer; color: #444; transition: 0.2s; user-select: none; }
        .m-icon:hover { color: var(--msn-blue); transform: scale(1.2); }
        .vol-slider-box { display: flex; align-items: center; gap: 10px; margin-left: auto; font-size: 12px; color: #666; font-weight: bold; }
        #vol-control { width: 120px; accent-color: var(--msn-blue); cursor: pointer; }

        /* --- MAIN PANELS --- */
        main { display: flex; flex: 1; overflow: hidden; background: #fff; }
        
        #sidebar-contacts { width: 360px; border-right: 1px solid #dcecfc; display: flex; flex-direction: column; flex-shrink: 0; }
        .list-category { background: #f4f9ff; padding: 12px 20px; font-size: 12px; font-weight: 900; color: #5a708a; border-bottom: 1px solid #eef4fb; text-transform: uppercase; letter-spacing: 1px; }
        
        #friends-container { flex: 1; overflow-y: auto; }
        .friend-item { display: flex; align-items: center; gap: 15px; padding: 20px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; border-bottom: 1px solid #f9f9f9; position: relative; transition: 0.2s; }
        .friend-item:hover { background: #f0f7ff; }
        .friend-item img { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; border: 1px solid #ddd; }
        .friend-info b { font-size: 15px; color: #222; }
        .friend-info p { font-size: 12px; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .listening-style { color: var(--msn-blue) !important; font-weight: bold; font-style: italic; }
        
        .unread-dot { position: absolute; top: 20px; right: 20px; width: 12px; height: 12px; background: #ff8c00; border-radius: 50%; display: none; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* --- CHAT AREA --- */
        #chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #messages-container { flex: 1; overflow-y: auto; padding: 35px; display: flex; flex-direction: column; gap: 25px; background: linear-gradient(to bottom, #fff, #fcfdff); }
        .msg-wrap { display: flex; flex-direction: column; max-width: 95%; animation: fadeIn 0.3s; }
        .msg-head { font-size: 13px; font-weight: 800; color: var(--msn-blue); margin-bottom: 4px; }
        .msg-text { font-size: 15px; color: #333; line-height: 1.6; word-wrap: break-word; }

        #input-panel { padding: 25px; background: #f8fbff; border-top: 1px solid #e1e8f0; }
        #text-editor { width: 100%; height: 110px; padding: 15px; border: 1px solid #b4c7de; border-radius: 6px; resize: none; font-size: 16px; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .action-row { display: flex; gap: 15px; margin-top: 15px; }
        .btn-action { padding: 14px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-send { background: var(--msn-blue); color: white; flex: 1; }
        .btn-nudge { background: #fff; border: 1px solid #ffcccc; color: var(--nudge-red); }

        /* --- RIGHT SIDEBAR --- */
        #sidebar-tv { width: 350px; background: #fdfdfd; border-left: 1px solid #dcecfc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; flex-shrink: 0; }
        #tv-frame { width: 310px; height: 175px; background: #000; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; margin-bottom: 30px; border: 2px solid #333; }
        .big-avatar-img { width: 220px; height: 220px; border: 8px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.2); border-radius: 10px; object-fit: cover; background: #eee; }

        /* --- LOGIN & MODAL --- */
        #login-curtain { position: fixed; inset: 0; background: var(--msn-bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-module { background: white; padding: 60px; border-radius: 25px; width: 500px; text-align: center; box-shadow: var(--shadow); }
        .l-field { width: 100%; padding: 18px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        
        #modal-config { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:6000; align-items:center; justify-content:center; backdrop-filter: blur(4px); }
        .modal-box { background:#fff; padding:45px; border-radius:20px; width:480px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

        /* --- ANIMATIONS --- */
        .nudge-vibration { animation: vibration 0.1s 15; }
        @keyframes vibration { 0% {transform:translate(0,0)} 25% {transform:translate(10px,10px)} 50% {transform:translate(-10px,-10px)} 100% {transform:translate(0,0)} }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    </style>
</head>
<body onclick="bootstrapAudio()">

    <div id="login-curtain">
        <div class="login-module">
            <h1 style="color:var(--msn-blue); font-style: italic; margin-bottom:10px; font-size: 50px;">MSN Messenger</h1>
            <p style="color:#888; margin-bottom:40px; font-weight: bold;">MULTIMEDIA ELITE 2026</p>
            <input id="user-in" class="l-field" type="text" placeholder="Usuario">
            <input id="pass-in" class="l-field" type="password" placeholder="Contraseña">
            <button onclick="handleLogin()" style="width:100%; padding:20px; background:var(--msn-blue); color:#fff; border:none; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer;">Iniciar Sesión</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="user-profile-box">
                <img id="my-avatar-frame" onclick="triggerProfileEdit()" src="" title="Cambiar perfil">
                <div class="user-data-column">
                    <b id="my-name-display">Conectando...</b>
                    <div id="media-station">
                        <div class="media-input-wrapper">
                            <input id="yt-link-input" type="text" placeholder="Pega un video o lista de YouTube..." onchange="initMultimedia(this.value)">
                            <span id="song-title-display"></span>
                        </div>
                        <div class="media-controls-bar">
                            <span class="m-icon" onclick="mediaCmd('play')">▶</span>
                            <span class="m-icon" onclick="mediaCmd('pause')">Ⅱ</span>
                            <span class="m-icon" onclick="mediaCmd('stop')" style="color:#d00">■</span>
                            <span class="m-icon" onclick="mediaCmd('next')">⏭</span>
                            <div class="vol-slider-box">📢 <input type="range" id="vol-control" min="0" max="100" value="50" oninput="setVol(this.value)"> <span id="vol-label">50%</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="triggerProfileEdit()" class="btn-action" style="background:#fff; border:1px solid #ccc;">Opciones</button>
        </header>

        <main>
            <div id="sidebar-contacts">
                <div class="list-category">Salas Públicas</div>
                <button class="friend-item" onclick="changeChat('conversando', 'Sala General', '/logo-conversando.png')">
                    <img src="/logo-conversando.png">
                    <div class="friend-info"><b>Sala General</b><p>Chat de la comunidad</p></div>
                    <div class="unread-dot" id="dot-conversando"></div>
                </button>
                <button class="friend-item" onclick="changeChat('juegos', 'Zona de Juegos', 'https://cdn-icons-png.flaticon.com/512/686/686589.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">
                    <div class="friend-info"><b>Zona de Juegos</b><p>Hablemos de Rust/Bellwright</p></div>
                    <div class="unread-dot" id="dot-juegos"></div>
                </button>
                <div class="list-category">Amigos Conectados</div>
                <div id="friends-container"></div>
            </div>

            <div id="chat-main">
                <div id="messages-container"></div>
                <div id="typing-status-bar" style="height:25px; padding:0 30px; font-size:12px; color:#2b9348; font-weight:bold;"></div>
                <div id="input-panel">
                    <textarea id="text-editor" placeholder="Escribe un mensaje aquí..." oninput="broadcastTyping()"></textarea>
                    <div class="action-row">
                        <button class="btn-action btn-send" onclick="performSend()">Enviar Mensaje</button>
                        <button class="btn-action btn-nudge" onclick="performNudge()">ZUMBIDO</button>
                    </div>
                </div>
            </div>

            <div id="sidebar-tv">
                <div id="tv-frame"><div id="yt-api-player"></div></div>
                <img id="target-avatar-big" class="big-avatar-img" src="/logo-conversando.png">
                <h3 id="target-name-big" style="margin-top:25px; color:var(--msn-blue);">Sala General</h3>
                <p id="target-desc-big" style="font-size:13px; color:#888; margin-top:5px;"></p>
                <div style="margin-top:auto; text-align:center;">
                    <img id="my-mini-avatar" class="big-avatar-img" style="width:140px; height:140px;">
                    <p style="font-size:10px; color:#ccc; margin-top:5px;">Tu estado actual</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-config">
        <div class="modal-box">
            <h2 style="color:var(--msn-blue); margin-bottom:25px;">Personalizar Perfil</h2>
            <p style="font-size:12px; margin-bottom:8px; font-weight:bold;">Subir Foto:</p>
            <input id="new-photo" type="file" accept="image/*" style="margin-bottom:25px; width:100%;">
            <p style="font-size:12px; margin-bottom:8px; font-weight:bold;">Mensaje de Estado:</p>
            <input id="new-desc" type="text" class="l-field" placeholder="¿Qué estás haciendo?">
            <div style="display:flex; gap:15px;">
                <button onclick="saveProfile()" class="btn-action btn-send">Guardar</button>
                <button onclick="closeSettings()" class="btn-action btn-nudge" style="border:1px solid #ccc; color:#666;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let myUser = localStorage.getItem('msn_user_2026') || "";
        let currentChat = 'conversando';
        let ytPlayer, typeTimeout;

        // --- LÓGICA MULTIMEDIA (SINTONÍA) ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-api-player', {
                height: '175', width: '310',
                playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0 },
                events: { 'onStateChange': syncMusicToProfile }
            });
        }

        function initMultimedia(url) {
            if(!ytPlayer) return;
            let id = "";
            if(url.includes("list=")) {
                id = url.split("list=")[1].split("&")[0];
                ytPlayer.loadPlaylist({list: id, listType: 'playlist'});
            } else {
                id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1]?.split("?")[0] || url;
                ytPlayer.loadVideoById(id);
            }
            document.getElementById('tv-frame').style.display = 'block';
            document.getElementById('target-avatar-big').style.display = 'none';
            document.getElementById('yt-link-input').style.display = 'none';
            document.getElementById('song-title-display').style.display = 'block';
            document.getElementById('song-title-display').innerText = "Sintonizando...";
        }

        function syncMusicToProfile(e) {
            if(e.data == YT.PlayerState.PLAYING) {
                const title = ytPlayer.getVideoData().title;
                const status = "🎵 Escuchando: " + title;
                document.getElementById('song-title-display').innerText = status;
                socket.emit('update_profile', { desc: status, foto: null });
            }
        }

        function mediaCmd(cmd) {
            if(!ytPlayer) return;
            if(cmd === 'play') ytPlayer.playVideo();
            if(cmd === 'pause') ytPlayer.pauseVideo();
            if(cmd === 'next') ytPlayer.nextVideo();
            if(cmd === 'stop') {
                ytPlayer.stopVideo();
                document.getElementById('tv-frame').style.display = 'none';
                document.getElementById('target-avatar-big').style.display = 'block';
                document.getElementById('yt-link-input').style.display = 'block';
                document.getElementById('yt-link-input').value = "";
                document.getElementById('song-title-display').style.display = 'none';
                socket.emit('update_profile', { desc: "Disponible", foto: null });
            }
        }

        function setVol(v) { if(ytPlayer?.setVolume) ytPlayer.setVolume(v); document.getElementById('vol-label').innerText = v + "%"; }

        // --- SONIDOS CLÁSICOS ---
        const sndLogin = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const sndMsg = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const sndBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');
        function bootstrapAudio() { [sndLogin, sndMsg, sndBuzz].forEach(s => s.play().then(() => s.pause()).catch(() => {})); }

        // --- MANEJO DE SESIÓN ---
        if(myUser) socket.emit('login', { user: myUser, pass: localStorage.getItem('msn_pass_2026') });

        function handleLogin() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if(!u || !p) return;
            localStorage.setItem('msn_user_2026', u);
            localStorage.setItem('msn_pass_2026', p);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', r => {
            if(r.success) {
                myUser = r.user;
                document.getElementById('login-curtain').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateMe(r.perfil);
                changeChat('conversando', 'Sala General', '/logo-conversando.png');
                sndLogin.play().catch(()=>{});
            } else { alert(r.msg); localStorage.clear(); }
        });

        function updateMe(p) {
            const pic = p.foto || "/logo-conversando.png";
            document.getElementById('my-avatar-frame').src = pic;
            document.getElementById('my-mini-avatar').src = pic;
            document.getElementById('my-name-display').innerText = myUser;
        }

        // --- CONTACTOS E INTERFAZ ---
        socket.on('lista_contactos', list => {
            const container = document.getElementById('friends-container');
            container.innerHTML = "";
            list.forEach(u => {
                if(u.user === myUser) { updateMe(u); return; }
                const isListening = u.descripcion && u.descripcion.includes('🎵');
                const btn = document.createElement('button');
                btn.className = "friend-item";
                btn.innerHTML = `
                    <img src="${u.foto || '/logo-conversando.png'}">
                    <div class="friend-info">
                        <b>${u.user}</b>
                        <p class="${isListening ? 'listening-style' : ''}">${u.descripcion || 'Disponible'}</p>
                    </div>
                    <div class="unread-dot" id="dot-${u.user}"></div>
                `;
                btn.onclick = () => changeChat(u.user, u.user, u.foto, u.descripcion);
                container.appendChild(btn);
            });
        });

        function changeChat(id, name, img, desc) {
            currentChat = id;
            document.getElementById('dot-' + id) ? document.getElementById('dot-' + id).style.display = 'none' : null;
            document.getElementById('target-name-big').innerText = name;
            document.getElementById('target-desc-big').innerText = desc || "";
            document.getElementById('target-avatar-big').src = img || "/logo-conversando.png";
            document.getElementById('messages-container').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        // --- MENSAJERÍA ---
        function broadcastTyping() { socket.emit('typing', { to: currentChat, user: myUser }); }
        
        socket.on('typing_status', d => {
            if(d.user === currentChat && d.to === myUser) {
                document.getElementById('typing-status-bar').innerText = d.user + " está escribiendo...";
                clearTimeout(typeTimeout);
                typeTimeout = setTimeout(() => { document.getElementById('typing-status-bar').innerText = ""; }, 3000);
            }
        });

        function performSend() {
            const area = document.getElementById('text-editor');
            const txt = area.value.trim();
            if(txt) {
                socket.emit('chat message', { to: currentChat, text: txt });
                area.value = "";
                area.focus();
            }
        }

        function performNudge() { socket.emit('chat message', { to: currentChat, isBuzz: true }); }

        socket.on('chat message', m => {
            const origin = m.to || 'conversando';
            const isGroup = ['conversando', 'juegos'].includes(origin);
            const isForMe = (isGroup && origin === currentChat) || (m.user === currentChat) || (m.user === myUser && m.to === currentChat);

            if(isForMe) {
                render(m);
                if(m.user !== myUser) sndMsg.play().catch(()=>{});
                if(m.isBuzz) {
                    document.getElementById('app').classList.add('nudge-vibration');
                    sndBuzz.play().catch(()=>{});
                    setTimeout(() => document.getElementById('app').classList.remove('nudge-vibration'), 1000);
                }
            } else {
                const dotId = isGroup ? origin : m.user;
                if(document.getElementById('dot-' + dotId)) document.getElementById('dot-' + dotId).style.display = 'block';
                sndMsg.play().catch(()=>{});
            }
        });

        function render(m) {
            const wall = document.getElementById('messages-container');
            const d = document.createElement('div');
            d.className = "msg-wrap";
            const msgBody = m.isBuzz ? '<b style="color:red">TE HA ENVIADO UN ZUMBIDO</b>' : (m.texto || m.text);
            d.innerHTML = `<div class="msg-head">${m.user} dice:</div><div class="msg-text">${msgBody}</div>`;
            wall.appendChild(d);
            wall.scrollTop = wall.scrollHeight;
        }

        socket.on('actualizar_historial', r => { if(r.target === currentChat) r.history.forEach(m => render(m)); });

        // --- PERFIL ---
        function triggerProfileEdit() { document.getElementById('modal-config').style.display = 'flex'; }
        function closeSettings() { document.getElementById('modal-config').style.display = 'none'; }
        function saveProfile() {
            const f = document.getElementById('new-photo').files[0];
            const d = document.getElementById('new-desc').value;
            if(f) {
                const reader = new FileReader();
                reader.onload = (e) => { socket.emit('update_profile', { desc: d, foto: e.target.result }); closeSettings(); };
                reader.readAsDataURL(f);
            } else {
                socket.emit('update_profile', { desc: d, foto: null });
                closeSettings();
            }
        }

        // --- ANDROID KEYBOARD FIX ---
        window.visualViewport.addEventListener('resize', () => {
            const h = window.visualViewport.height;
            document.body.style.height = h + 'px';
            document.getElementById('app').style.height = h + 'px';
            document.getElementById('messages-container').scrollTop = 999999;
        });

        document.getElementById('text-editor').addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); performSend(); } });
    </script>
</body>
</html>
