<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MSN Messenger Elite 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --msn-blue: #0055e5; --msn-bg: #71ADFF; --win-bg: #f0f7ff;
            --header-grad: linear-gradient(to bottom, #f9fcff 0%, #dcecfc 100%);
            --text-dark: #222; --text-light: #888;
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--msn-bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #app {
            width: 1400px; max-width: 100vw; height: 920px; max-height: 100vh;
            background: #fff; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: 1px solid #1c1c1c; position: relative;
        }

        /* --- HEADER ELITE --- */
        header {
            height: 160px; background: var(--header-grad); border-bottom: 1px solid #b4c7de;
            display: flex; align-items: center; padding: 0 30px; gap: 25px; flex-shrink: 0;
        }
        .my-avatar-container { position: relative; }
        #my-avatar { width: 100px; height: 100px; border-radius: 12px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; cursor: pointer; transition: 0.3s; }
        #my-avatar:hover { transform: scale(1.05); border-color: var(--msn-blue); }
        
        .user-info-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .name-row { display: flex; align-items: center; gap: 10px; }
        #my-name-display { font-size: 20px; font-weight: bold; color: var(--text-dark); }
        
        #media-bar { 
            background: rgba(255,255,255,0.7); border: 1px solid #a0b5d0; border-radius: 25px; 
            padding: 10px 20px; display: flex; align-items: center; gap: 15px; width: 500px;
        }
        #yt-input { border: none; background: transparent; flex: 1; outline: none; font-size: 13px; color: #444; }
        .media-actions { display: flex; gap: 15px; color: #555; font-size: 18px; }
        .media-actions i { cursor: pointer; transition: 0.2s; }
        .media-actions i:hover { color: var(--msn-blue); }

        /* --- MAIN LAYOUT --- */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Sidebar: Lista de Contactos */
        #contacts-panel { 
            width: 380px; border-right: 1px solid #dcecfc; display: flex; flex-direction: column; 
            background: #f8fbff; flex-shrink: 0;
        }
        .section-title { padding: 12px 25px; font-size: 12px; font-weight: 900; color: #5a708a; background: #edf4fb; text-transform: uppercase; }
        
        .contact-card { 
            display: flex; align-items: center; gap: 15px; padding: 18px 25px; border: none; 
            background: transparent; width: 100%; text-align: left; cursor: pointer; border-bottom: 1px solid #f0f4f8; transition: 0.2s;
        }
        .contact-card:hover { background: #e8f2ff; }
        .contact-card img { width: 55px; height: 55px; border-radius: 10px; border: 1px solid #ddd; object-fit: cover; }
        .contact-text b { font-size: 15px; color: #222; display: block; }
        .contact-text p { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
        .listening { color: var(--msn-blue) !important; font-weight: bold; font-style: italic; }

        /* Chat Principal */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        #messages-flow { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .message-row { display: flex; flex-direction: column; max-width: 90%; }
        .message-header { font-size: 13px; font-weight: bold; color: var(--msn-blue); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
        .message-time { font-weight: normal; color: #bbb; font-size: 11px; margin-left: 10px; }
        .message-body { font-size: 15px; color: #333; line-height: 1.6; word-wrap: break-word; }
        .message-body a { color: var(--msn-blue); text-decoration: underline; cursor: pointer; }

        /* Input y Botones */
        #input-zone { padding: 25px; background: #f4f8fc; border-top: 1px solid #e1e8f0; }
        #chat-input { width: 100%; height: 90px; padding: 15px; border: 1px solid #b4c7de; border-radius: 8px; resize: none; outline: none; font-size: 16px; margin-bottom: 15px; }
        .button-bar { display: flex; gap: 15px; }
        .msn-btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-primary { background: var(--msn-blue); color: #fff; flex: 1; justify-content: center; }
        .btn-secondary { background: #fff; border: 1px solid #ccc; color: #555; }

        /* Panel Derecho (TV y Perfil) */
        #preview-panel { width: 340px; border-left: 1px solid #dcecfc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; flex-shrink: 0; }
        #tv-frame { width: 300px; height: 170px; background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .target-avatar-big { width: 200px; height: 200px; border-radius: 15px; border: 8px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.2); object-fit: cover; }

        /* --- SISTEMA CAJA POR CAJA (ANDROID) --- */
        @media (max-width: 850px) {
            header { height: 120px; padding: 10px 15px; }
            #media-bar { display: none; } /* En móvil se oculta el input de media para ganar espacio */
            #contacts-panel { width: 100%; position: absolute; inset: 0; z-index: 10; }
            #chat-area { width: 100%; position: absolute; inset: 0; z-index: 5; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            #chat-area.active { transform: translateX(0); z-index: 20; }
            #preview-panel { display: none; }
            .mobile-back { display: block !important; }
        }

        .mobile-back { display: none; background: none; border: none; font-size: 24px; color: var(--msn-blue); margin-right: 15px; cursor: pointer; }
        .unread-indicator { width: 12px; height: 12px; background: #ff8c00; border-radius: 50%; margin-left: auto; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body onclick="startAudioContext()">

    <div id="modal-perfil" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div style="background:#fff; padding:40px; border-radius:20px; width:90%; max-width:450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="color:var(--msn-blue); margin-bottom:25px;"><i class="fa-solid fa-user-pen"></i> Personalizar Perfil</h2>
            <p style="font-size:12px; font-weight:bold; margin-bottom:8px;">Cambiar Imagen:</p>
            <input type="file" id="input-foto" accept="image/*" style="margin-bottom:20px; width:100%;">
            <p style="font-size:12px; font-weight:bold; margin-bottom:8px;">Mensaje Personal:</p>
            <input type="text" id="input-desc" placeholder="¿Qué estás escuchando o haciendo?" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:10px; margin-bottom:25px; outline:none; font-size:15px;">
            <div style="display:flex; gap:15px;">
                <button class="msn-btn btn-primary" onclick="guardarPerfil()">Guardar Cambios</button>
                <button class="msn-btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="app">
        <header>
            <button class="mobile-back" onclick="toggleAndroidView(false)"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="my-avatar-container">
                <img id="my-avatar" src="/logo-conversando.png" onclick="abrirModal()" title="Editar Perfil">
            </div>
            <div class="user-info-box">
                <div class="name-row">
                    <b id="my-name-display">Cargando...</b>
                    <span id="my-status-dot" style="width:10px; height:10px; background:#31a24c; border-radius:50%;"></span>
                </div>
                <div id="media-bar">
                    <i class="fa-brands fa-youtube" style="color:#FF0000; font-size:20px;"></i>
                    <input id="yt-input" type="text" placeholder="Pega un link de YouTube o Playlist..." onchange="controlMultimedia(this.value)">
                    <div class="media-actions">
                        <i class="fa-solid fa-play" onclick="ytAction('play')" title="Reproducir"></i>
                        <i class="fa-solid fa-pause" onclick="ytAction('pause')" title="Pausar"></i>
                        <i class="fa-solid fa-stop" onclick="ytAction('stop')" title="Detener" style="color:#d00;"></i>
                    </div>
                </div>
            </div>
            <button class="msn-btn btn-secondary" onclick="abrirModal()"><i class="fa-solid fa-gear"></i> <span class="hide-mobile">Opciones</span></button>
        </header>

        <main>
            <div id="contacts-panel">
                <div class="section-title">Salas Comunitarias</div>
                <button class="contact-card" onclick="irChat('conversando', 'Sala General', '/logo-conversando.png')">
                    <img src="/logo-conversando.png">
                    <div class="contact-text"><b>Sala General</b><p>Chat global de MSN</p></div>
                    <div id="dot-conversando" class="unread-indicator" style="display:none;"></div>
                </button>
                <button class="contact-card" onclick="irChat('juegos', 'Zona de Juegos', 'https://cdn-icons-png.flaticon.com/512/686/686589.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">
                    <div class="contact-text"><b>Zona de Juegos</b><p>Hablemos de Rust y Bellwright</p></div>
                    <div id="dot-juegos" class="unread-indicator" style="display:none;"></div>
                </button>
                <div class="section-title">Mis Contactos</div>
                <div id="lista-dinamica"></div>
            </div>

            <div id="chat-area">
                <div id="messages-flow"></div>
                <div id="typing-indicator" style="height:25px; padding:0 30px; font-size:12px; color:#2b9348; font-weight:bold; font-style:italic;"></div>
                <div id="input-zone">
                    <textarea id="chat-input" placeholder="Escribe un mensaje aquí..." oninput="avisarEscribiendo()"></textarea>
                    <div class="button-bar">
                        <button class="msn-btn btn-primary" onclick="enviarMensaje()"><i class="fa-solid fa-paper-plane"></i> Enviar</button>
                        <button class="msn-btn btn-secondary" onclick="enviarZumbido()" style="color:#ff3b3b; border-color:#ffcccc;"><i class="fa-solid fa-bell"></i> ZUMBIDO</button>
                    </div>
                </div>
            </div>

            <div id="preview-panel">
                <div id="tv-frame"><div id="yt-player-api"></div></div>
                <img id="preview-avatar" class="target-avatar-big" src="/logo-conversando.png">
                <h3 id="preview-name" style="margin-top:25px; color:var(--msn-blue); font-size:22px;">Sala General</h3>
                <p id="preview-desc" style="font-size:14px; color:#888; text-align:center; margin-top:10px; line-height:1.4;"></p>
                <div style="margin-top:auto; opacity:0.3; font-size:11px;">MSN Messenger Elite © 2026</div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let miUsuario = localStorage.getItem('msn_user_v26') || "";
        let chatActivo = 'conversando';
        let ytPlayer, tTimeout;

        // --- MOTOR MULTIMEDIA (SINTONÍA) ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-api', {
                height: '170', width: '300',
                playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0 },
                events: { 'onStateChange': manejarEstadoYT }
            });
        }

        function controlMultimedia(url) {
            if(!ytPlayer) return;
            let id = "";
            if(url.includes("list=")) {
                id = url.split("list=")[1].split("&")[0];
                ytPlayer.loadPlaylist({list: id, listType: 'playlist'});
            } else {
                id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1]?.split("?")[0] || url;
                ytPlayer.loadVideoById(id);
            }
            document.getElementById('tv-frame').style.display = 'block';
            document.getElementById('preview-avatar').style.display = 'none';
        }

        function manejarEstadoYT(e) {
            if(e.data == YT.PlayerState.PLAYING) {
                const titulo = ytPlayer.getVideoData().title;
                socket.emit('update_profile', { desc: "🎵 Escuchando: " + titulo });
            }
        }

        function ytAction(cmd) {
            if(!ytPlayer) return;
            if(cmd === 'play') ytPlayer.playVideo();
            if(cmd === 'pause') ytPlayer.pauseVideo();
            if(cmd === 'stop') {
                ytPlayer.stopVideo();
                document.getElementById('tv-frame').style.display = 'none';
                document.getElementById('preview-avatar').style.display = 'block';
                document.getElementById('yt-input').value = "";
                socket.emit('update_profile', { desc: "Disponible" });
            }
        }

        // --- NAVEGACIÓN ANDROID CAJA POR CAJA ---
        function toggleAndroidView(mostrarChat) {
            const chatPanel = document.getElementById('chat-area');
            if(mostrarChat) chatPanel.classList.add('active');
            else chatPanel.classList.remove('active');
        }
        // --- MOTOR DE MENSAJERÍA AVANZADO ---
        if(miUsuario) socket.emit('login', { user: miUsuario, pass: localStorage.getItem('msn_p_v26') });

        function enviarMensaje() {
            const el = document.getElementById('chat-input');
            const txt = el.value.trim();
            if(txt) {
                socket.emit('chat message', { to: chatActivo, text: txt });
                el.value = "";
                el.focus();
            }
        }

        function enviarZumbido() {
            socket.emit('chat message', { to: chatActivo, isBuzz: true });
        }

        socket.on('chat message', m => {
            const origen = m.to || 'conversando';
            const esGrupo = ['conversando', 'juegos'].includes(origen);
            const esParaMiChat = (esGrupo && origen === chatActivo) || (m.user === chatActivo) || (m.user === miUsuario && m.to === chatActivo);

            if(esParaMiChat) {
                renderizarMensaje(m);
                if(m.user !== miUsuario) sonarMensaje();
                if(m.isBuzz) ejecutarZumbido();
            } else {
                // Notificación visual en el contacto/sala lateral
                const idDot = esGrupo ? origen : m.user;
                if(document.getElementById('dot-' + idDot)) {
                    document.getElementById('dot-' + idDot).style.display = 'block';
                }
                sonarMensaje();
            }
        });

        // --- RENDERIZADO CON LINKS Y HORA ---
        function renderizarMensaje(m) {
            const contenedor = document.getElementById('messages-flow');
            const ahora = new Date();
            const horaStr = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            
            const div = document.createElement('div');
            div.className = "message-row";
            
            // Lógica de Links Clickeables (Regex)
            let textoFinal = m.isBuzz ? '<b style="color:#ff3b3b;"><i class="fa-solid fa-bell"></i> TE HA ENVIADO UN ZUMBIDO</b>' : (m.texto || m.text);
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            textoFinal = textoFinal.replace(urlPattern, url => `<a href="${url}" target="_blank">${url}</a>`);

            div.innerHTML = `
                <div class="message-header">
                    <span>${m.user} dice:</span>
                    <span class="message-time">${horaStr}</span>
                </div>
                <div class="message-body">${textoFinal}</div>
            `;
            
            contenedor.appendChild(div);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        // --- GESTIÓN DE CONTACTOS Y SALAS ---
        function irChat(id, nombre, foto, desc) {
            chatActivo = id;
            // Limpiar notificaciones
            if(document.getElementById('dot-' + id)) document.getElementById('dot-' + id).style.display = 'none';
            
            // Actualizar Panel Derecho
            document.getElementById('preview-name').innerText = nombre;
            document.getElementById('preview-avatar').src = foto || '/logo-conversando.png';
            document.getElementById('preview-desc').innerText = desc || "Disponible";
            
            // Limpiar y Cargar Historial
            document.getElementById('messages-flow').innerHTML = "";
            socket.emit('get_private_history', id);

            // Vista Android
            if(window.innerWidth < 850) toggleAndroidView(true);
        }

        socket.on('lista_contactos', lista => {
            const divLista = document.getElementById('lista-dinamica');
            divLista.innerHTML = "";
            lista.forEach(u => {
                if(u.user === miUsuario) {
                    document.getElementById('my-name-display').innerText = u.user;
                    document.getElementById('my-avatar').src = u.foto || '/logo-conversando.png';
                    return;
                }
                const escuchando = u.descripcion && u.descripcion.includes('🎵');
                divLista.innerHTML += `
                    <button class="contact-card" onclick="irChat('${u.user}', '${u.user}', '${u.foto}', '${u.descripcion}')">
                        <img src="${u.foto || '/logo-conversando.png'}">
                        <div class="contact-text">
                            <b>${u.user}</b>
                            <p class="${escuchando ? 'listening' : ''}">${u.descripcion || 'Disponible'}</p>
                        </div>
                        <div id="dot-${u.user}" class="unread-indicator" style="display:none;"></div>
                    </button>
                `;
            });
        });

        socket.on('actualizar_historial', data => {
            if(data.target === chatActivo) {
                data.history.forEach(m => renderizarMensaje(m));
            }
        });

        // --- EFECTOS Y PERFIL ---
        function ejecutarZumbido() {
            const app = document.getElementById('app');
            app.style.animation = "vibration 0.1s 15";
            new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3').play().catch(()=>{});
            setTimeout(() => app.style.animation = "", 1500);
        }

        function sonarMensaje() {
            new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3').play().catch(()=>{});
        }

        function abrirModal() { document.getElementById('modal-perfil').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-perfil').style.display = 'none'; }

        function guardarPerfil() {
            const fotoFile = document.getElementById('input-foto').files[0];
            const descTxt = document.getElementById('input-desc').value;
            if(fotoFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    socket.emit('update_profile', { desc: descTxt, foto: e.target.result });
                    cerrarModal();
                };
                reader.readAsDataURL(fotoFile);
            } else {
                socket.emit('update_profile', { desc: descTxt });
                cerrarModal();
            }
        }

        function avisarEscribiendo() {
            socket.emit('typing', { to: chatActivo, user: miUsuario });
        }

        socket.on('typing_status', d => {
            if(d.user === chatActivo && d.to === miUsuario) {
                document.getElementById('typing-indicator').innerText = d.user + " está escribiendo...";
                clearTimeout(tTimeout);
                tTimeout = setTimeout(() => { document.getElementById('typing-indicator').innerText = ""; }, 3000);
            }
        });

        function startAudioContext() { /* Activa permisos de audio en navegadores */ }

        // Enter para enviar
        document.getElementById('chat-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });
    </script>
</body>
</html>
