<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSN Elite 2026 - Mobile Ultimate</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. VARIABLES Y RESET
           ========================================================================== */
        :root {
            --msn-blue: #0055e5;
            --bg-light: #f4f8fc;
            --border-color: #dcecfc;
            --text-dark: #333;
            --text-muted: #777;
            --nudge-red: #ff3b3b;
            --status-online: #31a24c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e9eff5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        /* ==========================================================================
           2. CONTENEDOR PRINCIPAL (ESTILO MÓVIL)
           ========================================================================== */
        #app {
            display: none; /* Se oculta hasta el login */
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #fff;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ==========================================================================
           3. CABECERAS (MI PERFIL Y CONTACTO ACTIVO)
           ========================================================================== */
        #my-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; background: #eef4fb; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .profile-left { display: flex; align-items: center; gap: 12px; }
        .profile-left img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid #ccc; }
        .profile-info b { font-size: 16px; color: var(--msn-blue); display: block; }
        .profile-info span { font-size: 12px; color: var(--text-muted); font-style: italic; }
        .profile-info .status { font-size: 11px; font-weight: bold; color: #555; margin-top: 2px; }
        .btn-config { background: #fff; border: 1px solid #b4c7de; color: var(--msn-blue); padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-config:active { transform: scale(0.95); }

        #target-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        .target-left { display: flex; align-items: center; gap: 12px; }
        .target-left img { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ddd; object-fit: cover; }
        .target-info b { font-size: 15px; color: var(--text-dark); display: flex; align-items: center; gap: 5px; }
        .target-info .dot { width: 10px; height: 10px; background: var(--status-online); border-radius: 50%; }
        .target-info span { font-size: 12px; color: var(--text-muted); }

        /* ==========================================================================
           4. BARRA HORIZONTAL DE NAVEGACIÓN
           ========================================================================== */
        #horizontal-nav {
            display: flex; overflow-x: auto; padding: 12px 15px; gap: 15px;
            border-bottom: 1px solid #eee; background: #fff; scrollbar-width: none; flex-shrink: 0;
        }
        #horizontal-nav::-webkit-scrollbar { display: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 65px; cursor: pointer; position: relative; }
        .nav-item img { width: 55px; height: 55px; border-radius: 10px; border: 1px solid #ddd; object-fit: cover; }
        .nav-item span { font-size: 11px; font-weight: bold; color: var(--text-dark); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .nav-item .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .nav-item .dot.active { background: var(--status-online); }
        .unread-badge { position: absolute; top: -3px; right: 2px; width: 14px; height: 14px; background: #ff8c00; border-radius: 50%; border: 2px solid #fff; display: none; }

        /* ==========================================================================
           5. ÁREA DE CHAT Y MENSAJES
           ========================================================================== */
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #fff; display: flex; flex-direction: column; }
        .msg-row { margin-bottom: 15px; animation: fadeIn 0.3s; }
        .msg-head { font-size: 12px; font-weight: bold; color: var(--msn-blue); margin-bottom: 3px; display: flex; justify-content: space-between; }
        .msg-time { color: #aaa; font-size: 10px; font-weight: normal; }
        .msg-body { font-size: 14px; color: var(--text-dark); background: var(--bg-light); padding: 10px 12px; border-radius: 8px; display: inline-block; max-width: 95%; word-wrap: break-word; border: 1px solid var(--border-color); line-height: 1.4; }
        .msg-body a { color: var(--msn-blue); font-weight: bold; text-decoration: underline; }

        #typing-box { height: 20px; font-size: 11px; color: #2b9348; font-style: italic; font-weight: bold; padding: 0 15px; flex-shrink: 0; }

        /* ==========================================================================
           6. ZONA DE ESCRITURA Y YOUTUBE
           ========================================================================== */
        #input-area { padding: 15px; background: #f8fbff; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; }
        .emojis { font-size: 22px; display: flex; gap: 10px; cursor: pointer; }
        .btn-zumbido { background: #fff; border: 1px solid #ffcccc; color: var(--nudge-red); font-weight: bold; font-size: 11px; padding: 6px 12px; border-radius: 6px; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .btn-zumbido:active { transform: scale(0.95); }
        
        #text-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-size: 14px; }
        .btn-enviar { background: var(--msn-blue); color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-enviar:active { background: #0044b8; }

        #youtube-container { background: var(--bg-light); padding: 10px 15px; border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .yt-header { font-size: 12px; font-weight: bold; color: var(--msn-blue); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; justify-content: space-between; }
        #yt-player-box { width: 100%; height: 90px; background: #000; border-radius: 8px; overflow: hidden; }

        /* ==========================================================================
           7. MODALES (LOGIN Y CONFIGURACIÓN RECUPERADOS)
           ========================================================================== */
        .curtain { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-box { background: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .modal-input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 15px; outline: none; }
        .modal-btn { width: 100%; padding: 15px; background: var(--msn-blue); color: #fff; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .modal-btn.cancel { background: #eee; color: #555; }

        /* ANIMACIONES */
        .vibrate { animation: vibe 0.1s 15; }
        @keyframes vibe { 0% {transform:translate(0,0)} 25% {transform:translate(5px,5px)} 50% {transform:translate(-5px,-5px)} 100% {transform:translate(0,0)} }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body onclick="iniciarAudio()">

    <div id="login-curtain" class="curtain">
        <div class="modal-box">
            <h1 style="color:var(--msn-blue); font-style:italic; margin-bottom:10px;">MSN Elite</h1>
            <p style="color:#888; margin-bottom:30px; font-weight:bold; font-size:13px; letter-spacing:1px;">EDICIÓN MÓVIL 2026</p>
            
            <input id="user-in" type="text" class="modal-input" placeholder="Nombre de usuario">
            <input id="pass-in" type="password" class="modal-input" placeholder="Contraseña">
            
            <button class="modal-btn" onclick="ejecutarLogin()">Iniciar Sesión</button>
        </div>
    </div>

    <div id="modal-perfil" class="curtain" style="display:none; z-index:9500;">
        <div class="modal-box">
            <h2 style="color:var(--msn-blue); margin-bottom:20px;"><i class="fa-solid fa-user-pen"></i> Tu Perfil</h2>
            
            <p style="font-size:12px; text-align:left; color:#777; font-weight:bold; margin-bottom:5px;">Subir Foto:</p>
            <input type="file" id="input-foto" accept="image/*" class="modal-input" style="padding:10px;">
            
            <p style="font-size:12px; text-align:left; color:#777; font-weight:bold; margin-bottom:5px;">Mensaje Personal:</p>
            <input type="text" id="input-desc" class="modal-input" placeholder="¿En qué estás pensando?">
            
            <button class="modal-btn" onclick="guardarPerfil()">Guardar Cambios</button>
            <button class="modal-btn cancel" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <div id="app">
        
        <div id="my-header">
            <div class="profile-left">
                <img id="my-avatar" src="/logo-conversando.png" onclick="abrirModal()">
                <div class="profile-info">
                    <b id="my-name">Cargando...</b>
                    <span id="my-desc">Conectando al servidor...</span>
                    <div class="status" id="my-status">
                        <i class="fa-brands fa-youtube" style="color:red"></i> Disponible | ☀️ +22°C Stgo
                    </div>
                </div>
            </div>
            <button class="btn-config" onclick="abrirModal()"><i class="fa-solid fa-gear"></i> Ajustes</button>
        </div>

        <div id="target-header">
            <div class="target-left">
                <img id="target-avatar" src="/logo-conversando.png">
                <div class="target-info">
                    <b><span class="dot" id="target-dot"></span> <span id="target-name">Sala General</span></b>
                    <span id="target-desc">Chat global de la plataforma</span>
                </div>
            </div>
        </div>

        <div id="horizontal-nav">
            <div style="font-size:12px; color:#aaa; padding:15px; text-align:center; width:100%;">
                Cargando grupos y contactos...
            </div>
        </div>

        <div id="chat-area">
            </div>

        <div id="typing-box"></div>

        <div id="input-area">
            <div class="toolbar">
                <div class="emojis">😊 😂 ❤️ 😮 😛</div>
                <button class="btn-zumbido" onclick="enviarZumbido()"><i class="fa-solid fa-bell"></i> ENVIAR ZUMBIDO</button>
            </div>
            
            <input type="text" id="text-input" placeholder="Escribe un mensaje aquí..." oninput="notificarEscritura()">
            <button class="btn-enviar" onclick="enviarMensaje()">Enviar Mensaje (Enter)</button>
        </div>

        <div id="youtube-container">
            <div class="yt-header">
                <span><i class="fa-brands fa-youtube" style="color:red"></i> Sintonía YouTube</span>
                <input type="text" id="yt-input" placeholder="Pega un link aquí..." style="border:1px solid #ccc; border-radius:4px; padding:4px 8px; font-size:11px; width:140px; outline:none;" onchange="cargarMultimedia(this.value)">
            </div>
            <div id="yt-player-box">
                <span style="color:#666; font-size:12px; display:flex; align-items:center; justify-content:center; height:100%;">El reproductor se activará aquí</span>
            </div>
        </div>

    </div>
  <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const socket = io();
        let miUsuario = localStorage.getItem('msn_user_elite') || "";
        let chatActivo = 'conversando';
        let ytPlayer, timerEscritura;

        // --- A. SISTEMA DE AUDIO NATIVO ---
        const sndLogin = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const sndMsg = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const sndBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');
        
        function iniciarAudio() {
            [sndLogin, sndMsg, sndBuzz].forEach(s => s.play().then(() => s.pause()).catch(() => {}));
        }

        // --- B. GESTIÓN DE SESIÓN Y LOGIN ---
        if(miUsuario) {
            socket.emit('login', { user: miUsuario, pass: '123' }); // Bypass simulado para la demo
        }

        function ejecutarLogin() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if(!u) return;
            
            localStorage.setItem('msn_user_elite', u);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', r => {
            if(r.success) {
                miUsuario = r.user;
                document.getElementById('login-curtain').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                
                actualizarMiPerfil(r.perfil);
                cambiarChat('conversando', 'Conversando', '/logo-conversando.png', 'Chat Global');
                sndLogin.play().catch(()=>{});
            } else { 
                alert(r.msg); localStorage.clear(); location.reload(); 
            }
        });

        function actualizarMiPerfil(perfil) {
            document.getElementById('my-avatar').src = perfil.foto || "/logo-conversando.png";
            document.getElementById('my-name').innerText = miUsuario;
            document.getElementById('my-desc').innerText = perfil.descripcion || "En la vida pienso";
        }

        // --- C. REPRODUCTOR YOUTUBE ANCLADO ---
        function onYouTubeIframeAPIReady() {
            document.getElementById('yt-player-box').innerHTML = '<div id="yt-player-api"></div>';
            ytPlayer = new YT.Player('yt-player-api', {
                height: '90', width: '100%',
                playerVars: { 'controls': 1, 'disablekb': 1 },
                events: { 'onStateChange': sincronizarMusica }
            });
        }

        function cargarMultimedia(url) {
            if(!ytPlayer) return;
            let id = url.includes("list=") ? url.split("list=")[1].split("&")[0] : (url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1]?.split("?")[0] || url);
            url.includes("list=") ? ytPlayer.loadPlaylist({list: id}) : ytPlayer.loadVideoById(id);
            document.getElementById('yt-input').value = ""; // Limpiar input
        }

        function sincronizarMusica(e) {
            const statusBox = document.getElementById('my-status');
            if(e.data == YT.PlayerState.PLAYING) {
                const titulo = ytPlayer.getVideoData().title;
                socket.emit('update_profile', { desc: "🎵 " + titulo });
                statusBox.innerHTML = `<i class="fa-brands fa-youtube" style="color:red"></i> 🎵 ${titulo} | ☀️ +22°C Stgo`;
                statusBox.style.color = "var(--msn-blue)";
            } else if (e.data == YT.PlayerState.PAUSED || e.data == YT.PlayerState.ENDED) {
                socket.emit('update_profile', { desc: "Disponible" });
                statusBox.innerHTML = `<i class="fa-brands fa-youtube" style="color:red"></i> Disponible | ☀️ +22°C Stgo`;
                statusBox.style.color = "#555";
            }
        }

        // --- D. BARRA HORIZONTAL: GRUPOS FIJOS Y CONTACTOS ---
        socket.on('lista_contactos', lista => {
            const nav = document.getElementById('horizontal-nav');
            
            // 1. Inyectar siempre los 3 grupos fijos de tu diseño
            let htmlNav = `
                <div class="nav-item" onclick="cambiarChat('conversando', 'Conversando', '/logo-conversando.png', 'Chat Global')">
                    <img src="/logo-conversando.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <span><div class="dot ${chatActivo === 'conversando' ? 'active' : ''}"></div> Conversando</span>
                    <div id="badge-conversando" class="unread-badge"></div>
                </div>
                <div class="nav-item" onclick="cambiarChat('juegos', 'Juegos', '/logo-juegos.png', 'Rust & Bellwright')">
                    <img src="/logo-juegos.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <span><div class="dot ${chatActivo === 'juegos' ? 'active' : ''}"></div> Juegos</span>
                    <div id="badge-juegos" class="unread-badge"></div>
                </div>
                <div class="nav-item" onclick="cambiarChat('solotodo', 'Solo Todo', '/logo-solotodo.png', 'Hardware y Ofertas')">
                    <img src="/logo-solotodo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <span><div class="dot ${chatActivo === 'solotodo' ? 'active' : ''}"></div> Solo Todo</span>
                    <div id="badge-solotodo" class="unread-badge"></div>
                </div>
            `;

            // 2. Inyectar usuarios conectados
            lista.forEach(u => {
                if(u.user === miUsuario) { actualizarMiPerfil(u); return; }
                
                const isActive = chatActivo === u.user ? 'active' : '';
                htmlNav += `
                    <div class="nav-item" onclick="cambiarChat('${u.user}', '${u.user}', '${u.foto || 'https://i.imgur.com/8Q9qZ7Y.png'}', '${u.descripcion || 'Disponible'}')">
                        <img src="${u.foto || 'https://i.imgur.com/8Q9qZ7Y.png'}" style="background:#eee;">
                        <span><div class="dot ${isActive}"></div> ${u.user}</span>
                        <div id="badge-${u.user}" class="unread-badge"></div>
                    </div>
                `;

                // Actualizar info del chat activo si mutó
                if(u.user === chatActivo) {
                    document.getElementById('target-desc').innerText = u.descripcion || 'Disponible';
                    document.getElementById('target-avatar').src = u.foto || 'https://i.imgur.com/8Q9qZ7Y.png';
                }
            });
            nav.innerHTML = htmlNav;
        });

        // --- E. CAMBIO DE CHAT ---
        function cambiarChat(id, nombre, foto, desc) {
            chatActivo = id;
            
            // Actualizar Cabecera
            document.getElementById('target-name').innerText = nombre;
            document.getElementById('target-avatar').src = foto;
            document.getElementById('target-desc').innerText = desc || "Disponible";
            
            // Ocultar notificación
            const badge = document.getElementById('badge-' + id);
            if(badge) badge.style.display = 'none';

            // Refrescar puntitos verdes
            document.querySelectorAll('.nav-item .dot').forEach(dot => dot.classList.remove('active'));
            event.currentTarget.querySelector('.dot').classList.add('active');

            // Cargar mensajes
            document.getElementById('chat-area').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        // --- F. ENVIAR Y RECIBIR MENSAJES (CON LINKS Y HORA) ---
        function enviarMensaje() {
            const input = document.getElementById('text-input');
            const txt = input.value.trim();
            if(txt) {
                socket.emit('chat message', { to: chatActivo, text: txt });
                input.value = "";
                input.focus();
            }
        }

        function enviarZumbido() { socket.emit('chat message', { to: chatActivo, isBuzz: true }); }
        
        function notificarEscritura() { socket.emit('typing', { to: chatActivo, user: miUsuario }); }
        socket.on('typing_status', d => {
            if(d.user === chatActivo && d.to === miUsuario) {
                document.getElementById('typing-box').innerText = d.user + " está escribiendo...";
                clearTimeout(timerEscritura);
                timerEscritura = setTimeout(() => { document.getElementById('typing-box').innerText = ""; }, 3000);
            }
        });

        socket.on('chat message', m => {
            const origen = m.to || 'conversando';
            const esGrupo = ['conversando', 'juegos', 'solotodo'].includes(origen);
            const esParaMiPantalla = (esGrupo && origen === chatActivo) || (m.user === chatActivo) || (m.user === miUsuario && m.to === chatActivo);

            if(esParaMiPantalla) {
                pintarGlobo(m);
                if(m.user !== miUsuario) sndMsg.play().catch(()=>{});
                if(m.isBuzz) {
                    document.getElementById('app').classList.add('vibrate');
                    sndBuzz.play().catch(()=>{});
                    setTimeout(() => document.getElementById('app').classList.remove('vibrate'), 1500);
                }
            } else {
                const idNotificacion = esGrupo ? origen : m.user;
                const badge = document.getElementById('badge-' + idNotificacion);
                if(badge) badge.style.display = 'block';
                sndMsg.play().catch(()=>{});
            }
        });

        function pintarGlobo(m) {
            const area = document.getElementById('chat-area');
            const horaStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Regex para links
            let txt = m.isBuzz ? '<b style="color:var(--nudge-red);"><i class="fa-solid fa-bell"></i> ZUMBIDO</b>' : (m.texto || m.text);
            txt = txt.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank">${url}</a>`);

            const div = document.createElement('div');
            div.className = "msg-row";
            div.innerHTML = `
                <div class="msg-head">
                    <span>${m.user} dice:</span>
                    <span class="msg-time">${horaStr}</span>
                </div>
                <div class="msg-body">${txt}</div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        socket.on('actualizar_historial', d => { if(d.target === chatActivo) d.history.forEach(m => pintarGlobo(m)); });

        // --- G. CONFIGURACIÓN (MODALES) ---
        function abrirModal() { document.getElementById('modal-perfil').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-perfil').style.display = 'none'; }
        function guardarPerfil() {
            const archivo = document.getElementById('input-foto').files[0];
            const texto = document.getElementById('input-desc').value;
            if(archivo) {
                const reader = new FileReader();
                reader.onload = (e) => { socket.emit('update_profile', { desc: texto, foto: e.target.result }); cerrarModal(); };
                reader.readAsDataURL(archivo);
            } else {
                socket.emit('update_profile', { desc: texto, foto: null });
                cerrarModal();
            }
        }

        // Fix teclado Android
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            document.getElementById('app').style.height = window.visualViewport.height + 'px';
            document.getElementById('chat-area').scrollTop = 999999;
        });
    </script>
</body>
</html>
