<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MSN Messenger - EL CÓDIGO MAESTRO FINAL - YOUTUBE & ONRENDER</title>

    <style>
        /* ============================================================
           CSS ORIGINAL - INTEGRIDAD TOTAL
           ============================================================ */
        :root {
            --msn-blue: #0055e5;
            --msn-bg: #71ADFF;
            --header-grad: linear-gradient(to bottom, #f9fcff 0%, #dcecfc 100%);
            --border-color: #b4c7de;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
            --yt-red: #FF0000;
            --status-online: #31a24c;
            --status-busy: #d93025;
            --status-away: #f9ab00;
            --status-offline: #bdc1c6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--msn-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
        }

        #app {
            display: none;
            width: 1200px;
            max-width: 100vw;
            height: 900px;
            max-height: 100dvh; 
            background: var(--white);
            border: 1px solid #1c1c1c;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        header {
            background: var(--header-grad);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .my-info-block {
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
            flex: 1;
        }

        #my-avatar-display {
            width: 68px;
            height: 68px;
            border: 2px solid #fff;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background: #e0e0e0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #my-avatar-display:hover { transform: scale(1.05); }

        .my-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #my-user-label {
            color: var(--msn-blue);
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #my-status-label {
            color: #555;
            font-size: 12px;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #api-integration-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 2px;
        }

        #yt-api-text {
            color: var(--yt-red);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        #weather-api-text { color: #555; }

        .btn-profile-gear {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--msn-blue);
            font-weight: bold;
            font-size: 12px;
            padding: 5px 10px;
            transition: all 0.2s;
        }
        .btn-profile-gear span {
            display: inline-block;
            transition: transform 0.5s ease;
            font-size: 16px;
        }
        .btn-profile-gear:hover span {
            transform: rotate(90deg);
        }

        .btn-msn {
            padding: 7px 15px;
            background: #fff;
            border: 1px solid #a0b5d0;
            color: var(--msn-blue);
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #sidebar-left {
            width: 320px;
            border-right: 1px solid #d0deee;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            flex-shrink: 0;
        }

        .category-label {
            background: #eff6ff;
            padding: 10px 15px;
            font-size: 11px;
            font-weight: bold;
            color: #4a607a;
            border-bottom: 1px solid #dcecfc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            border-bottom: 1px solid #f4f8fd;
            position: relative;
        }

        .contact-item.active-contact {
            background: #e8f2ff;
            border-left: 4px solid var(--msn-blue);
        }

        .contact-item img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; flex-shrink: 0; }
        .online { background: var(--status-online); }
        .busy { background: var(--status-busy); }
        .away { background: var(--status-away); }
        .offline { background: var(--status-offline); }

        #dynamic-friends-list { flex: 1; overflow-y: auto; }

        #chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            min-width: 0;
        }

        #active-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #fdfdfd;
            border-bottom: 1px solid #dcecfc;
            flex-shrink: 0;
        }

        #messages-wall {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fff;
            scroll-behavior: smooth;
        }

        #chat-toolbar {
            padding: 10px 15px;
            background: #f1f5f9;
            border-top: 1px solid #d0deee;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .emoji-btn { font-size: 22px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .emoji-btn:hover { transform: scale(1.2); }

        #input-zone {
            padding: 15px;
            background: #f7faff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
        }

        #main-textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 1px solid #a0b5d0;
            border-radius: 4px;
            resize: none;
            font-size: 15px;
            outline: none;
        }

        .btn-send {
            width: 140px;
            background: var(--msn-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        #sidebar-right {
            width: 260px;
            background: #fcfcfc;
            border-left: 1px solid #d0deee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .big-avatar-frame {
            width: 160px;
            height: 160px;
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            object-fit: cover;
        }

        /* ============================================================
           RESPONSIVE ANDROID - ESTRICTO
           ============================================================ */
        @media (max-width: 900px) {
            #app { height: 100%; max-height: 100vh; width: 100vw; border: none; border-radius: 0; }
            header { padding: 10px; }
            #my-avatar-display { width: 50px; height: 50px; }
            
            /* FIX: MANTENEMOS EL SCROLL TÁCTIL ACTIVADO */
            main { 
                flex-direction: column; 
                overflow-y: auto; 
                -webkit-overflow-scrolling: touch; 
            }
            
            #sidebar-left { 
                width: 100%; height: auto; border-right: none; 
                border-bottom: 1px solid #dcecfc; flex-direction: row; 
                overflow-x: auto; flex-shrink: 0; padding: 5px 0;
            }
            .category-label { display: none; }
            #dynamic-friends-list { display: flex; flex-direction: row; }
            .contact-item { padding: 5px 10px; width: auto; flex-direction: column; align-items: center; }
            .contact-item.active-contact { border-left: none; border-bottom: 3px solid var(--msn-blue); }
            #sidebar-right { width: 100%; padding: 10px; border-left: none; }
            #yt-module { margin-bottom: 0; width: 100%; }
            #target-avatar-big, #target-name-big, #target-status-big, #my-small-preview { display: none; } 
        }

        .nudge-shake { animation: nudge-action 0.1s 12; }
        @keyframes nudge-action { 0% { transform: translate(0,0); } 20% { transform: translate(10px,10px); } 40% { transform: translate(-10px,-10px); } }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 40px; border-radius: 12px; width: 480px; text-align: center; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <div id="login-screen" style="display: flex; position: fixed; inset: 0; background: var(--msn-bg); z-index: 5000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 50px; border-radius: 15px; width: 440px; text-align: center; box-shadow: var(--shadow);">
            <h1 style="color:var(--msn-blue); font-style: italic; margin-bottom:15px; font-size: 34px;">MSN Messenger</h1>
            <input id="login-u" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ccc; border-radius:10px;" type="text" placeholder="Correo electrónico">
            <input id="login-p" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ccc; border-radius:10px;" type="password" placeholder="Contraseña">
            <button onclick="handleLoginAttempt()" class="btn-send" style="width:100%; padding:15px;">Iniciar Sesión</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="my-info-block">
                <img id="my-avatar-display" onclick="openProfileSettings()">
                <div class="my-details">
                    <b id="my-user-label">Usuario MSN</b>
                    <span id="my-status-label" onclick="cycleMyStatus()">
                        <span id="my-status-dot" class="status-dot online"></span>
                        <span id="my-status-text">Disponible</span>
                    </span>
                    <div id="api-integration-line">
                        <span id="yt-api-text"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="12" height="12"> Disponible</span>
                        <span id="weather-api-text">| ☀️ Santiago...</span>
                    </div>
                </div>
            </div>
            <div class="header-btns">
                <div class="btn-profile-gear" onclick="openProfileSettings()">
                    <span>⚙️</span> Perfil
                </div>
            </div>
        </header>

        <main>
            <div id="sidebar-left">
                <div class="category-label">Salas Onrender</div>
                <button class="contact-item active-contact" onclick="switchToChat('conversando', 'Conversando', '/logo-conversando.png', 'Chat principal')">
                    <img src="/logo-conversando.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <div class="c-info"><b class="c-name"><span class="status-dot online"></span>Conversando</b><span class="c-status">Chat principal</span></div>
                    <span class="badge-notify" id="notify-conversando">0</span>
                </button>
                <div class="category-label">Mis Contactos</div>
                <div id="dynamic-friends-list"></div>
            </div>

            <div id="chat-view">
                <div id="active-chat-header">
                    <div class="ach-left">
                        <img id="ach-avatar" src="/logo-conversando.png">
                        <div class="ach-info">
                            <span class="ach-name"><span class="status-dot online"></span> <span id="ach-title">Conversando</span></span>
                            <span class="ach-desc" id="ach-subtitle">Chat principal</span>
                        </div>
                    </div>
                    <button class="btn-msn" onclick="openProfileSettings()" style="font-size: 10px;">Opciones</button>
                </div>
                <div id="messages-wall"></div>
                <div id="typing-indicator" style="padding:0 25px; font-size:11px; color:green; font-style:italic;"></div>
                <div id="chat-toolbar">
                    <span class="emoji-btn" onclick="insertEmoji('😊')">😊</span>
                    <span class="emoji-btn" onclick="insertEmoji('😂')">😂</span>
                    <span class="emoji-btn" onclick="insertEmoji('❤️')">❤️</span>
                    <span class="emoji-btn" onclick="insertEmoji('😮')">😮</span>
                    <span class="emoji-btn" onclick="insertEmoji('😛')">😛</span>
                    <span class="emoji-btn" onclick="document.getElementById('file-transfer').click()">📎</span>
                    <input type="file" id="file-transfer" style="display:none" onchange="sendFile(this)">
                    <button class="btn-msn" onclick="emitNudge()" style="margin-left:auto; font-size:10px;">🔔 ENVIAR ZUMBIDO</button>
                </div>
                <div id="input-zone">
                    <textarea id="main-textarea" placeholder="Escribe un mensaje aquí..." oninput="reportTyping()"></textarea>
                    <button class="btn-send" onclick="performSendMessage()">Enviar (Enter)</button>
                </div>
            </div>

            <div id="sidebar-right">
                <div id="yt-module" style="width: 100%; padding: 10px; background: #f0f7ff; border-radius: 8px; border: 1px solid #dcecfc; margin-bottom: 20px;">
                    <div style="font-size: 11px; font-weight: bold; color: var(--msn-blue); margin-bottom: 5px;">Reproductor YouTube</div>
                    <div id="yt-player-container" style="width: 100%; height: 130px; background: #000; border-radius: 4px; overflow: hidden; margin-bottom: 8px;">
                        <div id="yt-player"></div>
                    </div>
                    
                    <div style="display: flex; gap: 4px; margin-bottom: 8px;">
                        <input id="yt-url-input" type="text" placeholder="Busca canción o pega Link..." style="flex: 1; padding: 6px; font-size: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                        <button class="btn-msn" onclick="buscarYoutube()" style="padding: 4px; background: var(--msn-blue); color: white;">Ir</button>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 4px;">
                        <button class="btn-msn" onclick="ytPlay()">▶</button>
                        <button class="btn-msn" onclick="ytPause()">⏸</button>
                        <button class="btn-msn" onclick="ytStop()" style="color: red;">⏹</button>
                        <button class="btn-msn" onclick="ytNext()">⏭</button>
                        <input type="range" id="yt-vol" min="0" max="100" value="50" style="width: 60px;" oninput="if(ytPlayerObj) ytPlayerObj.setVolume(this.value)">
                    </div>
                </div>
                <img id="target-avatar-big" class="big-avatar-frame" src="/logo-conversando.png">
                <h3 id="target-name-big" style="margin-top:20px; color:var(--msn-blue);">Conversando</h3>
                <div id="my-small-preview">
                    <img id="my-mini-avatar" class="big-avatar-frame" style="width:120px; height:120px;">
                </div>
            </div>
        </main>
    </div>

    <div id="modal-profile" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color:var(--msn-blue); margin-bottom:20px;">Personalizar Perfil</h2>
            <input id="input-new-phrase" style="width:100%; padding:10px; margin-bottom:10px;" type="text" placeholder="¿Qué piensas?">
            <input id="input-new-photo" type="file" accept="image/*" style="margin-bottom: 20px;">
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn-msn" onclick="closeProfileSettings()">Cancelar</button>
                <button class="btn-send" onclick="applyProfileChanges()" style="width: 100px;">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let myUsername = localStorage.getItem('msn_master_user') || "";
        let activeChatId = 'conversando';
        let ytPlayerObj;
        let myStatusIndex = 0;
        const statusLevels = [
            { text: "Disponible", class: "online" },
            { text: "Ocupado", class: "busy" },
            { text: "Ausente", class: "away" }
        ];

        const sndLogin = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const sndMessage = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const sndBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-nudge.mp3');

        function enableAudioContext() {
            [sndLogin, sndMessage, sndBuzz].forEach(a => { a.volume = 0; a.play().then(() => { a.pause(); a.currentTime = 0; a.volume = 1; }); });
        }

        if(myUsername) { socket.emit('login', { user: myUsername, pass: localStorage.getItem('msn_master_pass') }); }

        function handleLoginAttempt() {
            enableAudioContext();
            const u = document.getElementById('login-u').value.trim();
            const p = document.getElementById('login-p').value.trim();
            if(!u || !p) return alert("Faltan datos");
            localStorage.setItem('msn_master_user', u);
            localStorage.setItem('msn_master_pass', p);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', res => {
            if(res.success) {
                myUsername = res.user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                syncMyProfile(res.perfil);
                switchToChat('conversando', 'Conversando', '/logo-conversando.png', 'Chat principal');
                sndLogin.play().catch(()=>{});
            }
        });

        function cycleMyStatus() {
            myStatusIndex = (myStatusIndex + 1) % statusLevels.length;
            const s = statusLevels[myStatusIndex];
            document.getElementById('my-status-dot').className = "status-dot " + s.class;
            document.getElementById('my-status-text').innerText = s.text;
            socket.emit('update_profile', { desc: s.text });
        }

        function syncMyProfile(p) {
            const pic = p.foto || "https://via.placeholder.com/160";
            document.getElementById('my-avatar-display').src = pic;
            document.getElementById('my-mini-avatar').src = pic;
            document.getElementById('my-user-label').innerText = myUsername;
            document.getElementById('my-status-text').innerText = p.descripcion || "Disponible";
        }

        /* ============================================================
           FIX: YOUTUBE & BUSCADOR INTERNO (MÉTODO BLINDADO)
           ============================================================ */
        function onYouTubeIframeAPIReady() {
            ytPlayerObj = new YT.Player('yt-player', {
                height: '130', width: '100%', videoId: '',
                playerVars: { 'controls': 0, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function buscarYoutube() {
            const val = document.getElementById('yt-url-input').value.trim();
            if(!val || !ytPlayerObj) return;

            if(val.includes('youtube.com/') || val.includes('youtu.be/')) {
                let vid = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('youtu.be/')[1].split('?')[0];
                ytPlayerObj.loadVideoById(vid);
            } else {
                /* FIX: CARGA BUSQUEDA INTERNA SIN VENTANAS NUEVAS */
                ytPlayerObj.loadPlaylist({
                    list: val,
                    listType: 'search'
                });
            }
            document.getElementById('yt-url-input').value = "";
        }

        document.getElementById('yt-url-input').addEventListener('keydown', e => { if(e.key === 'Enter') buscarYoutube(); });

        /* ============================================================
           FIX: RECUPERACIÓN ESTADO MUSICAL (SÓLIDO)
           ============================================================ */
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                const data = ytPlayerObj.getVideoData();
                const title = data && data.title ? data.title : "Música";
                const statusStr = "🎵 Escuchando: " + title;
                
                // FORCE: BROADCAST A SOCKETS PARA USUARIO SECUNDARIO
                socket.emit('update_profile', { desc: statusStr });
                
                // UPDATE: UI LOCAL
                document.getElementById('yt-api-text').innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="12" height="12"> ${statusStr}`;
                document.getElementById('my-status-text').innerText = statusStr;
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                socket.emit('update_profile', { desc: "Disponible" });
                document.getElementById('yt-api-text').innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="12" height="12"> Disponible`;
                document.getElementById('my-status-text').innerText = "Disponible";
            }
        }

        function ytPlay() { if(ytPlayerObj && ytPlayerObj.playVideo) ytPlayerObj.playVideo(); }
        function ytPause() { if(ytPlayerObj && ytPlayerObj.pauseVideo) ytPlayerObj.pauseVideo(); }
        function ytStop() { 
            if(ytPlayerObj && ytPlayerObj.stopVideo) {
                ytPlayerObj.stopVideo(); 
                socket.emit('update_profile', { desc: "Disponible" });
            }
        }
        function ytNext() { if(ytPlayerObj && ytPlayerObj.nextVideo) ytPlayerObj.nextVideo(); }

        /* CONTACTOS & CHAT - INTEGRIDAD TOTAL */
        socket.on('lista_contactos', list => {
            const container = document.getElementById('dynamic-friends-list');
            container.innerHTML = "";
            list.forEach(u => {
                if(u.user === myUsername) { syncMyProfile(u); return; }
                const btn = document.createElement('button');
                let sClass = u.online ? 'online' : 'offline';
                if(u.descripcion === "Ocupado") sClass = "busy";
                if(u.descripcion === "Ausente") sClass = "away";
                
                btn.className = "contact-item" + (u.user === activeChatId ? " active-contact" : "");
                btn.innerHTML = `<img src="${u.foto || 'https://via.placeholder.com/60'}"><div class="c-info"><b class="c-name"><span class="status-dot ${sClass}"></span>${u.user}</b><span class="c-status">${u.descripcion||'Disponible'}</span></div>`;
                btn.onclick = () => switchToChat(u.user, u.user, u.foto, u.descripcion);
                container.appendChild(btn);
            });
        });

        function switchToChat(id, name, img, desc) {
            activeChatId = id;
            document.getElementById('ach-title').innerText = name;
            document.getElementById('ach-avatar').src = img || "/logo-conversando.png";
            document.getElementById('target-name-big').innerText = name;
            document.getElementById('target-avatar-big').src = img || "/logo-conversando.png";
            document.getElementById('messages-wall').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        function performSendMessage() {
            const input = document.getElementById('main-textarea');
            if(input.value.trim()) { socket.emit('chat message', { to: activeChatId, text: input.value }); input.value = ""; }
        }

        function sendFile(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('chat message', { to: activeChatId, file: { name: file.name, data: e.target.result } });
            };
            reader.readAsDataURL(file);
        }

        socket.on('chat message', m => {
            const origin = m.to || 'conversando';
            if(origin === activeChatId || m.user === activeChatId || m.user === myUsername) {
                appendMessage(m);
                if(m.isBuzz) { 
                    document.getElementById('app').classList.add('nudge-shake'); 
                    sndBuzz.play(); 
                    setTimeout(()=>document.getElementById('app').classList.remove('nudge-shake'), 800); 
                } else if(m.user !== myUsername) { sndMessage.play(); }
            }
        });

        function appendMessage(m) {
            const wall = document.getElementById('messages-wall');
            const div = document.createElement('div');
            div.className = "msg-block";
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let txt = m.text || m.texto || "";
            if(m.isBuzz) txt = "<b style='color:red;'>TE HA ENVIADO UN ZUMBIDO</b>";
            else if(m.file) txt = `📎 <a href="${m.file.data}" download="${m.file.name}" style="color:blue;">${m.file.name}</a>`;
            else {
                txt = txt.replace(/:\)/g, '😊').replace(/:D/g, '😃').replace(/\(L\)/g, '❤️');
                txt = txt.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:blue;">${url}</a>`);
            }
            div.innerHTML = `<div class="msg-header">${m.user} dice: <span>[${time}]</span></div><div class="msg-content">${txt}</div>`;
            wall.appendChild(div); wall.scrollTop = wall.scrollHeight;
        }

        socket.on('actualizar_historial', r => { if(r.target === activeChatId) r.history.forEach(m => appendMessage(m)); });

        /* ANDROID KEYBOARD FIX */
        window.visualViewport.addEventListener('resize', () => {
            const h = window.visualViewport.height;
            document.body.style.height = h + 'px';
            document.getElementById('app').style.height = h + 'px';
            document.getElementById('messages-wall').scrollTop = 99999;
        });

        function openProfileSettings() { document.getElementById('modal-profile').style.display = 'flex'; }
        function closeProfileSettings() { document.getElementById('modal-profile').style.display = 'none'; }
        function applyProfileChanges() {
            const f = document.getElementById('input-new-photo').files[0];
            const p = document.getElementById('input-new-phrase').value;
            if(f) {
                const r = new FileReader();
                r.onload = (e) => { socket.emit('update_profile', { desc: p, foto: e.target.result }); closeProfileSettings(); };
                r.readAsDataURL(f);
            } else { socket.emit('update_profile', { desc: p }); closeProfileSettings(); }
        }
        function insertEmoji(e) { document.getElementById('main-textarea').value += e; }
        function reportTyping() { socket.emit('typing', { to: activeChatId, user: myUsername }); }
        socket.on('typing_status', d => {
            if(d.to === myUsername && d.user === activeChatId) {
                document.getElementById('typing-indicator').innerText = d.user + " está escribiendo...";
                setTimeout(() => { document.getElementById('typing-indicator').innerText = ""; }, 3000);
            }
        });
    </script>
</body>
</html>
