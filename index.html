<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSN Messenger - VERSIÓN RECUPERADA (SIN ERRORES)</title>
    
    <style>
        /* ============================================================
           CSS - DISEÑO ORIGINAL Y ADAPTACIÓN MÓVIL
           ============================================================ */
        :root {
            --msn-blue: #0055e5;
            --msn-bg: #71ADFF;
            --header-grad: linear-gradient(to bottom, #f9fcff 0%, #dcecfc 100%);
            --border-color: #b4c7de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--msn-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #app {
            display: none; /* Se activa tras login */
            width: 1150px;
            max-width: 100vw;
            height: 850px;
            max-height: 100vh;
            background: #ffffff;
            border: 1px solid #222;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        /* HEADER */
        header {
            background: var(--header-grad);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .my-identity {
            display: flex;
            align-items: center;
            gap: 18px;
            flex: 1;
            min-width: 0;
        }

        #my-avatar-img {
            width: 65px;
            height: 65px;
            border: 2px solid #fff;
            border-radius: 5px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background: #f0f0f0;
        }

        .my-text-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #my-name-display {
            color: var(--msn-blue);
            font-size: 16px;
            font-weight: bold;
        }

        #my-status-display {
            color: #555;
            font-size: 12px;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-edit-profile {
            padding: 8px 15px;
            background: #fff;
            border: 1px solid #a0b5d0;
            color: var(--msn-blue);
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* MAIN LAYOUT */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* COLUMNA IZQUIERDA: GRUPOS Y CONTACTOS */
        #left-pane {
            width: 300px;
            border-right: 1px solid #d0deee;
            display: flex;
            flex-direction: column;
            background: #fff;
            flex-shrink: 0;
        }

        .section-header {
            background: #eff6ff;
            padding: 12px 18px;
            font-size: 11px;
            font-weight: bold;
            color: #4a607a;
            border-bottom: 1px solid #dcecfc;
            text-transform: uppercase;
        }

        .list-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            width: 100%;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #f5f8fb;
            position: relative;
        }

        .list-btn:hover { background: #f0f7ff; }

        .list-btn .badge {
            position: absolute;
            top: 12px;
            right: 15px;
            background: #ff8c00;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            display: none;
        }

        .contact-info-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;
        }

        .c-user { font-weight: bold; font-size: 13px; color: #333; }
        .c-phrase { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* COLUMNA CENTRAL: CHAT */
        #center-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;
        }

        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #typing-status-bar {
            height: 25px;
            padding: 0 25px;
            font-size: 11px;
            color: #2b9348;
            font-style: italic;
        }

        #tool-strip {
            padding: 10px 20px;
            background: #f1f5f9;
            border-top: 1px solid #d0deee;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .emoji-trigger { font-size: 24px; cursor: pointer; user-select: none; }

        #input-container {
            padding: 20px;
            background: #f7faff;
            border-top: 1px solid #eee;
        }

        #chat-textarea {
            width: 100%;
            height: 80px;
            padding: 15px;
            border: 1px solid #a0b5d0;
            border-radius: 5px;
            resize: none;
            font-size: 15px;
            outline: none;
        }

        .btn-send-msg {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: var(--msn-blue);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        /* COLUMNA DERECHA: INFO */
        #right-pane {
            width: 240px;
            background: #fafafa;
            border-left: 1px solid #d0deee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            flex-shrink: 0;
        }

        .big-avatar {
            width: 160px;
            height: 160px;
            border: 6px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
        }

        /* MODALES */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            width: 450px;
            max-width: 90%;
            text-align: center;
        }

        /* LOGIN */
        #login-overlay {
            background: #fff;
            padding: 50px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        .input-login {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        /* ESTADOS */
        .status-pill { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .st-online { background: #31a24c; }
        .st-offline { background: #bdc1c6; }

        /* ZUMBIDO */
        .shake-app { animation: msn-shake 0.1s 10; }
        @keyframes msn-shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(8px,8px); }
            50% { transform: translate(-8px,-8px); }
            75% { transform: translate(8px,-8px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="login-overlay">
        <h1 style="color:var(--msn-blue); font-style: italic; margin-bottom:10px;">MSN Messenger</h1>
        <p style="color:#666; font-size:14px; margin-bottom:35px;">Inicia sesión con tu cuenta de Passport</p>
        <input id="inp-u" class="input-login" type="text" placeholder="Correo o Usuario">
        <input id="inp-p" class="input-login" type="password" placeholder="Contraseña">
        <button onclick="attemptLogin()" class="btn-send-msg">Iniciar Sesión</button>
    </div>

    <div id="app">
        <header>
            <div class="my-identity">
                <img id="my-avatar-img" src="" alt="Yo">
                <div class="my-text-info">
                    <b id="my-name-display">Usuario</b>
                    <span id="my-status-display">Conectando...</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-edit-profile" onclick="showModalProfile()">Editar Perfil</button>
            </div>
        </header>

        <main>
            <div id="left-pane">
                <div class="section-header">Grupos de Chat</div>
                
                <button class="list-btn" onclick="openRoom('conversando', 'Conversando', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala General de Conversación')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" width="45" height="45" style="border-radius:4px;">
                    <div class="contact-info-col">
                        <span class="c-user">Conversando</span>
                        <span class="c-phrase">Chat Global</span>
                    </div>
                    <span class="badge" id="badge-conversando">0</span>
                </button>

                <button class="list-btn" onclick="openRoom('juegos', 'Juegos', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala de Juegos y Diversión')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" width="45" height="45" style="border-radius:4px;">
                    <div class="contact-info-col">
                        <span class="c-user">Juegos</span>
                        <span class="c-phrase">Comunidad Gamer</span>
                    </div>
                    <span class="badge" id="badge-juegos">0</span>
                </button>

                <button class="list-btn" onclick="openRoom('solotodo', 'Solo Todo', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala de Compra y Venta')">
                    <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" width="45" height="45" style="border-radius:4px;">
                    <div class="contact-info-col">
                        <span class="c-user">Solo Todo</span>
                        <span class="c-phrase">Marketplace MSN</span>
                    </div>
                    <span class="badge" id="badge-solotodo">0</span>
                </button>

                <div class="section-header">Contactos Online</div>
                <div id="contacts-scroller" style="flex:1; overflow-y:auto;">
                    </div>
            </div>

            <div id="center-pane">
                <div id="chat-scroller"></div>
                <div id="typing-status-bar"></div>
                
                <div id="tool-strip">
                    <span class="emoji-trigger" onclick="addEmoji('😊')">😊</span>
                    <span class="emoji-trigger" onclick="addEmoji('😂')">😂</span>
                    <span class="emoji-trigger" onclick="addEmoji('😛')">😛</span>
                    <span class="emoji-trigger" onclick="addEmoji('❤️')">❤️</span>
                    <button onclick="sendNudge()" style="margin-left:auto; cursor:pointer; font-size:10px; padding:5px 10px;">🔔 ZUMBIDO</button>
                </div>

                <div id="input-container">
                    <textarea id="chat-textarea" placeholder="Escribe un mensaje aquí..." oninput="emitTyping()"></textarea>
                    <button class="btn-send-msg" onclick="handleSend()">Enviar</button>
                </div>
            </div>

            <div id="right-pane">
                <img id="target-big-avatar" class="big-avatar" src="https://via.placeholder.com/160">
                <h3 id="target-big-name" style="margin-top:20px; color:var(--msn-blue);">...</h3>
                <p id="target-big-status" style="font-size:12px; color:#666; text-align:center; margin-top:10px; font-style:italic;">...</p>
                
                <div style="margin-top:auto; padding-top:30px; border-top:1px solid #eee; width:100%; text-align:center;">
                    <img id="my-mini-big-avatar" class="big-avatar" style="width:110px; height:110px;">
                    <p style="font-size:11px; color:#aaa; margin-top:10px;">(Tu foto actual)</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-profile" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color:var(--msn-blue); margin-bottom:25px;">Configurar mi Perfil</h2>
            
            <div style="text-align:left; margin-bottom:20px;">
                <label style="font-size:12px; font-weight:bold; color:#444;">Mensaje Personal:</label>
                <input id="edit-desc" type="text" class="input-login" style="margin-top:5px;">
            </div>
            
            <div style="text-align:left; margin-bottom:30px;">
                <label style="font-size:12px; font-weight:bold; color:#444;">Cambiar Foto:</label>
                <input id="edit-file" type="file" accept="image/*" style="width:100%; margin-top:10px;">
            </div>
            
            <div style="display:flex; gap:15px;">
                <button onclick="commitProfile()" class="btn-send-msg" style="flex:1;">Guardar</button>
                <button onclick="hideModalProfile()" class="btn-send-msg" style="flex:1; background:#eee; color:#333;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentU = localStorage.getItem('msn_user') || "";
        let currentSala = 'conversando';
        let pendingMessages = {};
        let tTimer;

        // Audios
        const audioIn = new Audio('https://raw.githubusercontent.com/pabluro/msn-assets/main/login.mp3');
        const audioMsg = new Audio('https://www.myinstants.com/media/sounds/messenger-mensaje.mp3');
        const audioBuzz = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');

        function unlockAudio() {
            [audioIn, audioMsg, audioBuzz].forEach(a => {
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
            });
        }

        // Login
        if(currentU) socket.emit('login', { user: currentU, pass: localStorage.getItem('msn_pass') });

        function attemptLogin() {
            const u = document.getElementById('inp-u').value.trim();
            const p = document.getElementById('inp-p').value.trim();
            if(!u || !p) return;
            localStorage.setItem('msn_user', u);
            localStorage.setItem('msn_pass', p);
            socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', res => {
            if(res.success) {
                currentU = res.user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                renderMyIdentity(res.perfil);
                openRoom('conversando', 'Conversando', 'https://cdn-icons-png.flaticon.com/512/686/686589.png', 'Sala General');
                audioIn.play().catch(()=>{});
            } else { alert("Login fallido"); localStorage.clear(); }
        });

        function renderMyIdentity(p) {
            const img = p.foto || "https://via.placeholder.com/150";
            document.getElementById('my-avatar-img').src = img;
            document.getElementById('my-mini-big-avatar').src = img;
            document.getElementById('my-name-display').innerText = currentU;
            document.getElementById('my-status-display').innerText = p.descripcion || "Disponible";
        }

        // Contactos
        socket.on('lista_contactos', lista => {
            const scroller = document.getElementById('contacts-scroller');
            scroller.innerHTML = "";
            lista.forEach(u => {
                if(u.user === currentU) { renderMyIdentity(u); return; }
                const b = document.createElement('button');
                b.className = "list-btn";
                const sCls = u.online ? 'st-online' : 'st-offline';
                b.innerHTML = `
                    <img src="${u.foto || 'https://via.placeholder.com/45'}" width="45" height="45" style="border-radius:4px; object-fit:cover;">
                    <div class="contact-info-col">
                        <span class="c-user"><span class="status-pill ${sCls}"></span>${u.user}</span>
                        <span class="c-phrase">${u.descripcion || 'Disponible'}</span>
                    </div>
                    <span class="badge" id="badge-${u.user}">0</span>
                `;
                b.onclick = () => openRoom(u.user, u.user, u.foto, u.descripcion);
                scroller.appendChild(b);
                if(pendingMessages[u.user]) refreshBadge(u.user, pendingMessages[u.user]);
            });
        });

        // Chat
        function openRoom(id, name, img, desc) {
            currentSala = id;
            pendingMessages[id] = 0;
            refreshBadge(id, 0);
            document.getElementById('target-big-name').innerText = name;
            document.getElementById('target-big-status').innerText = desc || "Disponible";
            document.getElementById('target-big-avatar').src = img || "https://via.placeholder.com/160?text=" + name;
            document.getElementById('chat-scroller').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        function refreshBadge(id, n) {
            const el = document.getElementById('badge-' + id);
            if(el) { el.innerText = n; el.style.display = n > 0 ? 'block' : 'none'; }
        }

        function emitTyping() { socket.emit('typing', { to: currentSala, user: currentU }); }
        socket.on('typing_status', d => {
            if(d.to === currentU && d.user === currentSala) {
                document.getElementById('typing-status-bar').innerText = `${d.user} está escribiendo...`;
                clearTimeout(tTimer);
                tTimer = setTimeout(()=> document.getElementById('typing-status-bar').innerText = "", 3000);
            }
        });

        function handleSend() {
            const txt = document.getElementById('chat-textarea').value.trim();
            if(txt) {
                socket.emit('chat message', { to: currentSala, text: txt });
                document.getElementById('chat-textarea').value = "";
                document.getElementById('chat-textarea').focus();
            }
        }

        function sendNudge() { socket.emit('chat message', { to: currentSala, isBuzz: true }); }

        socket.on('chat message', m => {
            const origin = m.to || 'conversando';
            const isGrp = ['conversando', 'juegos', 'solotodo'].includes(origin);
            const isMine = (isGrp && origin === currentSala) || (m.user === currentSala && m.to === currentU) || (m.user === currentU && m.to === currentSala);

            if(isMine) {
                draw(m);
                if(m.user !== currentU) audioMsg.play().catch(()=>{});
            } else {
                const targetId = isGrp ? origin : m.user;
                pendingMessages[targetId] = (pendingMessages[targetId] || 0) + 1;
                refreshBadge(targetId, pendingMessages[targetId]);
                audioMsg.play().catch(()=>{});
            }

            if(m.isBuzz && isMine) {
                document.getElementById('app').classList.add('shake-app');
                audioBuzz.play().catch(()=>{});
                setTimeout(()=> document.getElementById('app').classList.remove('shake-app'), 800);
            }
        });

        socket.on('actualizar_historial', r => {
            if(r.target === currentSala) {
                const s = document.getElementById('chat-scroller');
                s.innerHTML = "";
                r.history.forEach(m => draw(m));
            }
        });

        function draw(m) {
            const s = document.getElementById('chat-scroller');
            const d = document.createElement('div');
            const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let content = m.texto || m.text || "";

            if(m.isBuzz) content = `<span style="color:red; font-weight:bold;">TE HA ENVIADO UN ZUMBIDO</span>`;
            else {
                content = content.replace(/(https?:\/\/[^\s]+)/g, u => `<a href="${u}" target="_blank" style="color:var(--msn-blue);">${u}</a>`);
                content = content.replace(/:\)/g, '😊').replace(/\(L\)/g, '❤️').replace(/:P/g, '😛');
            }

            d.innerHTML = `<div style="font-size:12px; font-weight:bold; color:var(--msn-blue);">${m.user} dice: <span style="font-weight:normal; color:#aaa; font-size:10px;">[${t}]</span></div><div style="font-size:14px; color:#333; margin-top:3px;">${content}</div>`;
            s.appendChild(d);
            s.scrollTop = s.scrollHeight;
        }

        // Perfil
        function showModalProfile() { document.getElementById('modal-profile').style.display = 'flex'; }
        function hideModalProfile() { document.getElementById('modal-profile').style.display = 'none'; }
        
        function commitProfile() {
            const f = document.getElementById('edit-file').files[0];
            const d = document.getElementById('edit-desc').value;
            if(f) {
                const r = new FileReader();
                r.onload = () => { socket.emit('update_profile', { desc: d, foto: r.result }); hideModalProfile(); };
                r.readAsDataURL(f);
            } else { socket.emit('update_profile', { desc: d, foto: null }); hideModalProfile(); }
        }

        function addEmoji(e) { const t = document.getElementById('chat-textarea'); t.value += e; t.focus(); }

        document.getElementById('chat-textarea').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
    </script>
</body>
</html>
