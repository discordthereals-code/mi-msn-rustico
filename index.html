<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSN Messenger 2009</title>
    <style>
        :root { --blue: #0055e5; --bg: linear-gradient(180deg, #71ADFF 0%, #E2EFFF 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* LOGIN - Estilo Centrado */
        #login-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #login-box button { width: 100%; padding: 10px; background: var(--blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* CONTENEDOR PRINCIPAL - Tamaño bloqueado para que no se agrande */
        #app { display: none; width: 950px; height: 650px; background: white; border-radius: 8px; border: 1px solid #666; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        /* CABECERA */
        header { background: linear-gradient(#f9fcff, #dcecfc); padding: 10px 15px; border-bottom: 1px solid #b4c7de; display: flex; justify-content: space-between; align-items: center; height: 65px; }
        .user-me { display: flex; align-items: center; gap: 10px; }
        #my-img { width: 42px; height: 42px; border: 2px solid white; border-radius: 4px; object-fit: cover; background: #eee; }

        /* CUERPO */
        main { display: flex; flex: 1; overflow: hidden; }

        /* COLUMNA IZQUIERDA */
        #side-left { width: 240px; border-right: 1px solid #d0deee; display: flex; flex-direction: column; background: #fff; }
        .label { background: #eff6ff; padding: 5px 12px; font-size: 11px; font-weight: bold; color: #5a708a; border-bottom: 1px solid #d0deee; }
        .item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        .item:hover { background: #f0f7ff; }
        .img-min { width: 30px; height: 30px; border-radius: 3px; object-fit: cover; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .on { background: #31a24c; }
        .off { background: #bdc1c6; }

        /* CHAT CENTRAL */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #input-box { padding: 12px; background: #f7faff; border-top: 1px solid #d0deee; }
        #text-in { width: 100%; height: 55px; padding: 8px; border: 1px solid #a0b5d0; border-radius: 4px; resize: none; font-size: 13px; }

        /* COLUMNA DERECHA */
        #side-right { width: 180px; background: #fdfdfd; border-left: 1px solid #d0deee; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; gap: 25px; }
        .img-big { width: 120px; height: 120px; border: 4px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 6px; object-fit: cover; }

        .btn-blue { background: var(--blue); color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-small { background: white; border: 1px solid #ccc; padding: 3px 7px; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .hidden { display: none; }
        .shake { animation: shakeAnim 0.1s 10; }
        @keyframes shakeAnim { 0%, 100% {transform:translate(0,0)} 25% {transform:translate(4px,4px)} 50% {transform:translate(-4px,-4px)} }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--blue); margin-bottom:15px;">THE REALS MSN</h2>
        <input id="user-in" placeholder="Tu nombre">
        <input id="pass-in" type="password" placeholder="Contraseña">
        <button onclick="doLogin()">Iniciar Sesión</button>
    </div>

    <div id="app">
        <header>
            <div class="user-me">
                <img id="my-img" src="">
                <div><b id="my-name" style="font-size:13px; color:var(--blue);">...</b><br><small id="my-status" style="font-size:11px; color:gray;">Disponible</small></div>
            </div>
            <button class="btn-small" onclick="document.getElementById('modal').classList.remove('hidden')">Perfil</button>
        </header>

        <main>
            <div id="side-left">
                <div class="label">SALAS GRUPALES</div>
                <button class="item" onclick="setChat('conversando', 'Conversando', '/logo-conversando.png')">
                    <img src="/logo-conversando.png" class="img-min" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <b>Conversando</b>
                </button>
                <button class="item" onclick="setChat('juegos', 'Juegos', '/logo-juegos.png')">
                    <img src="/logo-juegos.png" class="img-min" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686431.png'">
                    <b>Juegos</b>
                </button>
                <button class="item" onclick="setChat('solotodo', 'SoloTodo', '/logo-solotodo.png')">
                    <img src="/logo-solotodo.png" class="img-min" style="object-fit:contain" onerror="this.src='https://www.solotodo.cl/static/logo.png'">
                    <b>SoloTodo</b>
                </button>
                
                <div class="label">CONTACTOS</div>
                <div id="contacts" style="overflow-y:auto; flex:1;"></div>
            </div>

            <div id="chat-area">
                <div id="messages"></div>
                <div id="input-box">
                    <textarea id="text-in" placeholder="Escribe un mensaje..."></textarea>
                    <div style="display:flex; justify-content: space-between; margin-top:8px;">
                        <div style="display:flex; gap:5px;">
                            <button class="btn-small" onclick="sendBuzz()">🔔 Zumbido</button>
                            <button class="btn-small" onclick="document.getElementById('file-in').click()">🖼️ Foto</button>
                            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="sendFile(this)">
                        </div>
                        <button class="btn-blue" onclick="sendMsg()">Enviar</button>
                    </div>
                </div>
            </div>

            <div id="side-right">
                <div style="text-align:center;"><img id="target-img" class="img-big" src=""><div id="target-name" style="font-size:12px; font-weight:bold; color:var(--blue); margin-top:5px;">...</div></div>
                <div style="text-align:center;"><img id="side-my-img" class="img-big" src=""><div style="font-size:11px; color:#666; margin-top:5px;">(Tú)</div></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; padding:25px; border-radius:10px; width:280px; border:2px solid var(--blue);">
            <h4 style="margin-bottom:10px;">Editar Perfil</h4>
            <input id="new-status" placeholder="¿Qué piensas?" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc;">
            <input type="file" id="new-photo" style="margin-bottom:15px; font-size:11px;">
            <button class="btn-blue" style="width:100%;" onclick="updateProfile()">Guardar</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = localStorage.getItem('msn_user') || "";
        let currentRoom = 'conversando';
        const buzzAudio = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');

        // --- FUNCIÓN ENTER ---
        document.getElementById('text-in').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });

        // Desbloqueo de audio
        document.addEventListener('click', () => { buzzAudio.play().then(()=>buzzAudio.pause()); }, {once: true});

        if(me) socket.emit('login', { user: me, pass: localStorage.getItem('msn_pass') });

        function doLogin() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            if(u && p) {
                localStorage.setItem('msn_user', u);
                localStorage.setItem('msn_pass', p);
                socket.emit('login', { user: u, pass: p });
            }
        }

        socket.on('login_status', res => {
            if(res.success) {
                me = res.user;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                syncMyUI(res.perfil);
                setChat('conversando', 'Conversando', '/logo-conversando.png');
            }
        });

        function syncMyUI(p) {
            const f = p.foto || "https://via.placeholder.com/120";
            document.getElementById('my-img').src = f;
            document.getElementById('side-my-img').src = f;
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-status').innerText = p.descripcion || "Disponible";
        }

        socket.on('lista_contactos', list => {
            const div = document.getElementById('contacts');
            div.innerHTML = "";
            list.forEach(u => {
                if(u.user === me) return;
                const b = document.createElement('button');
                b.className = "item";
                const s = u.online ? 'on' : 'off';
                b.innerHTML = `<img src="${u.foto || 'https://via.placeholder.com/30'}" class="img-min"> <div><span class="dot ${s}"></span>${u.user}</div>`;
                b.onclick = () => setChat(u.user, u.user, u.foto);
                div.appendChild(b);
            });
        });

        function setChat(id, name, img) {
            currentRoom = id;
            document.getElementById('target-name').innerText = name;
            let f = img || "https://via.placeholder.com/120?text=" + name;
            if(id === 'conversando') f = '/logo-conversando.png';
            if(id === 'juegos') f = '/logo-juegos.png';
            if(id === 'solotodo') f = '/logo-solotodo.png';
            document.getElementById('target-img').src = f;
            document.getElementById('messages').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        function sendMsg() {
            const val = document.getElementById('text-in').value;
            if(val.trim()) socket.emit('chat message', { to: currentRoom, text: val });
            document.getElementById('text-in').value = "";
        }

        function sendBuzz() { socket.emit('chat message', { to: currentRoom, isBuzz: true }); }

        function sendFile(el) {
            const f = el.files[0];
            const r = new FileReader();
            r.onload = () => socket.emit('chat message', { to: currentRoom, tipo: 'img', archivo: r.result });
            r.readAsDataURL(f);
        }

        socket.on('chat message', m => {
            const target = m.to || 'conversando';
            if(target === currentRoom || (m.user === currentRoom && m.to === me) || (m.user === me && target === currentRoom)) {
                draw(m);
            }
            if(m.isBuzz && (target === currentRoom || m.to === me)) {
                document.getElementById('app').classList.add('shake');
                setTimeout(()=>document.getElementById('app').classList.remove('shake'), 600);
                buzzAudio.currentTime = 0; buzzAudio.play().catch(()=>{});
            }
        });

        socket.on('actualizar_historial', res => {
            if(res.target === currentRoom) {
                document.getElementById('messages').innerHTML = "";
                res.history.forEach(m => draw(m));
            }
        });

        function draw(m) {
            const div = document.getElementById('messages');
            const d = document.createElement('div');
            let t = m.texto || m.text || "";
            if(m.tipo === 'img') t = `<img src="${m.archivo}" style="max-width:200px; border-radius:5px; display:block; margin-top:5px;">`;
            if(m.isBuzz) t = `<span style="color:red; font-weight:bold;">¡Zumbido!</span>`;

            d.innerHTML = `<b style="color:var(--blue); font-size:12px;">${m.user}:</b><br><span style="font-size:13px;">${t}</span>`;
            div.appendChild(d);
            div.scrollTop = div.scrollHeight;
        }

        function updateProfile() {
            const f = document.getElementById('new-photo').files[0];
            const s = document.getElementById('new-status').value;
            if(f) {
                const r = new FileReader();
                r.onload = () => socket.emit('update_profile', { desc: s, foto: r.result });
                r.readAsDataURL(f);
            } else { socket.emit('update_profile', { desc: s, foto: null }); }
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
