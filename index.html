<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE REALS</title>
    <style>
        body { background: #0d0d0d; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; color: #eee; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { align-self: center; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #ffff00; text-align: center; width: 300px; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        
        /* CHAT */
        #chat-window { display: none; width: 100%; max-width: 800px; height: 100vh; background: #141414; flex-direction: column; border-left: 1px solid #333; border-right: 1px solid #333; }
        #title-bar { background: #222; color: #ffff00; padding: 15px; border-bottom: 2px solid #ffff00; font-weight: bold; display: flex; justify-content: space-between; }
        #messages-container { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        /* BURBUJAS */
        .msg-item { margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #1f1f1f; border-left: 4px solid #ffff00; }
        .msg-user { color: #ffff00; font-weight: bold; margin-right: 8px; }
        
        /* IMÁGENES (Miniaturas) */
        .chat-img-thumb { max-width: 250px; max-height: 250px; border-radius: 8px; margin-top: 10px; cursor: pointer; border: 2px solid #333; transition: 0.2s; }
        .chat-img-thumb:hover { border-color: #ffff00; transform: scale(1.02); }

        /* VISOR MODAL */
        #image-viewer { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: pointer; }
        #full-image { max-width: 90%; max-height: 90%; border: 2px solid #ffff00; border-radius: 5px; }

        /* AUDIO Y CONTROLES */
        audio { height: 35px; margin-top: 10px; filter: invert(1); width: 100%; max-width: 280px; }
        #input-area { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        .controls { display: flex; gap: 10px; align-items: center; }
        #msg-input { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 25px; outline: none; }
        
        /* BOTONES REDONDOS */
        .btn-round { background: #333; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-send { background: #ffff00; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 10px; height: 45px; }

        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(8px,8px); } 50% { transform: translate(-8px,-8px); } }
        .shake-effect { animation: shake 0.1s 6; }
    </style>
</head>
<body>

<div id="image-viewer" onclick="this.style.display='none'">
    <img id="full-image" src="">
</div>

<div id="login-screen">
    <h1 style="color:#ffff00">THE REALS</h1>
    <input type="text" id="user" class="login-input" placeholder="Usuario">
    <input type="password" id="pass" class="login-input" placeholder="Clave">
    <button onclick="login()" style="background:#ffff00; width:100%; padding:15px; border:none; font-weight:bold; cursor:pointer; border-radius:8px;">ENTRAR</button>
</div>

<div id="chat-window">
    <div id="title-bar">
        <span id="tema-title">CARGANDO...</span>
        <span style="font-size: 11px; color: #777; cursor: pointer" onclick="location.reload()">Salir</span>
    </div>
    <div id="messages-container"><div id="messages"></div></div>
    <div id="input-area">
        <div class="controls">
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendFile(this)">
            <button class="btn-round" onclick="document.getElementById('file-input').click()" title="Enviar Imagen">📎</button>
            
            <input id="msg-input" placeholder="Escribe..." onkeypress="if(event.key==='Enter')sendText()">
            
            <button class="btn-round" id="mic-btn" onclick="handleMic()">🎤</button>
            <button class="btn-round" onclick="sendBuzz()" style="background:#ff4444; font-weight:bold;">Z!</button>
            <button class="btn-send" onclick="sendText()">ENVIAR</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let miUser = "", recorder, chunks = [];

    function login() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(u && p) socket.emit('login', { user: u, pass: p });
    }

    socket.on('login_status', (res) => {
        if(res.success) {
            miUser = res.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('tema-title').innerText = res.tema;
            if(res.history) res.history.forEach(m => render(m));
        } else alert(res.msg);
    });

    socket.on('actualizar_tema', (t) => {
        document.getElementById('tema-title').innerText = t;
    });

    function sendText() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim()) {
            socket.emit('chat message', { user: miUser, text: inp.value, time: new Date().toLocaleTimeString() });
            inp.value = '';
        }
    }

    function sendBuzz() {
        socket.emit('chat message', { user: miUser, text: "¡ZUMBIDO!", isBuzz: true, time: new Date().toLocaleTimeString() });
    }

    function sendFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => socket.emit('chat message', { user: miUser, img: e.target.result, time: new Date().toLocaleTimeString() });
            reader.readAsDataURL(file);
            input.value = ""; 
        }
    }

    // --- AUDIO MEJORADO (FILTROS) ---
    async function handleMic() {
        const btn = document.getElementById('mic-btn');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => socket.emit('chat message', { user: miUser, audio: reader.result, time: new Date().toLocaleTimeString() });
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            btn.style.background = "#ff4444";
        } else {
            recorder.stop();
            btn.style.background = "#333";
        }
    }

    // --- EL ZUMBIDO ELECTRÓNICO QUE TE GUSTÓ ---
    function playBuzzSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        } catch(e) { console.log("Interacción requerida para sonido"); }
    }

    socket.on('chat message', (m) => {
        render(m);
        if(m.isBuzz) {
            playBuzzSound();
            const win = document.getElementById('chat-window');
            win.classList.add('shake-effect');
            setTimeout(() => win.classList.remove('shake-effect'), 600);
        }
    });

    function render(m) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = "msg-item";
        
        let header = `<span class="msg-user">${m.user}:</span> `;
        let body = "";
        
        if(m.audio) body = `<br><audio controls src="${m.audio}"></audio>`;
        else if(m.img) body = `<br><img src="${m.img}" class="chat-img-thumb" onclick="openBig('${m.img}')">`;
        else body = m.text;

        div.innerHTML = header + body;
        messages.appendChild(div);
        document.getElementById('messages-container').scrollTop = 999999;
    }

    function openBig(src) {
        document.getElementById('full-image').src = src;
        document.getElementById('image-viewer').style.display = 'flex';
    }
</script>
</body>
</html>
