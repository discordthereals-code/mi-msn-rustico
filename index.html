<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MSN Messenger - Versión Estable</title>
    <style>
        :root { --msn-blue: #0055e5; --bg: #71ADFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* LOGIN */
        #login-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #login-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #login-box button { width: 100%; padding: 10px; background: var(--msn-blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* VENTANA PRINCIPAL - Tamaño controlado */
        #app { display: none; width: 950px; height: 650px; background: white; border-radius: 8px; border: 1px solid #555; flex-direction: column; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.4); }

        header { background: linear-gradient(#f9fcff, #dcecfc); padding: 10px 15px; border-bottom: 1px solid #b4c7de; display: flex; justify-content: space-between; align-items: center; }
        .user-me { display: flex; align-items: center; gap: 10px; }
        #my-img { width: 40px; height: 40px; border: 2px solid white; border-radius: 4px; object-fit: cover; }

        main { display: flex; flex: 1; overflow: hidden; }

        /* IZQUIERDA */
        #side-left { width: 240px; border-right: 1px solid #d0deee; display: flex; flex-direction: column; }
        .label { background: #eff6ff; padding: 5px 12px; font-size: 11px; font-weight: bold; color: #5a708a; border-bottom: 1px solid #d0deee; }
        .item { display: flex; align-items: center; gap: 8px; padding: 10px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 13px; }
        .item:hover { background: #f0f7ff; }
        .img-min { width: 32px; height: 32px; border-radius: 3px; object-fit: cover; }
        .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.1); }
        .on { background: #31a24c; } .off { background: #bdc1c6; }

        /* CHAT */
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #input-box { padding: 12px; background: #f7faff; border-top: 1px solid #d0deee; }
        #text-in { width: 100%; height: 55px; padding: 8px; border: 1px solid #a0b5d0; border-radius: 4px; resize: none; font-size: 13px; }

        /* DERECHA */
        #side-right { width: 180px; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; gap: 30px; }
        .img-big { width: 120px; height: 120px; border: 5px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; object-fit: cover; }

        .hidden { display: none; }
        .shake { animation: shakeAnim 0.1s 10; }
        @keyframes shakeAnim { 0%, 100% {transform:translate(0,0)} 25% {transform:translate(4px,4px)} 50% {transform:translate(-4px,-4px)} }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--msn-blue); margin-bottom:15px;">THE REALS MSN</h2>
        <input id="u-in" placeholder="Usuario">
        <input id="p-in" type="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="app">
        <header>
            <div class="user-me">
                <img id="my-img" src="">
                <div><b id="my-name" style="color:var(--msn-blue);">...</b><br><small id="my-status">Disponible</small></div>
            </div>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" style="font-size:11px; padding:4px 8px; cursor:pointer;">Perfil</button>
        </header>

        <main>
            <div id="side-left">
                <div class="label">SALAS</div>
                <button class="item" onclick="setChat('conversando', 'Conversando', '/logo-conversando.png')">
                    <img src="/logo-conversando.png" class="img-min" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686589.png'">
                    <b>Conversando</b>
                </button>
                <button class="item" onclick="setChat('juegos', 'Juegos', '/logo-juegos.png')">
                    <img src="/logo-juegos.png" class="img-min" onerror="this.src='https://cdn-icons-png.flaticon.com/512/686/686431.png'">
                    <b>Juegos</b>
                </button>
                <button class="item" onclick="setChat('solotodo', 'SoloTodo', '/logo-solotodo.png')">
                    <img src="/logo-solotodo.png" class="img-min" style="object-fit:contain" onerror="this.src='https://www.solotodo.cl/static/logo.png'">
                    <b>SoloTodo</b>
                </button>
                <div class="label">CONTACTOS</div>
                <div id="contacts"></div>
            </div>

            <div id="chat-area">
                <div id="messages"></div>
                <div id="input-box">
                    <textarea id="text-in" placeholder="Escribe aquí..."></textarea>
                    <div style="display:flex; justify-content: space-between; margin-top:5px;">
                        <button onclick="sendBuzz()" style="font-size:11px; cursor:pointer;">🔔 Zumbido</button>
                        <button onclick="sendMsg()" style="background:var(--msn-blue); color:white; border:none; padding:5px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">Enviar</button>
                    </div>
                </div>
            </div>

            <div id="side-right">
                <div style="text-align:center;"><img id="target-img" class="img-big" src=""><div id="target-name" style="font-size:12px; font-weight:bold; color:var(--msn-blue); margin-top:5px;">...</div></div>
                <div style="text-align:center;"><img id="side-my-img" class="img-big" src=""><div style="font-size:11px; color:#666; margin-top:5px;">(Tú)</div></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100;">
        <div style="background:white; padding:20px; border-radius:8px; width:280px; text-align:center;">
            <h4>Mi Perfil</h4><br>
            <input id="new-st" placeholder="¿Qué piensas?" style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="file" id="new-ph" style="margin-bottom:10px; font-size:11px;"><br>
            <button onclick="saveProf()" style="width:100%; padding:8px; background:var(--msn-blue); color:white; border:none; border-radius:4px;">Guardar</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" style="margin-top:10px; border:none; background:none; color:gray; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let me = localStorage.getItem('msn_user') || "";
        let currentRoom = 'conversando';
        const buzzAudio = new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3');

        // FUNCIÓN ENTER - El motor del chat
        document.getElementById('text-in').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });

        if(me) socket.emit('login', { user: me, pass: localStorage.getItem('msn_pass') });

        function login() {
            const u = document.getElementById('u-in').value, p = document.getElementById('p-in').value;
            if(u && p) {
                localStorage.setItem('msn_user', u); localStorage.setItem('msn_pass', p);
                socket.emit('login', { user: u, pass: p });
            }
        }

        socket.on('login_status', res => {
            if(res.success) {
                me = res.user;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                syncUI(res.perfil);
                setChat('conversando', 'Conversando', '/logo-conversando.png');
            }
        });

        function syncUI(p) {
            const f = p.foto || "https://via.placeholder.com/120";
            document.getElementById('my-img').src = f;
            document.getElementById('side-my-img').src = f;
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-status').innerText = p.descripcion || "Disponible";
        }

        socket.on('lista_contactos', list => {
            const div = document.getElementById('contacts');
            div.innerHTML = "";
            list.forEach(u => {
                if(u.user === me) return;
                const b = document.createElement('button');
                b.className = "item";
                const s = u.online ? 'on' : 'off';
                b.innerHTML = `<img src="${u.foto || 'https://via.placeholder.com/32'}" class="img-min"> <div><span class="dot ${s}"></span>${u.user}</div>`;
                b.onclick = () => setChat(u.user, u.user, u.foto);
                div.appendChild(b);
            });
        });

        function setChat(id, name, img) {
            currentRoom = id;
            document.getElementById('target-name').innerText = name;
            let f = img || "https://via.placeholder.com/120?text=" + name;
            if(id === 'conversando') f = '/logo-conversando.png';
            if(id === 'juegos') f = '/logo-juegos.png';
            if(id === 'solotodo') f = '/logo-solotodo.png';
            document.getElementById('target-img').src = f;
            document.getElementById('messages').innerHTML = "";
            socket.emit('get_private_history', id);
        }

        function sendMsg() {
            const v = document.getElementById('text-in').value;
            if(v.trim()) socket.emit('chat message', { to: currentRoom, text: v });
            document.getElementById('text-in').value = "";
        }

        function sendBuzz() { socket.emit('chat message', { to: currentRoom, isBuzz: true }); }

        socket.on('chat message', m => {
            const t = m.to || 'conversando';
            if(t === currentRoom || (m.user === currentRoom && m.to === me) || (m.user === me && t === currentRoom)) {
                const div = document.getElementById('messages');
                const d = document.createElement('div');
                let txt = m.text || "";
                if(m.isBuzz) txt = `<span style="color:red; font-weight:bold;">¡Zumbido!</span>`;
                d.innerHTML = `<b style="color:var(--msn-blue); font-size:12px;">${m.user}:</b><br><span style="font-size:13px;">${txt}</span>`;
                div.appendChild(d);
                div.scrollTop = div.scrollHeight;
            }
            if(m.isBuzz && (t === currentRoom || m.to === me)) {
                document.getElementById('app').classList.add('shake');
                setTimeout(()=>document.getElementById('app').classList.remove('shake'), 600);
                buzzAudio.play().catch(()=>{});
            }
        });

        socket.on('actualizar_historial', res => {
            if(res.target === currentRoom) {
                document.getElementById('messages').innerHTML = "";
                res.history.forEach(m => {
                    const div = document.getElementById('messages');
                    const d = document.createElement('div');
                    let txt = m.texto || m.text || "";
                    if(m.isBuzz) txt = `<span style="color:red; font-weight:bold;">¡Zumbido!</span>`;
                    d.innerHTML = `<b style="color:var(--msn-blue); font-size:12px;">${m.user}:</b><br><span style="font-size:13px;">${txt}</span>`;
                    div.appendChild(d);
                });
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });

        function saveProf() {
            const f = document.getElementById('new-ph').files[0];
            const s = document.getElementById('new-st').value;
            if(f) {
                const r = new FileReader();
                r.onload = () => socket.emit('update_profile', { desc: s, foto: r.result });
                r.readAsDataURL(f);
            } else { socket.emit('update_profile', { desc: s, foto: null }); }
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
