<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>THE REALS - FIX VERSION</title>
    <style>
        /* ESTILO FORZADO PARA NAVEGADOR */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        body { 
            background-color: #2b5797 !important; /* AZUL OSCURO PARA SABER QUE CAMBIÓ */
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        #app-container { 
            display: none; width: 850px; height: 600px; 
            background: white; border-radius: 10px; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }

        /* CABECERA */
        #window-header {
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            background: #e8f1fc; border-bottom: 1px solid #a0b5d0;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        #my-avatar { width: 50px; height: 50px; border: 2px solid #3a8df5; border-radius: 4px; object-fit: cover; cursor: pointer; }

        /* CUERPO */
        #main-body { flex-grow: 1; display: flex; padding: 10px; gap: 10px; height: 480px; }
        
        /* LATERAL */
        #sidebar { width: 250px; display: flex; flex-direction: column; border-right: 1px solid #ddd; padding-right: 10px; }
        .section-title { font-weight: bold; font-size: 11px; color: #4c607a; margin: 10px 0 5px; }
        .contact-item { width: 100%; border: none; background: #f9f9f9; padding: 8px; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 2px; border-radius: 4px; }
        .contact-item:hover { background: #eef6ff; }
        .contact-item img { width: 30px; height: 30px; border-radius: 3px; }

        /* CHAT */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; border: 1px solid #a0b5d0; border-radius: 5px; }
        #messages-view { flex-grow: 1; overflow-y: auto; padding: 15px; background: #fff; }
        #input-area { padding: 10px; background: #f5f9ff; border-top: 1px solid #a0b5d0; }
        #msg-input { width: 100%; height: 50px; padding: 8px; border: 1px solid #ccc; resize: none; margin-bottom: 5px; }

        /* LOGIN */
        #login-screen { background: white; padding: 40px; border-radius: 10px; text-align: center; }
        #login-screen input { display: block; width: 240px; margin: 10px auto; padding: 10px; border: 1px solid #ccc; }
        .btn-blue { background: #3a8df5; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* MODAL */
        #modal-perfil { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: white; border: 2px solid #3a8df5; padding: 20px; z-index: 2000; border-radius: 10px; width: 300px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:#2b5797">THE REALS</h2>
        <input type="text" id="u-in" placeholder="Usuario">
        <input type="password" id="p-in" placeholder="Clave">
        <button class="btn-blue" onclick="doLogin()">Entrar</button>
    </div>

    <div id="app-container">
        <div id="window-header">
            <div class="user-info">
                <img id="my-avatar" src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" onclick="openProfile()">
                <div><b id="display-name">...</b><br><small id="display-status">¿En qué piensas?</small></div>
            </div>
            <b>_ ⬜ ✕</b>
        </div>
        <div id="main-body">
            <div id="sidebar">
                <div class="section-title">MIS SALAS</div>
                <button class="contact-item" onclick="location.reload()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/MSN_Messenger_logo.png">
                    <b>Chat Grupal (Todos)</b>
                </button>
                <div class="section-title">CONTACTOS ONLINE</div>
                <div id="contactos-lista"></div>
            </div>
            <div id="chat-window">
                <div id="messages-view"><div id="messages"></div></div>
                <div id="input-area">
                    <textarea id="msg-input" placeholder="Escribe aquí..."></textarea>
                    <div style="display:flex; justify-content: space-between;">
                        <button onclick="sendBuzz()" style="padding:4px">🔔 Zumbido</button>
                        <button class="btn-blue" onclick="sendMsg()">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-perfil">
        <b>Editar Perfil</b><br><br>
        Frase:<br><input type="text" id="new-desc" style="width:100%"><br>
        Foto:<br><input type="file" id="file-foto"><br><br>
        <button class="btn-blue" onclick="saveProfile()">Guardar</button>
        <button onclick="document.getElementById('modal-perfil').style.display='none'">Cerrar</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "", currentChat = null, tempFoto = "";

        function doLogin() {
            const u = document.getElementById('u-in').value.trim();
            const p = document.getElementById('p-in').value.trim();
            if(u && p) socket.emit('login', { user: u, pass: p });
        }

        socket.on('login_status', res => {
            if(res.success) {
                myUser = res.user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('display-name').innerText = myUser;
                document.getElementById('my-avatar').src = res.perfil.foto;
                document.getElementById('display-status').innerText = res.perfil.descripcion;
                res.history.forEach(m => render(m));
            } else alert(res.msg);
        });

        socket.on('lista_contactos', lista => {
            const c = document.getElementById('contactos-lista');
            c.innerHTML = "";
            lista.forEach(u => {
                if(u.user === myUser) return;
                const b = document.createElement('button');
                b.className = "contact-item";
                b.innerHTML = `<img src="${u.foto}"> <div><b>${u.user}</b><br><small>${u.descripcion}</small></div>`;
                b.onclick = () => { 
                    currentChat = u.user; 
                    document.getElementById('messages').innerHTML = ""; 
                    socket.emit('get_private_history', u.user); 
                };
                c.appendChild(b);
            });
        });

        function sendMsg() {
            const t = document.getElementById('msg-input').value;
            if(!t.trim()) return;
            socket.emit('chat message', { to: currentChat, text: t });
            document.getElementById('msg-input').value = "";
        }

        function sendBuzz() { socket.emit('chat message', { to: currentChat, isBuzz: true }); }

        socket.on('chat message', m => {
            render(m);
            if(m.isBuzz) new Audio('https://www.myinstants.com/media/sounds/msn-messenger-buzz.mp3').play().catch(()=>{});
        });

        socket.on('actualizar_historial', h => h.forEach(m => render(m)));

        function render(m) {
            const d = document.createElement('div');
            const u = m.user || m.usuario;
            const t = m.text || m.texto;
            d.innerHTML = `<b style="color:#2b5797">${u}:</b> ${m.isBuzz ? '<span style="color:red">¡ZUMBIDO!</span>' : t}`;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages-view').scrollTop = 999999;
        }

        function openProfile() { document.getElementById('modal-perfil').style.display='block'; }
        document.getElementById('file-foto').onchange = e => {
            const r = new FileReader();
            r.onload = () => { tempFoto = r.result; };
            r.readAsDataURL(e.target.files[0]);
        };
        function saveProfile() {
            const d = document.getElementById('new-desc').value;
            socket.emit('update_profile', { desc: d, foto: tempFoto });
            document.getElementById('modal-perfil').style.display='none';
            if(tempFoto) document.getElementById('my-avatar').src = tempFoto;
            document.getElementById('display-status').innerText = d;
        }
    </script>
</body>
</html>
