<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Windows Live Messenger</title>
    <style>
        :root {
            --aero-bg: rgba(255, 255, 255, 0.4);
            --msn-blue: #0078d7;
            --border-color: rgba(255, 255, 255, 0.6);
        }
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #a7d1f1 0%, #dbe9f6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* Vistas (Login / Main) */
        .view { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }
        .view.active { display: flex; }

        /* Estilo Aero para ventanas */
        .msn-window {
            background: var(--aero-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* --- LOGIN VIEW --- */
        #login-box { width: 300px; padding: 20px; text-align: center; }
        #login-box img { width: 80px; margin-bottom: 15px; }
        #login-box input { display: block; width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; }
        #login-box button { width: 100%; padding: 10px; background: var(--msn-blue); color: white; border: none; border-radius: 4px; cursor: pointer; }
        #login-status-msg { color: red; font-size: 12px; margin-top: 5px; }

        /* --- MAIN VIEW --- */
        #main-window { width: 95%; max-width: 900px; height: 90vh; display: flex; flex-direction: column; }
        #header { padding: 8px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.1); display: flex; justify-content: space-between; font-size: 12px;}
        
        #content-area { flex: 1; display: flex; overflow: hidden; background: white; margin: 5px; border-radius: 4px; }

        /* Panel Izquierdo (Contactos) */
        #contacts-panel { width: 220px; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        #my-profile { padding: 10px; border-bottom: 1px solid #eee; display: flex; gap: 8px; align-items: center;}
        
        /* Contenedor de foto de perfil (Base64) */
        .avatar-container { position: relative; width: 40px; height: 40px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 4px; border: 1px solid #aaa; object-fit: cover; background: #eee;}
        .status-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; bottom: -2px; right: -2px; border: 1px solid white; }
        .status-dot.online { background: #5cb85c; }
        .status-dot.offline { background: #888; }
        
        #my-info { flex: 1; }
        #my-name { font-weight: bold; font-size: 14px; }
        #my-desc { font-size: 11px; color: #555; }
        
        #rooms-list, #contacts-list { flex: 1; overflow-y: auto; padding: 5px; }
        .list-header { font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; padding: 5px; margin-top: 5px; }
        .contact-item { padding: 5px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; gap: 8px; font-size: 13px;}
        .contact-item:hover, .contact-item.active { background-color: #e1f0fb; }
        .contact-item small { color: #888; font-size: 11px; }

        /* Panel Central (Chat) */
        #chat-panel { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; color: var(--msn-blue); font-size: 14px;}
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; }

        /* Mensajes styling */
        .msg-line { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-time { color: #888; font-size: 10px; margin-right: 6px; }
        .msg-user { font-weight: bold; color: #0056b3; margin-right: 5px; }
        .msg-self .msg-user { color: #444; }
        
        /* Contenido especial */
        .emoji { width: 20px; vertical-align: middle; }
        .yt-embed { width: 100%; max-width: 320px; aspect-ratio: 16/9; margin-top: 5px; border-radius: 4px; display: block;}
        .buzz-text { color: red; font-weight: bold; text-align: center; font-size: 12px; margin: 10px 0;}

        /* Área de input */
        #typing-status { font-size: 11px; color: #777; padding-left: 10px; height: 15px;}
        #input-area { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 5px; }
        #messageInput { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;}
        #input-area button { padding: 8px 15px; cursor: pointer; }

        /* Notificación Toast */
        #toast-notification { position: fixed; bottom: 10px; right: 10px; width: 220px; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: slideUpToast 0.4s; z-index: 1000;}
        #toast-notification.active { display: block; }
        @keyframes slideUpToast { from { transform: translateY(100px); } to { transform: translateY(0); } }

        /* Modal de Perfil */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 300px; }
        .modal-content input, .modal-content textarea { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid #ccc;}

        /* Animación Zumbido */
        .nudge-shake { animation: shakeAnimate 0.1s infinite; }
        @keyframes shakeAnimate { 0% { left: 3px; } 50% { left: -3px; } 100% { left: 0px; } }
        #main-window { position: relative; }

    </style>
</head>
<body>

    <div id="login-view" class="view active">
        <div class="msn-window" id="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Msn_logo_messanger.png" alt="MSN Logo">
            <h3>Iniciar Sesión</h3>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="attemptLogin()">Conectar</button>
            <div id="login-status-msg"></div>
        </div>
    </div>

    <div id="main-view" class="view">
        <div class="msn-window" id="main-window">
            <div id="header">Windows Live Messenger<span style="cursor:pointer">✕</span></div>
            
            <div id="content-area">
                <div id="contacts-panel">
                    <div id="my-profile">
                        <div class="avatar-container" onclick="openProfileModal()" style="cursor:pointer">
                            <img id="my-avatar-img" class="avatar-img" src="">
                            <div class="status-dot online"></div>
                        </div>
                        <div id="my-info">
                            <div id="my-name">Nombre</div>
                            <div id="my-desc">"Estado aquí..."</div>
                        </div>
                    </div>
                    
                    <div id="rooms-list">
                        <div class="list-header">Salas</div>
                        <div class="contact-item" id="room-conversando" onclick="switchChat('conversando', true)">💬 Conversando</div>
                        <div class="contact-item" id="room-juegos" onclick="switchChat('juegos', true)">🎮 Juegos</div>
                        <div class="contact-item" id="room-solotodo" onclick="switchChat('solotodo', true)">🛒 Solotodo</div>
                    </div>

                    <div id="contacts-list">
                        <div class="list-header">Contactos Online</div>
                        <div id="online-list-container"></div>
                    </div>
                </div>

                <div id="chat-panel">
                    <div id="chat-header">Sala Principal</div>
                    <div id="chat-messages"></div>
                    <div id="typing-status"></div>
                    <div id="input-area">
                        <input type="text" id="messageInput" placeholder="Escribe un mensaje..." onkeypress="handleTyping()">
                        <button onclick="sendNudge()">📢 Zumbido</button>
                        <button onclick="sendMessage()">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="profile-modal">
        <div class="modal-content">
            <h4>Editar Perfil</h4>
            <textarea id="edit-desc" placeholder="Tu estado..." rows="2"></textarea>
            <label style="font-size:12px; margin-bottom:5px; display:block">Cambiar Foto (Base64):</label>
            <input type="file" id="edit-photo" accept="image/*" onchange="previewPhoto(this)">
            <img id="edit-photo-preview" style="width:50px; height:50px; border-radius:4px; display:none; margin-bottom:10px;">
            <div style="display:flex; gap:5px; justify-content:flex-end">
                <button onclick="closeModal()">Cancelar</button>
                <button onclick="saveProfile()" style="background:var(--msn-blue); color:white;">Guardar</button>
            </div>
        </div>
    </div>

    <div id="toast-notification">
        <div style="display:flex; gap:8px; align-items:center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Msn_logo_messanger.png" style="width:20px; height:20px;">
            <div>
                <b style="font-size:12px;" id="toast-user-name">Usuario</b>
                <div style="font-size:11px;">Ha enviado un mensaje.</div>
            </div>
        </div>
    </div>

    <audio id="sound-nudge" src="https://www.myinstants.com/media/sounds/msn-nudge.mp3"></audio>
    <audio id="sound-msg" src="https://www.myinstants.com/media/sounds/msn-sound.mp3"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUserId = '';
        let currentChatTarget = 'conversando';
        let isGroupChat = true;
        let photoBase64 = null;
        let typingTimeout;

        // Mapa de Emoticonos (links a imágenes reales)
        const emojiMap = {
            ":)": "smiley.png", ":(": "sad.png", ":P": "tongue.png", 
            "(H)": "cool.png", "<3": "heart.png", "(y)": "thumbsup.png"
        };
        const EMOJI_BASE_URL = "https://w7.pngwing.com/pngs/451/231/"; // URL base de ejemplo (deberás tener tus localmente o usar URLs reales)

        // 1. MANEJO DE VISTAS Y LOGIN
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user && pass) {
                socket.emit('login', { user, pass });
            }
        }

        socket.on('login_status', (data) => {
            if (data.success) {
                currentUserId = data.user;
                updateMyProfileDisplay(data.perfil);
                document.getElementById('login-view').classList.remove('active');
                document.getElementById('main-view').classList.add('active');
                switchChat('conversando', true);
            } else {
                document.getElementById('login-status-msg').innerText = data.msg;
            }
        });

        function updateMyProfileDisplay(p) {
            document.getElementById('my-name').innerText = p.user;
            document.getElementById('my-desc').innerText = p.descripcion || 'Disponible';
            if (p.foto) document.getElementById('my-avatar-img').src = p.foto;
        }

        // 2. GESTIÓN DE PERFIL (Modal y Base64)
        function openProfileModal() {
            document.getElementById('edit-desc').value = document.getElementById('my-desc').innerText;
            document.getElementById('profile-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('profile-modal').classList.remove('active'); }

        function previewPhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                photoBase64 = reader.result;
                const prev = document.getElementById('edit-photo-preview');
                prev.src = photoBase64; prev.style.display = 'block';
            }
            if (file) reader.readAsDataURL(file);
        }

        function saveProfile() {
            const desc = document.getElementById('edit-desc').value;
            socket.emit('update_profile', { desc, foto: photoBase64 });
            // Actualización local inmediata
            document.getElementById('my-desc').innerText = desc;
            if (photoBase64) document.getElementById('my-avatar-img').src = photoBase64;
            closeModal();
            photoBase64 = null; // Reset
        }

        // 3. CAMBIO DE CHAT Y HISTORIAL
        function switchChat(target, isGroup) {
            currentChatTarget = target;
            isGroupChat = isGroup;
            
            // UI Update
            document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
            const elId = isGroup ? `room-${target}` : `contact-${target}`;
            const activeEl = document.getElementById(elId);
            if(activeEl) activeEl.classList.add('active');

            document.getElementById('chat-header').innerText = isGroup ? `Sala: ${target}` : `Chat Privado: ${target}`;
            document.getElementById('chat-messages').innerHTML = ''; // Clear

            socket.emit('get_private_history', target);
        }

        socket.on('actualizar_historial', (data) => {
            if (data.target === currentChatTarget) {
                data.history.forEach(appendMessage);
            }
        });

        // 4. ENVÍO Y RECEPCIÓN DE MENSAJES (Multimedia)
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) {
                socket.emit('chat message', { to: currentChatTarget, text, isBuzz: false });
                input.value = '';
                clearTimeout(typingTimeout);
                socket.emit('typing', { to: currentChatTarget, user: currentUserId, isTyping: false });
            }
        }

        socket.on('chat message', (data) => {
            const shouldAppend = isGroupChat 
                ? (data.to === currentChatTarget) 
                : (data.user === currentChatTarget || (data.user === currentUserId && data.to === currentChatTarget));
            
            if (shouldAppend) {
                appendMessage(data);
                if (data.user !== currentUserId) {
                    document.getElementById('sound-msg').play();
                }
            } else if (data.user !== currentUserId) {
                showToast(data.user);
            }
        });

        function appendMessage(data) {
            const chatMessages = document.getElementById('chat-messages');
            const isSelf = data.user === currentUserId;

            if (data.isBuzz) {
                chatMessages.innerHTML += `<div class="buzz-text">¡${isSelf ? 'Has enviado' : data.user + ' ha enviado'} un zumbido!</div>`;
            } else {
                const html = `<div class="msg-line ${isSelf ? 'msg-self' : ''}">
                                <span class="msg-time">${data.time || ''}</span>
                                <span class="msg-user">${data.user}:</span>
                                <span class="msg-content">${processContent(data.text)}</span>
                             </div>`;
                chatMessages.innerHTML += html;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 5. PARSER: Links, YouTube, Emoticonos
        function processContent(text) {
            // Segurdiad básica contra HTML
            let p = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // Links clickeables
            p = p.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            
            // YouTube
            const ytMatch = text.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
            if (ytMatch) {
                p += `<iframe class="yt-embed" src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen></iframe>`;
            }

            // Emoticonos (Reemplazo burdo pero funcional)
            // Para que esto funcione bien, necesitarás imágenes reales. 
            // Usaré textos placeholders en el HTML para evitar referencias a archivos inexistentes.
            Object.keys(emojiMap).forEach(key => {
                // p = p.split(key).join(`<img src="${EMOJI_BASE_URL + emojiMap[key]}" class="emoji">`);
                p = p.split(key).join(`<strong>${emojiMap[key].replace('.png','')}</strong>`); // Placeholder text
            });

            return p;
        }

        // 6. ZUMBIDOS
        function sendNudge() {
            socket.emit('chat message', { to: currentChatTarget, text: "BUZZ", isBuzz: true });
        }

        socket.on('nudge-received', (from) => {
             // Solo si es en el chat activo o grupal
             if (from === currentChatTarget || (isGroupChat && !activeSockets[currentChatTarget])) {
                triggerNudgeEffects();
             }
        });

        // Modificamos el manejador de chat message para detectar zumbido
        // socket.on('chat message', (data) => { ... }) ya lo maneja arriba,
        // pero necesitamos llamar al efecto visual/auditivo cuando data.isBuzz es true.
        socket.on('chat message', (data) => {
            const shouldAppend = isGroupChat 
                ? (data.to === currentChatTarget) 
                : (data.user === currentChatTarget || (data.user === currentUserId && data.to === currentChatTarget));
            
            if (shouldAppend) {
                appendMessage(data);
                if (data.isBuzz) {
                    triggerNudgeEffects();
                } else if (data.user !== currentUserId) {
                    document.getElementById('sound-msg').play();
                }
            } else if (data.user !== currentUserId) {
                showToast(data.user);
            }
        });

        function triggerNudgeEffects() {
            document.getElementById('sound-nudge').play();
            document.getElementById('main-window').classList.add('nudge-shake');
            setTimeout(() => document.getElementById('main-window').classList.remove('nudge-shake'), 600);
        }

        // 7. LISTA DE CONTACTOS ONLINE
        socket.on('lista_contactos', (users) => {
            const container = document.getElementById('online-list-container');
            container.innerHTML = '';
            users.forEach(u => {
                if (u.user !== currentUserId && u.online === 1) {
                    const avatarSrc = u.foto || 'https://via.placeholder.com/30'; // Placeholder
                    const el = document.createElement('div');
                    el.id = `contact-${u.user}`;
                    el.className = `contact-item ${currentChatTarget === u.user ? 'active' : ''}`;
                    el.onclick = () => switchChat(u.user, false);
                    el.innerHTML = `<div class="avatar-container" style="width:30px; height:30px;">
                                        <img src="${avatarSrc}" class="avatar-img">
                                        <div class="status-dot online"></div>
                                    </div>
                                    <div>
                                        <b>${u.user}</b><br>
                                        <small>${u.descripcion || 'Disponible'}</small>
                                    </div>`;
                    container.appendChild(el);
                }
            });
        });

        // 8. "ESCRIBIENDO..." Y TOAST
        function handleTyping() {
            clearTimeout(typingTimeout);
            socket.emit('typing', { to: currentChatTarget, user: currentUserId, isTyping: true });
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { to: currentChatTarget, user: currentUserId, isTyping: false });
            }, 2000);
        }

        socket.on('typing_status', (data) => {
            const typingArea = document.getElementById('typing-status');
            if (data.to === currentUserId && data.user === currentChatTarget) {
                typingArea.innerText = data.isTyping ? `${data.user} está escribiendo...` : '';
            } else if (isGroupChat && data.to === currentChatTarget && data.user !== currentUserId) {
                typingArea.innerText = data.isTyping ? `${data.user} está escribiendo...` : '';
            }
        });

        function showToast(name) {
            const toast = document.getElementById('toast-notification');
            document.getElementById('toast-user-name').innerText = name;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3500);
        }
    </script>
</body>
</html>
